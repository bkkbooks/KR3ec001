body:
  text: 卷一上經上藥一百二十種為君主養命以應天無毒多服久服不傷人欲輕身益氣不老延年者本上經丹砂雲母玉泉石鐘乳涅石硝石朴硝滑石石膽空青曾青禹餘糧太乙餘糧白石英紫石英五色石脂白青扁青上玉石上品一十八種舊同菖蒲鞠華人參天門冬甘草乾地黃術菟絲子牛膝茺蔚子女萎防葵柴胡麥門冬獨活車前子木香薯蕷薏苡仁澤瀉遠志龍膽細辛石斛巴戟天白英白蒿赤箭菴䕡子析蓂子蓍實赤黑青白黃紫芝卷柏藍實芎藭蘼蕪黃連絡石蒺藜子黃耆肉蓯蓉防風蒲黃香蒲續斷漏蘆營實天名精決明子丹參茜根飛廉五味子旋華蘭草蛇床子地膚子景天茵陳杜若沙參白兔藿徐長卿石龍芻薇銜雲實王不留行升麻青蘘姑活別羈屈草淮木上草上品七十三種舊七十二種牡桂菌桂松脂槐實枸杞柏實茯苓榆皮酸棗柏木乾漆五加皮蔓荊實辛夷桑上寄生杜仲女貞實木蘭蕤核橘柚上木上品二十種舊一十九種發皮上人一種舊同龍骨麝香牛黃熊脂白膠阿膠上獸上品六種舊同丹雄雞雁肪上禽上品二種舊同石蜜蜂子蜜蠟牡蠣龜甲桑螵蛸海蛤文蛤蠡魚鯉魚膽上蟲魚上品一十種舊同藕實莖大棗葡萄蓬藟雞頭實上果上品五種舊六種胡麻麻賁上米穀上品二種舊三種冬葵子莧實瓜蒂瓜子苦菜上菜上品五種舊同丹沙味甘微寒主身體五臟百病養精神安魂魄益氣明目殺精魁邪惡鬼久服通神明不老能化為汞生山谷太平御覽引多有生山谷三字大觀本作生符陵山谷俱作黑字考生山谷是經文後人加郡縣耳宜改為白字而以郡縣為黑字下皆仿此吳普本草曰丹沙神農甘黃帝苦有毒扁鵲苦李氏大寒或生武陵採無時能化未成水銀畏磁石惡鹹水太平御覽名醫曰作末名真朱光色如雲母可折者良生符陵山谷採無時案說文云丹巴越之赤石也象採丹井象丹形古文作日亦作彤沙水散石也澒丹沙所化為水銀也管子地數篇云山上有丹沙者其下有鈓金淮南子地形訓云赤矢七百歲生赤丹赤丹七百歲生赤澒高誘云赤丹丹沙也山海經云丹粟粟沙音之緩急也沙舊作砂非汞即澒省文列仙傳云赤斧能作水澒煉丹與硝石服之按金石之藥古人云久服輕身延年者謂當避谷絶人道或服數十年乃效耳今人和肉食服之遂多相反轉以成疾不可疑古書之虛證雲母味甘平主身皮死肌中風寒熱如在車船上除邪氣安五臟益子精明目久服輕身延年一名云珠一名雲華一名雲英一名雲液一名云沙一名磷石生山谷名醫曰生太山齊盧山及琅邪北定山石間二月採此録名醫說者即是仲景元化及普所說但後人合之無從別耳亦以補普書不備也案列仙傳云方回煉食雲母抱朴子仙藥篇云雲母有五種五色並具而多青者名雲英宜以春服之五色並具而多赤者名云珠宜以夏服之五色並具而多白者名雲液宜以秋服之五色並具而多黑者名雲母宜以冬服之但有青黃二色者名云沙宜以季夏服之晶晶純白名磷石可以四時長服之也李善文選注引異物志雲母一名雲精人地萬歲不朽說文無磷字玉篇云磷薄也雲母之別名玉泉味甘平主五臟百病柔筋強骨安魂魄長肌肉益氣久服耐寒暑御覽引耐字多作能古通不飢渴不老神仙人臨死服五斤死三年色不變一名玉札御覽引作玉濃初學記引云玉桃服之長生不死御覽又引云玉桃服之長生不死若不得早服之臨死日服之其尸畢天地不朽則杜疑當作桃生山谷吳普曰玉泉一名玉屑神農岐伯雷公甘李氏平畏冬華惡青竹御覽白玉杜如白頭公同上事類賦引云白玉體如白首翁案周禮玉府王齊則供食玉鄭云玉是陽精之純者食之以御水氣鄭司農云王齊當食玉屑抱朴子仙藥篇云玉可以烏米酒及地榆酒化之為水亦可以蔥漿消之為𥹋亦可餌以為丸亦可燒以為粉服之一年以上入水不沾入火不灼刃之不傷百毒不犯也不可用已成之器傷人無益當得璞玉乃可用也得於闐國白玉尤善其次有南陽徐善亭部界界中玉及日南盧容水中玉亦佳石鐘乳味甘溫主咳逆上氣明目益精安五臟通百節利九竅下乳汁御覽引云一名留公乳大觀本作一名公乳黑字生山谷吳普曰鍾乳一名虛中神農辛桐君黃帝醫和甘扁鵲甘無毒御覽引云李氏大寒生山谷御覽引云太山山谷陰處岸下溜汁成御覽引作溜汁所成聚如乳汁黃白色空中相通二月三月採陰乾凡吳普本草掌禹錫所引者不復注惟注其出御覽諸書者名醫曰一名公乳一名蘆石一名夏石生少室及太山採無時案範子計然云石鐘乳出武都黃白者善凡引計然多出藝文類聚文選注御覽及大觀本草列仙傳云卬疏煮石髓而服之謂之石鐘乳鍾當為潼說云乳汁也鍾假音字涅石舊作礬石據郭璞注山海經引作涅石味酸寒主寒熱泄利白沃陰蝕惡創目痛堅筋骨齒煉餌服之輕身不老增年一名羽涅生山谷吳普曰礬石一名羽涅一名羽澤神農岐伯酸扁鵲咸雷公酸無毒生河西或隴西或武都石門採無時岐伯久服傷人骨御覽名醫曰一名羽澤生河西及隴西武都石門採無時案說文無礬字玉篇云礬石也涅礬石也西山經云女床之山其陰多涅石郭璞云即礬石也楚人名為涅石秦名為羽涅也本草經亦名曰涅石也範子計然云礬石出武都淮南子俶真訓云以涅染緇高誘云涅礬石也舊涅石作礬石羽涅作羽涅非硝石味苦寒主五臟積熱胃張閉滌去蓄結飲食推陳致新除邪氣煉之如膏久服輕身御覽引云一名芒硝大觀本作黑字生山谷吳普曰硝石神農苦扁鵲甘丹出掌禹錫所引亦見御覽者不箸所出名醫曰一名芒硝生益州及五都隴西西羌採無時案範子計然云硝石出隴道據名醫一名芒硝又別出芒硝條非北山經云京山其陰處有元䃤疑䃤即硝異文朴硝味苦寒主百病除寒熱邪氣逐六腑積聚結固留癖能化七十二種石煉餌服之輕身神仙生山谷吳普曰朴硝石神農岐伯雷公無毒生益州或山陰入土千歲不變煉之不成不可服御覽名醫曰一名硝石朴生益州有鹽水之陽採無時案說文云朴木皮也此蓋硝石外裹如玉璞耳舊作硝俗字滑石味甘寒主身熱泄澼女子乳難癃閉利小便蕩胃中積聚寒熱益精氣久服輕身耐飢長年生山谷名醫曰一名液石一名共石一名脫石一名番石生赭陽及太山之陰或掖北白山山或卷山採無時案範子計然云滑石白滑者善南越志云膋城縣出膋石即滑石也石膽味酸寒主明目目痛金創諸癇痙女子陰蝕痛石淋寒熱崩中下血諸邪毒氣令人有子煉餌服之不老久服增壽神仙能化鐵為銅成金銀御覽引作合成一名畢石生山谷吳普曰石膽神農酸小寒李氏小寒桐君辛有毒扁鵲苦無毒御覽引云一名黑石一名銅勒生羌道或名青山二月瘐子辛丑採名醫曰一名黑石一名棋石一名銅勒生羌道羌里句青山二月瘐子辛丑日採案範子計然云石膽出隴西羌道陶弘景雲仙經一名立制石周禮瘍醫凡療瘍以五毒攻之鄭云今醫方有五毒之藥作之合黃堥置石膽丹沙雄黃礬石磁石其中燒之三日三夜其煙上著以雞羽掃取之以注創惡肉破骨則盡出圖經曰故翰林學士楊億嘗筆記直史館楊嵎有瘍生於頰人語之依鄭法合燒藥成注之瘡中遂愈信古方攻病之速也空青味甘寒主眚盲耳聾明目利九竅通血脈養精神久服輕身延年不老能化銅鐵鉛錫作金生山谷吳普曰空青神農甘一經酸久服有神仙玉女來時使人志高御覽名醫曰生益州及越巂山有銅處銅精熏則生空青其腹中空三月中旬採亦無時案西山經云皇人之山其下多青郭璞云空青曾青之屬範子計然云空青出巴郡司馬相如賦云丹青張揖云青青雘也顏師古云青雘今之丹青也曾青味酸小寒主目痛止淚出風痹利關節通九竅破症堅積聚久服輕身不老能化金銅生山谷名醫曰生蜀中及越巂採無時案管子揆度篇云秦明山之曾青荀子云南海則有曾青楊倞注曾青銅之精範子計然云曾出宏農豫章白青出新塗青色者善淮南子地形訓云青天八百歲生青曾高誘云曾青青石也禹餘糧味甘寒主咳逆寒熱煩滿下御覽有痢字赤白血閉癥瘕大熱煉餌服之不飢輕身延年生池澤及山島中名醫曰一名白餘糧生東海及池澤中案範子計然云禹餘糧出河東列仙傳云赤斧上華山取禹餘糧博物志云世傳昔禹治水棄其所餘食於江中而為藥也按此出神農經則禹非夏禹之禹或本名白餘糧名醫等移其名耳太乙餘食味甘平主咳逆上氣癥瘕血閉漏下餘邪氣久服耐寒暑不飢輕身飛行千里神仙御覽引作若神仙一名石腦生山谷吳普曰太一禹餘糧一名禹哀神農岐伯雷公甘平李氏小寒扁鵲甘無毒生太山上有甲甲中有白白中有黃如雞子黃色九月採或無時名醫曰生太白九月採案抱朴子金丹篇云靈丹經用丹沙雄黃雌黃石硫黃曾青礬石磁石戎鹽太一禹餘糧亦用六一泥及神室祭醮合之三十六日成白石英味甘微溫主消渴陰痿不足咳逆御覽引作嘔胸膈間久寒益氣除風濕痹御覽引作陰淫痹久服輕身御覽引作身輕健長年生山谷吳普曰白石英神農甘岐伯黃帝雷公扁鵲無毒生太山形如紫石英白澤長者二三寸採無時御覽引云久服通日月光名醫曰生華陰及太山案司馬相如賦有白附蘇林雲白附白石英也司馬山云出魯陽山紫石英味甘溫主心腹咳逆御覽引作嘔逆邪氣補不足女子風寒在子宮絶孕十年無子久服溫中輕身延年生山谷吳普曰紫石英神農扁鵲味甘平李氏大寒雷公大溫岐伯甘無毒生太山或會稽採無時欲令如削紫色達頭如樗蒲者又曰青石英形如白石英青端赤後者是赤石英形如白石英赤端白後者是赤澤有光味苦補心氣黃石英形如白石英黃色如金赤端者是黑石英形如白石英黑澤有光御覽掌禹錫引此節文名醫曰生太山採無時青石赤石黃石白石黑石脂等味甘平主黃疸泄利腸癖膿血陰蝕下血赤白邪氣癰腫疽痔惡創頭瘍疥瘙久服補髓益氣肥健不飢輕身延年五石脂各隨五色補五臟生山谷中吳普曰五色石脂一名青赤黃白黑等青符神農甘雷公酸無毒桐君辛無毒李氏小寒生南山或海涯採無時赤符神農雷公甘黃帝扁鵲無毒李氏小寒或生少室或生太山色絳滑如脂黃符李氏小寒雷公苦或生嵩山色如豚腦雁雛採無時白符一名隨髓岐伯雷公酸無毒李氏小寒桐君甘無毒扁鵲辛或生少室天婁山或太山黑符一名石泥桐君甘無毒生洛西山空地名醫曰生南山之陽一本作南陽又云黑石脂一名石涅一名石墨案吳普引神農甘云云五石脂各有條後世合為一條也範子計然云赤石脂出河東色赤者善列仙傳云赤鬚子好食石脂白青味甘平主明目利九竅耳聾心下邪氣令人吐殺諸毒三蟲久服通神明輕身延年不老生山谷吳普曰神農甘平雷公酸無毒生豫章可消而為銅御覽名醫曰生豫章採無時案範子計然云白青出巴郡扁青味甘平主目痛明目折跌癰腫金創不療破積聚解毒氣御覽引作闢毒利精神久服輕身不老生山谷吳普曰扁青神農雷公小寒無毒生蜀郡治丈夫內絶令人有子御覽引云治癰脾風痹久服輕身名醫曰生朱崖武都朱提採無時案範子計然云扁青出宏農豫章上玉石上品一十八種舊同菖蒲味辛溫主風寒濕痹咳逆上氣開心孔補五臟通九竅明耳目出聲音久服輕身不忘不迷或延年一名昌陽御覽引云生石上一寸九節者久服輕身云云大觀本無生石上三字有云一寸九節者良作黑字生池澤吳普曰菖蒲一名堯韭藝文類聚引云一名昌陽名醫曰生上洛及蜀郡嚴道五月十二日採根陰乾案說文云𦭭菖蒲也益州生廣雅云邛昌陽菖蒲也周禮云菖本鄭云菖本菖蒲根切之四寸為菹春秋左傳云食以菖歜杜預云菖歜菖蒲菹呂氏春秋云冬至後五旬七日菖始生菖者百草之先於是始耕淮南子說山訓云菖羊去蚤蝨而來蛉窮高誘云菖羊菖蒲列仙傳云商邱子胥食菖蒲根務光服蒲韭根離騷草木疏云沈存中雲所謂蘭蓀即今菖蒲是也鞠華味苦平主風頭眩腫痛目欲脫淚出皮膚死肌惡風濕痹久服利血氣輕身耐老延年一名節華生川澤及田野吳普曰菊華一名白華初學記一名女華一名女莖名醫曰一名日精一名女節一名女華一名女莖一名更生一名周盈一名傅延年一名陰成生雍州正月採根三月採葉五月採莖九月採花十一月採實皆陰乾案說文云蘜治牆也蘜日精也似秋華或省作菊爾雅云蘜治牆郭璞云今之秋華菊則蘜草辛掬草辛人皆秋華惟今作菊說文以為大菊瞿麥假音用之也人參味甘微寒主補五臟安精神定魂魄止驚悸除邪氣明目開心益智久服輕身延年一名人銜一名鬼蓋生山谷吳普曰人參一名土精一名神草一名黃參一名血參一名人微一名玉精神農甘小寒桐君雷公苦岐伯黃帝甘無毒扁鵲有毒生邯鄲三月生葉小兌核黑莖有毛三月九月採根根有頭足手面目如人御覽名醫曰一名神草一名人微一名土精一名血參如人形者有神生上黨及遼東二月四月八月上旬採根竹刀刮曝乾無令見風案說文云參人參藥草出上黨廣雅云地精人參也範子計然云人參出上黨狀類人者善劉敬叔異苑云人參一名土精生上黨者佳人形皆具能作兒啼天門冬味苦平主諸暴風濕偏痹強骨髓殺三蟲去伏尸久服輕身益氣延年一名顛勒爾雅注引云門冬一名滿冬今無文生山谷名醫曰生奉高山二月七月八月採根曝乾案說文云牆牆蘼滿冬也中山經云條谷之山其草多宜冬爾雅云牆蘼滿冬列仙傳云赤鬚子食天門冬抱朴子仙藥篇云天門冬或名地門冬或名筵門冬或名顛棘或名淫羊食或名管松甘草味甘平主五臟六腑寒熱邪氣堅筋骨長肌肉倍力金創腫解毒久服輕身延年御覽引云一名美草一名密甘大觀本作黑字生川穀名醫曰一名密甘一名美草一名蜜草一名蕗草生河西積沙山及上郡二月八月除日採根曝乾十日成案說文云苷甘草也蘦大苦也苦大甘苓也廣雅云美草甘草也毛詩云隰有苓傳云苓大苦爾雅云蘦大苦郭璞云今甘草蔓延生葉似荷青黃莖赤黃有節節有枝相當或云蘦似地黃此作甘省字苓通乾地黃味甘寒主折跌絶筋傷中逐血痹填骨髓長肌肉作湯除寒熱積聚除痹生者尤良久服輕身不老一名地髓生川澤名醫曰一名苄一名芑生咸陽黃土地者佳二月八日採根陰乾案說文云苄地黃也禮曰鈃毛牛藿羊苄豕薇廣雅云地髓地黃也爾雅云苄地黃郭璞云一名地髓江東呼苄列仙傳云呂尚服地髓術味苦溫主風寒濕痹死肌痙疸止汗除熱消食作煎餌久服輕身延年不飢一名山薊藝文類聚引作山筋生山谷吳普曰術一名山連一名山芥一名天蘇一名山姜藝文類聚名醫曰一名山姜一名山連生鄭山漢中南鄭二月三月八月九月採根曝乾案說文云術山薊也廣雅云山姜術也白朮牡丹也中山經云首山草多術郭璞云術山薊也爾雅云術山薊郭璞云今術似薊而生山中範子計然云術出三輔黃白色者善列仙傳云涓子好餌術抱朴子仙藥篇云術一名山薊一名山精故神藥經曰必欲長生長服山精菟絲子味辛平主續絶傷補不足益氣力肥健汁去面皯久服明目輕身延年一名菟蘆生川澤吳普曰菟絲一名玉女一名松蘿一名鳥蘿一名鴨蘿一名復實一名赤網生山谷御覽名醫曰一名菟縷一名唐蒙一名玉女一名赤網一名菟纍生朝鮮田野蔓延草木之上色黃而細為赤網色淺而大為菟纍九月採實暴乾案說文云蒙玉女也廣雅云菟邱菟絲也女蘿松蘿也爾雅云唐蒙女蘿菟絲又云蒙玉女毛詩云愛採唐矣傳云唐蒙菜名又蔦與女蘿傳云女蘿菟絲松蘿也陸璣云今菟絲蔓連草上生黃赤如金今合藥菟絲子是也非松蘿松蘿自蔓松上枝正青與菟絲異楚詞云被薜荔兮帶女蘿王逸云女蘿菟絲也淮南子云千秋之松下有茯苓上有菟絲高誘注云茯苓千歲松脂也菟絲生其上而無根舊作菟非牛膝味苦酸御覽作辛主寒御覽作傷寒濕痿痹四肢拘攣膝痛不可屈伸逐血氣傷熱火爛墮胎久服輕身耐老御覽作能老一名百倍生川穀吳普曰牛膝神農甘一經酸黃帝扁鵲甘李氏溫雷公酸無毒生河內或臨邛葉如夏藍莖本赤二月八月採御覽名醫曰生河內及臨朐二月八月十月採根陰乾案廣雅云牛莖牛膝也陶弘景雲其莖有節似膝故以為名也膝當為膝充蔚子味辛微溫主明目益精除水氣久服輕身莖主癮疹癢可作浴湯一名益母一名益明一名大札生池澤名醫曰一名貞蔚生海濱五月採案說文云蓷萑也廣雅云益母充蔚也爾雅云萑蓷郭璞云今茺蔚也毛詩云中谷有蓷傳云蓷隼也陸璣云舊說及魏博士濟陰周元明皆云菴䕡是也韓詩及三蒼說悉云益母故曾子見益母而感劉歆曰蓷臭穢臭穢即茺蔚也舊作茺非女萎味甘平主中風暴熱不能動搖跌筋結肉諸不足久服去面黑皯好顏色潤澤輕身不老生山谷吳普曰女萎一名葳蕤一名玉馬一名地節一名蟲蟬一名烏萎一名熒一名玉竹神農苦一經甘桐君雷公扁鵲甘無毒黃帝辛生太山山谷葉青黃相值如姜二月七月採治中風暴熱久服輕身御覽一名左眄久服輕身耐老同上名醫曰一名熒一名地節一名玉竹一名馬熏生太山及邱陵立春後採陰乾案爾雅云熒委萎郭璞云藥草也葉似竹大者如箭竿有節葉狹而長表白里青根大如指長一二尺可啖陶弘景雲按本經有女萎無葳蕤別録有萎蕤而為用正同疑女萎即葳蕤也惟名異耳陳藏器云魏志樊阿傳青黏一名黃芝一名地節此即葳蕤防葵味辛寒主疝瘕腸泄膀胱熱結溺不下咳逆溫瘧癲癇驚邪狂走久服堅骨髓益氣輕身一名梨蓋生川穀吳普曰房葵一名梨蓋一名爵離一名房苑一名晨草一名利如一名方蓋神農辛小寒桐君扁鵲無毒岐伯雷公黃帝苦無毒莖葉如葵上黑黃二月生根根大如桔梗根中紅白六月花白七月八月實白三月三日採根御覽名醫曰一名房慈一名爵離一名農果一名利茹一名方蓋生臨淄及嵩高太山少室三月三日採根曝乾案博物志云防葵與狼毒相似柴胡味苦平主心腹去腸胃中結氣飲食積聚寒熱邪氣推陳致新久服輕身明目益精一名地熏吳普曰茈葫一名山菜一名茹草神農岐伯雷公苦無毒生冤句二月八月採根御覽名醫曰一名山菜一名茹草葉一名藝蒿辛香可食生宏農及冤句二月八月採根曝乾案博物志云藝蒿葉似邪蒿春秋有白蒻長四五寸香美可食長安及河內並有之夏小正云正月採藝月令云仲春藝始生呂氏春秋云菜之美者華陽之藝皆即此也急就篇有云顏師古注云即今藝蒿也然則是此茈胡葉矣茈柴前聲相轉名醫別録前胡條非陶弘景雲本經上品有茈胡而無此晚來醫乃用之麥門冬味甘平主心腹結氣傷中傷飽胃絡脈絶羸瘦短氣久服輕身不老不飢生川穀及堤阪吳普曰一名馬韭一名釁冬一名忍冬一名忍陵一名不死藥一名僕壘一名隨脂太平御覽引云一名羊韭秦一名馬韭一名禹韭韭越一名羊齊一名麥韭一名禹韭一名釁韭一名禹餘糧神農岐伯甘平黃帝桐君雷公甘無毒李氏甘小溫扁鵲無毒生山谷肥地葉如韭肥澤叢生採無時實青黃名醫曰秦名羊韭齊名麥韭楚名馬韭越名羊蓍一名禹葭一名禹餘糧葉如韭冬夏長生生函谷肥土石間久廢處二月三月八月十月採陰乾案說文云荵荵冬草中山經云青要之山是多僕纍據吳普說即麥門冬也忍荵壘纍音同陶弘景雲實如青珠根似穬麥故謂麥門冬獨活味苦平主風寒所擊金瘡止痛賁豚癇痙女子疝瘕久服輕身耐老一名羌活一名羌青一名擴羌使者生川穀吳普曰獨活一名胡王使者神農黃帝苦無毒八月採此藥有風花不動無風獨搖御覽名醫曰一名胡王使者一名獨搖者此草得風不搖無風自動生雍州或隴西南安二月八月採根曝乾案列仙傳云山圖服羌活獨活則似二名護羌胡王皆羌字緩聲猶專諸為專設諸庚公差為瘐公之斯非有義也車前子味甘寒無毒主氣癃止痛利水道小便除濕痹久服輕身耐老一名當道御覽有云一名牛舌大觀本作牛遺黑字生平澤名醫曰一名芣苡一名蝦蟆衣一名牛遺一名勝舄生真定邱陵阪道中五月五日採陰乾案說文云芣一曰芣苡一名馬舄其實如李令人宜子周書所說廣雅云當道馬舄也爾雅云芣苡馬舄馬舄車前郭璞云今車前草大葉長穗好生道邊江東呼為蝦蟆衣又藬牛蘈孫炎云車前一名牛邊毛詩云采采芣苡傳云芣苡馬舄馬舄車前也陸璣云馬舄一名車前一名當道喜在牛跡中生故曰車前當道也今藥中車前子是也幽州人謂之牛舌草木香味辛主邪氣闢毒疫溫鬼強志主淋露御覽引云主氣不足大觀本作黑字久服不夢寤魘寐御覽引云一名密青一名輕身致神仙大觀本俱作黑字生山谷名醫曰一名蜜香生永昌署豫舊作薯蕷御覽作署豫是味甘溫主傷中補虛羸除寒熱邪氣補中益氣力長肌肉長肌肉久服耳目聰明輕身不飢延年一名山芋生山谷吳普曰薯蕷一名諸署御覽作署豫作諸署藝文類聚亦作諸齊越名山芋一名修脆一名兒草御覽引云秦楚名玉延齊越名山芋鄭趙名山芋一名玉延神農甘小溫桐君雷公甘御引作苦無毒或生臨朐鐘山始生赤莖細蔓五月華白七月實青黃八月熟落根中白皮黃類芋御覽引云二月八月採根惡甘遂名醫曰秦楚名玉延鄭越名土諸生嵩高二月八月採根曝乾案廣雅云玉延薯豫署蕷也北山經云景山草多薯豫郭璞云根似羊蹄可食今江南單呼為薯語有輕重耳範子計然云薯豫本出三輔白色者善本草衍義云山藥上一字犯宋英廟諱下一字曰蕷唐代宗名豫故改下一字為藥薏苡仁味甘微寒主筋急拘攣不可屈神風濕痹下氣久服輕身益氣其根下三蟲一名解蠡生平澤及田野名醫曰一名屋菼一名起實一名贛生真定八月採實採根無時案說文云㪍㪍苡一曰㪍英贛一曰薏苡廣雅云贛起實㪍目也吳越春秋鯀娶於有莘氏之女名曰女嬉年壯未孳嬉於砥山得薏苡面而吞之意若為人所感因而妊孕後漢書馬援傳援在交趾常餌薏苡實用能輕身省欲以勝瘴㪍俗作薏非澤瀉味甘寒主風寒濕痹乳難消水養五臟益氣力肥健久服耳目聰明不飢延輕身面生光能行水上一名水瀉一名芒芋一名鵠瀉生池澤名醫曰生汝南五六八月採根陰乾案說文云藚水寫也爾雅云蕍藛郭璞云今澤瀉又藚牛膚郭璞云毛詩傳雲水藛也如續斷寸寸有節拔之可復毛詩云言採其藚傳云藚水寫也陸璣云今澤寫也其葉如車前草大其味亦相似徐州廣陵人食之遠志味苦溫主咳逆傷中補不足除邪氣利九竅益智慧耳目聰明不忘強志倍力久服輕身不老葉名小草一名棘菀陸德明爾雅音義引作莧一名葽繞御覽作要繞一名細草生川穀名醫曰生太山及冤句四月採根葉陰乾案說文云蒬棘蒬也廣雅云蕀苑遠志也其上謂之小草爾雅云葽繞蕀蒬郭璞云今遠志也似麻黃赤華葉鋭而黃龍膽味苦澀主骨間寒熱驚癇邪氣續絶傷定五臟殺蠱毒久服益智不忘輕身耐老一名陵遊生山谷名醫曰生齊朐及冤句二月八月十一月十二月採根陰乾細辛味辛溫主咳逆頭痛腦動百節拘攣風濕痹痛死肌久服明目利九竅輕身長年一名小辛生山谷吳普曰細辛一名細草御覽引云一名小辛神農黃帝雷公桐君辛小溫岐伯無毒李氏小寒如葵葉色赤黑一根一葉相連御覽引云三月八月採根名醫曰生華陰二月八月採根陰乾案廣雅云細條少辛細辛也中山經云浮戲之山上多少辛郭璞云細辛也管子地員篇云小辛大蒙範子計然云細辛出華陰色白者善石斛味甘平主傷中除痹下氣補五臟虛勞羸瘦強陰久服厚腸胃輕身延年一名林蘭御覽引云一名禁生觀本作黑字生山谷吳普曰石斛神農甘平扁鵲酸李氏寒御覽名醫曰一名禁生一名杜蘭一名石蓫生六安水傍石上七月八月採莖陰乾案範子計然云石斛出六安巴戟天味辛微溫主大風邪氣陰痿不起強筋骨安五臟補中增志益氣生山谷名醫曰生巴郡及下邳二月八月採根陰乾白英味甘寒主寒熱八疽消渴補中益氣久服輕身延年一名谷菜元本誤作黑字生山谷名醫曰一名白草生益州春採葉夏採莖秋採花冬採根案爾雅云苻鬼目郭璞云今江東有鬼目草莖似葛葉圓而毛子如耳璫也赤色叢生唐本注白英云此鬼目草也白蒿味甘平主五臟邪氣風寒濕痹補中益氣長毛髮令黑療心懸少食常飢輕身耳目聰明不老生川澤名醫曰生中山二月採案說文云蘩白蒿也艾冰臺也廣雅云蘩母蒡葧也爾雅云艾冰臺郭璞云今艾白蒿夏小正云二月采蘩傳云蘩由胡由胡者繁母也繁母者旁勃也爾雅云蘩皤蒿郭璞云白蒿又蘩由胡郭璞云未詳毛詩云於以采蘩傳云蘩皤蒿也又采蘩祁祁傳云蘩白蒿也陸璣云凡艾白色者為皤蒿楚詞王逸注云艾白蒿也按皤白音義皆相近艾是藥名本草經無者即白蒿是也名醫別出艾條非赤箭味辛溫主殺鬼精物蠱毒惡氣久服益氣力長陰肥健輕身增年一名離母一名鬼督郵生川穀吳普曰換督郵一名神草一名閻狗或生太山或少室莖箭赤無葉根如芋子三月四月八月採根日乾治癰腫御覽名醫曰生陳倉雍州及太山少室三月四月八月採根曝乾案抱朴子云按仙方中有合離草一名獨搖一名離母所以謂之合離離母者此草為物下根如芋魁有遊子十二枚周環之去大魁數尺雖相須而實不相連但以氣相屬耳別說云今醫家見用天麻即是此赤箭根奄閭子舊作庵閭御覽作奄閭是味苦微寒主五臟瘀血腹中水氣臚張留熱風寒濕痹身體諸痛久服輕身延年不老生川穀吳普曰奄閭神農雷公桐君岐伯苦小溫無毒李氏溫或生上黨葉青厚兩相當七月花曰九月實黑七月九月十月採驢馬食仙去御覽名醫曰駏驉食之神仙生雍州變生上黨及道邊十月採根陰乾案司馬相如賦有奄閭張揖云奄閭蒿也子可治疾析蓂子味辛微溫主明目目痛淚出除痹補五臟益精光久服輕身不老一名蔑析一名大蕺一名馬辛生川澤及道旁吳普曰析蓂一名析目一名榮冥一名馬騂雷公神農扁鵲辛李氏小溫四月採干二十日生道旁得細辛良畏乾薑苦參薺實神農無毒生野田五月五日採陰乾治腹脹御覽名醫曰一名大薺生咸陽四月五月採曝乾案說文云𩊅析𩊅大薺也廣雅云析𩊅馬辛也爾雅云析𩊅大薺郭璞云薺葉細俗呼之曰老薺舊作菥非蓍實味苦平主益氣充肌膚明目聰慧先知久服不飢不老輕身生山谷吳普曰蓍實味苦酸平無毒主益氣充肌膚明目聰慧先知久服不飢不老輕身生少室山谷八月九月採實曝乾御覽名醫曰生少室八月九月採實曬乾案說文云蓍蒿屬生千歲三百莖史記龜策傳云蓍百莖共一根赤芝味苦平主胸中結益心氣補中增智慧不忘久食輕身不老延年神仙一名丹芝黑芝味鹹平主癃利水道益腎氣通九竅聰察久食輕身不老延年神仙一名元芝青芝味酸平主明目補肝氣安精魂仁恕久食輕身不老延年神仙一名龍芝白芝味辛平主咳逆上氣益肺氣通利口鼻強志意勇悍安魄久食輕身不老延年神仙一名玉芝黃芝味甘平主心腹五邪益脾氣安神忠信和樂久食輕身不老延年神仙一名金芝紫芝味甘溫主耳聾利關節保神益精氣堅筋骨好顏色久服輕身不老延年一名木芝生山谷舊作六種今並吳普曰紫芝一名木芝名醫曰赤芝生霍山黑芝生恆山青芝生太山白芝生華山黃芝生嵩山紫芝生高夏地上色紫形如桑御覽六芝皆無毒六月八月採案說文云芝神草也爾雅云茵芝郭璞云芝一歲三華瑞草禮記則云芝栭盧植注云芝木芝也楚詞云採三秀于山間王逸云三秀謂芝草後漢書華他傳有漆葉青面散注引他傳曰青面者一名地節一名黃芝主理五臟益精氣本字書無面字相傳音女廉反列仙傳云呂尚服澤芝抱朴子仙藥篇云赤者如珊瑚白者如截肪黑者如澤漆青者如翠羽黃者如紫金而皆光明洞徹如堅冰也卷柏味辛溫生山谷主五臟邪氣女子陰中寒熱痛癥瘕血閉絶子久服輕身和顏色一名萬歲生山谷石間吳普曰卷柏神農辛桐君雷公甘御覽引云一名豹足一名求股一名萬歲一名神枝時生山谷名醫曰一名豹足一名求股一名交時生常山五月七月採陰乾案範子計然云卷柏出三輔藍實味苦寒主解諸毒殺蠱蚑注鬼螫毒久服頭不白輕身生平澤名醫曰其莖葉可以染青生河內案說文云葴馬藍也藍染青草也爾雅云葴馬藍郭璞云今大葉冬藍也周禮掌染草鄭注云染草藍茜象頭之屬夏小正五月啓灌藍毛詩云終朝採藍箋云藍染草也芎藭味辛溫主中風入腦頭痛寒痹筋攣緩急金創婦人血閉無子生川穀吳普曰芎藭御覽引云一名香果神農黃帝岐伯雷公辛無毒扁鵲酸無毒李氏生溫熟寒或生胡無桃山陰或太山御覽作或斜谷西嶺或太山葉香細青黑文赤如藁本冬夏叢生五月花赤七月實黑莖端兩葉三月採根有節似馬銜狀名醫曰一名胡藭一名香果其葉名蘼蕪生武功斜谷西嶺三月四月採根曝乾案說文云菅菅藭香草也芎司馬相如說或從弓春秋左傳云有山鞠窮乎杜預云鞠窮所以御濕西山經云號山其草多芎藭郭璞云芎藭一名江蘺範子計然云芎藭生始無枯者善有脫字司馬相如賦有芎藭司馬貞引司馬彪云芎藭似藁本郭璞云今歷陽呼為江蘺蘼蕪味辛溫主咳逆定驚氣辟邪惡除蠱毒鬼注去三蟲久服通神一名薇蕪生川澤吳普曰麋蕪一名芎藭御覽名醫曰一名茳蘺芎藭苗也生雍州及冤句四月五月採葉曝乾案說文云麋麋蕪也蘺茳蘺麋蕪爾雅云靳茞麋蕪郭璞云香草葉小如委狀淮南子云似蛇床山海經云臭如麋蕪司馬相如賦有江蘺麋蕪司馬貞引樊光云藁本一名麋蕪根名勒芷黃連味苦寒主熱氣目痛眥傷泣出明目御覽引云主莖傷大觀本無腸澼腹痛下利婦人陰中腫痛久服令人不忘一名王連生川穀吳普曰黃連神農岐伯黃帝雷公苦無毒李氏小寒或生蜀郡太山之陽御覽名醫曰生巫陽及蜀郡太山二月八月採案廣雅云王連黃連也範子計然云黃連出蜀郡黃肥堅者善絡石味苦溫主風熱死肌癰傷口乾舌焦癰腫不消喉舌腫水漿不幹久服輕身明目潤澤好顏色不老延年一名石鯪生川穀吳普曰落石一名鱗石一名明石一名縣石一名雲華一名云珠一名雲英一名云丹神農苦小溫雷公苦無毒扁鵲桐君甘無毒李氏小寒云藥中君採無時御覽名醫曰一名石蹉一名略石一名明石一名領石一名縣石生太山或石山之陰或高山岩石上或生人間正月採案西山經云上申之山多硌石疑即此郭璞云硌磊硌大石兒非也唐本注云俗名耐冬山南人謂之石血以其包絡石木而生幫名絡石別録謂之石龍藤以石上生者良蒺藜子味苦溫主惡血破癥結積聚喉痹乳難久服長肌肉明目輕身一名旁通一名屈人一名止行一名豺羽一名升推御覽引云一名君水香大觀本無文生平澤或道旁名醫曰一名即藜一名茨生馮翊七月八月採實曝乾案說文云薺蒺黎也詩曰牆上有薺以茨為茅葦開屋字爾雅云牆上有茨傳云茨蒺藜也舊本作蒺藜非黃耆味甘微溫主癰疽久敗創排膿止痛大風痢疾五痔鼠瘻補虛小兒百病一名戴糝生山谷名醫曰一名戴椹一名獨椹一名芰草一名蜀脂一名百本生蜀郡白水漢中二月十月採陰乾肉鬆蓉味甘微溫主五勞七傷補中除莖中寒熱痛養五臟強陰益精氣多子婦人癥瘕久服輕身生山谷吳普曰肉蓯蓉一名肉鬆蓉神農黃帝咸雷公酸小溫御覽作李氏小溫生河西御覽作東山陰地長三四寸叢生或代郡御覽下有雁門二字二月到八月採御覽引云陰乾用之名醫曰生河西及代郡雁門五月五日採陰乾案吳普云一名肉鬆蓉當是古本蓉即是容字俗寫蓯蓉非正字也陶弘景雲是野馬精落地所生生時似肉舊作肉蓯蓉非防風味苦溫無毒主大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痹御覽作痛煩滿久服輕身一名銅藝御覽作芒生川澤吳普曰防風一名回云一名回草一名百枝一名蕳根一名百韭一名百種神農黃帝岐伯桐君雷公扁鵲甘無毒李氏小寒或生邯鄲上蔡正月生葉細圓青黑黃白五月花黃六月實黑三月十月採根曬乾琅邪者良御覽名醫曰一名茴草一名百枝一名屏風一名蕳根一名百蜚生沙苑及邯鄲琅邪上蔡二月十月採根曝乾案範子計然云防風出三輔白者善蒲黃味甘平主心腹膀胱寒熱利小便止血消瘀血久服輕身益氣力延年神仙生池澤名醫曰生河東四月採案玉篇云蒚謂今蒲頭有臺臺上有重臺中出黃即蒲黃陶弘景雲此即蒲釐花上黃粉也仙經亦用此考爾雅苻離其上蒚苻離與蒲釐聲相近疑即此香蒲味甘平主五臟心下邪氣口中爛臭堅齒明目聰耳久服輕身耐老御覽作能老一名睢御覽云睢蒲生池澤吳普曰睢一名睢石一名香蒲神農雷公甘生南海池澤中御覽名醫曰一名醮生南海案說文云菩草也玉篇云菩香草也又音蒲本草圖經云香蒲蒲黃苗也春初生嫩葉未出水時紅白色茸茸然周禮以為菹續斷味苦微溫主傷寒補不足金創癰傷折跌續筋骨婦人乳難御覽作乳癰云崩中漏血大觀本作黑字久服益氣力一名龍豆一名屬折生山谷名醫曰一名接骨一名南草一名槐生常山七月八月採陰乾案廣雅云褱續斷也範子計然云續斷出三輔桐君藥録云續斷生蔓延葉細莖如荏大根本黃白有汁七月八月採根漏蘆味甘鹹寒主皮膚熱惡創疽痔濕痹下乳汁久服輕身益氣耳目聰明不老延年一名野蘭生山谷名醫曰生喬山八月採根陰乾案廣雅云飛廉漏蘆也陶弘景雲俗中取根名鹿驪營實味酸溫主癰疽惡創結肉跌筋敗創熱氣陰蝕不療利關節一名牆薇一名牆麻一名牛棘生川穀吳普曰薔薇一名牛勒一名牛膝一名薔薇一名山棗御覽名醫曰一名牛勒一名薔蘼一名山棘生零陵及蜀郡八月九月採陰乾案陶弘景雲即是牆薇子天名精味甘寒主瘀血血瘕欲死下血止血利小便久服輕身耐老一名麥句姜一名蝦蟆藍一名豕首生川澤名醫曰一名天門精一名玉門精一名彘顱一名蟾蜍蘭一名覲生平原五月採案說文云薽豕首也爾雅云茢薽豕首郭璞云今江東呼豨首可以煼蠶蛹陶弘景雲此即今人呼為豨蘞唐本云鹿活草是也別録一名天蔓菁南文呼為地松掌禹錫云陳藏器別立地菘條後人不當仍其謬決明子味鹹平主青盲目淫膚赤白膜眼赤痛淚出久服益精光太平御覽引作理目珠精理即治字輕身生川澤吳普曰決明子一名草決明一名羊明御覽名醫曰生龍門石決明生豫章十月採陰乾百日案廣雅云羊𧃐草蠋英光也又決明羊明也爾雅云薢茩英光郭璞云英明也葉黃鋭赤花實如山茱萸陶弘景雲形似馬蹄決明丹參味苦微寒主心腹邪氣腸鳴幽幽如走水寒熱積聚破症除瘕止煩滿益氣一名卻蟬草生川穀吳普曰丹參一名赤參一名木羊乳一名卻蟬草神農桐君黃帝雷公扁鵲苦無毒李氏小寒岐伯咸生桐柏或生太山山陵陰莖花小方如荏毛根赤四月花紫五月採根陰乾治心腹痛御覽名醫曰一名赤參一名木羊乳生桐柏山及太山五月採根曝乾案廣雅云卻蟬丹參也茜根味苦寒主寒濕風痹黃疸補中生川穀名醫曰可以染絳一名地血一名茹藘一名茅搜一名茜生喬山二月三月採根陰乾案說文云茜茅搜也搜茅搜茹藘人血所生可以染絳從草從鬼廣雅云地血茹藘茜也爾雅云茹藘茅鬼郭璞云今茜也可以染絳毛詩云茹藘在阪傳云茹藘茅搜也陸璣云一名地血齊人謂之茜徐州人謂之牛蔓徐廣注史記云茜一名紅藍其花染繪赤黃也按名醫別出紅藍條非飛廉味苦平主骨節熱脛重痠疼久服令人身輕一名飛輕已以上四字原本黑字生川澤名醫曰一名伏兔一名飛雉一名木禾生河內正月採根七月八月採花陰乾案廣雅云伏豬木禾也飛廉漏蘆也陶弘景雲今既別有漏蘆則非此別名耳五味子味酸溫主益氣咳逆上氣勞傷羸瘦補不足強陰益男子精御覽引云一名會及大觀本作黑字生山谷吳普曰五味子一名元及御覽名醫曰一名會及一名元及生齊山及代郡八月採實陰乾案說文云菋豬也荎荎豬草也藸荎藸也廣雅云會及五味也爾雅云菋荎藸郭璞云五味也蔓生子叢在莖頭抱朴子仙藥篇云五味者五行之精其子有五味移門子服五味子十六年色如玉女入水不沾入火不灼也旋華味甘溫主益氣去面皯御覽作䵟黑色媚好御覽作令人色悅澤其根味辛主腹中寒熱邪氣利小便久服不飢輕身一名筋根華一名金沸御覽引云一名美草大觀本作黑字生平澤名醫曰生豫州五月採陰乾案陶弘景雲東人呼為山姜南人呼為美草本草衍義云世又謂之鼓子花蘭草味辛平主利水道殺蠱毒闢不祥久服益氣輕身不老通神明一名水香生池澤名醫曰生大吳四月五月採案說文云蘭香草也廣雅云蕳蘭也易其臭如蘭鄭云蘭香草也夏小正五月蓄蘭毛詩云方秉蕳分傳云蕳蘭也陸璣云蕳即蘭香草也其莖葉似藥草澤蘭範子計然云大蘭出漢中三輔蘭出河東宏農白者善元楊齊賢注李白詩引本草云蘭草澤蘭二物同名蘭草一名水香云都梁是也水經零陵郡都梁縣西小山上有渟水其中悉生蘭草緑葉紫莖澤蘭如薄荷微香荊湘嶺南人家多種之與蘭大抵相類顏師古以蘭草為澤蘭非也蛇床子味苦平主婦人陰中腫痛男子陽痿濕癢除痹氣利關節癲癇惡創久服輕身一名蛇米生川穀及田野吳普曰蛇床一名蛇珠御覽名醫曰一名蛇粟一名虺床一名思鹽一名繩毒一名棗棘一名牆蘼生臨淄五月採實陰乾案廣雅云蛇粟馬床蛇床也爾雅云盱虺床淮南子汜論訓云亂人者若蛇床之與蘼蕪地膚子味苦寒主膀胱熱利小便補中益精氣久服耳目聰明輕身耐老一名地葵御覽引云一名地華一名地脈大觀本無一名地華四字脈作麥皆黑字生平澤及田野名醫曰一名地麥生荊州八月十月採實陰乾案廣雅云地葵地膚也列仙傳云文賓服地膚鄭樵云地膚曰落帚亦曰地掃爾雅云荓馬帚即此也今人亦用為帚景天味苦平主大熱火創身熱煩邪惡氣花主女人漏下赤白輕身明目一名戒火一名慎火御覽引云一名水母大觀本作黑字水作火生川穀名醫曰一名火母一名救火一名據火生太山四月四日七月七日採陰乾案陶弘景雲今人皆盆養之於屋上云以闢火茵陳御覽作茵蒿味苦平主風濕寒熱邪氣熱結黃疸久服輕身益氣耐老御覽作能老生邱陵阪岸上吳普曰因塵神農岐伯雷公苦無毒黃帝辛無毒生田中葉如藍十一月採御覽名醫曰白兔食之仙生太山五月及立秋採陰乾案廣雅云因塵馬先也陶弘景雲仙經云白蒿白兔食之仙而今茵陳乃云此恐非耳陳藏器云茵陳經冬不死因舊苗而生故名茵陳後加蒿字也據此知舊作茵陳蒿非又按廣雅云馬先疑即馬新蒿亦白蒿之類杜若味辛微溫主胸脅下逆氣溫中風入腦戶頭腫痛多涕淚出久服益精藝文類聚引作益氣明目輕身一名杜衡藝文類聚引作蘅非生川澤名醫曰一名杜連一名白連一名白苓一名若芝生武陵及冤句二月八月採根曝乾案說文云若杜若香草廣雅云楚蘅杜蘅也西山經云於帝之上有草焉其狀如葵其臭如蘼蕪名曰杜蘅爾雅云杜土滷郭璞云杜蘅也似葵而香楚詞云採芳州兮杜若範子計然云杜若生南郡漢中又云秦蘅出於隴西天水沈括補筆談云杜若即今之高良薑後人不識又別出高良薑條按經云一名杜蘅是名醫別出杜蘅條非也蘅正字俗加草沙參味苦微寒主血積驚氣除寒熱補中益肺氣久服利人一名知母生川穀吳普曰白沙參一名苦心一名識美一名虎鬚一名白參一名志取一名文虎神農黃帝扁鵲無毒岐伯咸李氏小寒生河內川穀或般陽瀆山三月生如葵葉青實白如芥根大白如蕪菁三月採御覽名醫曰一名苦心一名志取一名虎鬚一名白參一名識美一名文希生河內及冤句般陽續山二月八月採根曝乾案廣雅云苦心沙參也其蒿青蓑也範子計然云白沙參出洛陽白者善白兔藿味苦平主蛇虺蜂蠆狾狗菜肉蠱毒注一名白葛生山谷吳普曰白兔藿一名白葛谷御覽名醫曰生交州案陶弘景雲都不聞有識之者都富似葛耳唐本注云此草荊襄山谷大有俗謂之白葛徐長卿味辛溫主鬼物百精蠱毒疫疾邪惡氣溫瘧久服強悍輕身一名鬼督郵生山谷吳普曰徐長卿一名石下長卿神農雷公辛或生隴西三月採御覽名醫曰生太山及隴西三月採案廣雅云徐長卿鬼督郵也陶弘景雲鬼督郵之名甚多今俗用徐長卿者其根正如細辛小短扁扁爾氣亦相似石龍芻味苦微寒主心腹邪氣小便不利淋閉風濕鬼注惡毒久服補虛羸輕身耳目聰明延年一名龍鬚一名草續斷一名龍珠生山谷吳普曰龍芻一名龍多一名龍鬚一名續斷一名龍本一名草毒一名龍華一名懸莞神農李氏小寒雷公黃帝苦無毒扁鵲辛無毒生梁州七月七日採御覽此條誤附續斷名醫曰一名龍華一名懸莞一名草毒生梁州濕地五月七月採莖曝乾案廣雅云龍木龍鬚也中山經云賈超之山其中多龍修郭璞云龍鬚也似莞而細生山石穴中莖列垂可以為席別録云一名之賓鄭樵云爾雅所謂草廠畀鼠莞也舊作芻非薇銜味苦平主風濕痹歷節痛驚癇吐舌悸氣賊風鼠瘻癰腫一名糜銜生川澤吳普曰薇䕔一名糜痹一名無顛一名承膏一名醜一名無心御覽名醫曰一名承膏一名承肌一名無心一名無顛生漢中及冤句邯鄲七月採莖葉陰乾雲實味辛溫主泄利舊作痢御覽作泄利腸澼殺蟲蠱毒去邪惡結氣止痛除熱平主見鬼精物多食令人狂走久服輕身通神明生川穀吳普曰雲實一名員實一名天豆神農辛小溫黃帝咸雷公苦葉如麻兩兩相值高四五尺大莖空中六月花八月九月實十月採御覽名醫曰一名員實一名雲英一名天豆生河間十月採曝乾案廣雅云天豆雲實也王不留行味苦平主金創止血逐痛出刺除風痹內寒久服輕身耐老御覽作能老增壽生山谷吳普曰王不留行一名王不流行神農苦平岐伯雷公甘三月八月採御覽案鄭樵云王不留行曰禁宮花曰剪金花葉似花實作房升麻味甘辛大觀本作甘平主解百毒殺百老物殃鬼闢溫疾障邪毒蠱久服不夭大觀本作主解百毒殺百精老物殃鬼闢瘟疫瘴氣邪氣蟲毒此用御覽文一名周升麻大觀本作周麻生山谷舊作黑字據吳普有云神農甘則本經當有此今增入吳普曰升麻神農甘御覽名醫曰生益州二月八月採根曬乾案廣雅云周麻升麻也此據御覽青蘘味甘寒主五臟邪氣風寒濕痹益氣補腦髓堅筋骨久服耳目聰明不飢不老增壽巨勝苗也生川穀舊在米穀部非吳普曰青襄一名夢神神農苦雷公甘御覽名醫曰生中原案抱朴子仙藥篇云孝經援神契曰巨勝延年又云巨勝一名胡麻餌服之不老耐風濕補衰老也姑活味甘溫主大風邪氣濕痹寒痛久服輕身益壽耐老一名冬葵子舊在唐本草中無毒今增名醫曰生河東案水經注解縣引神農本草云地有固活女疏銅藝紫苑之族也陶弘景雲方藥亦無用此者乃有固活丸即是野葛一名此又名冬葵子非葵菜之冬葵子療體乖異別羈味苦微溫主風寒濕痹身重四肢疼酸寒邪歷節痛生川穀舊在唐本草中無毒今增名醫曰一名別枝一名別騎一名鱉羈生藍田二月八月採案陶弘景雲方家時有用處今俗亦絶耳屈草味苦主胸脅下痛邪氣腹間寒熱陰痹久服輕身益氣耐老御覽作補益能老生川澤舊在唐本草中無毒今增名醫曰生漢中五月採案陶弘景雲方藥不復用俗無識者淮木味苦平主久咳上氣腸中虛羸女子陰蝕漏下赤白沃一名百歲城中木生山谷舊在唐本草中無毒今增吳普曰淮木神農雷公無毒生晉平陽河東平澤治久咳上氣傷中羸虛補中益氣御覽名醫曰一名炭木生太山採無時案李當之云是樟樹上寄生樹大銜枝在肌肉今人皆以胡桃皮當之非也桐君云生上洛是木皮狀如厚朴色似桂白其理一縱一橫今市人皆削乃以厚朴而無正縱橫理不知此復是何物莫測真假何者為是也上草上品七十三種舊七十二種考門芝當一升升麻當白字米穀部誤入青襄唐本草六種姑活屈草淮木皆當入此牡桂味辛溫主上氣咳逆結氣喉痹吐吸利關節補中益氣久服通神輕身不老生山谷名醫曰生南海案說文云桂江南木百藥之長梫桂也南山經云招搖之山多桂郭璞云桂葉似枇杷長二尺余廣數寸味辛白花叢生山峰冬夏常青間無雜木爾雅云梫木桂郭璞云今人呼桂皮厚者為木桂及單名桂者是也一名肉桂一名桂枝一名桂心菌桂味辛溫主百病養精神和顏色為諸藥先聘通使久服輕身不老面生光華媚好常如童子生山谷名醫曰生交址桂林岩崖間無骨正圓如竹立秋採案楚詞云雜申椒與菌桂兮王逸云茮桂皆香木列仙傳云范蠡好服桂松脂味苦溫主疽惡創頭瘍白禿疥瘙風氣五臟除熱久服輕身不老延年一名松膏一名松肪生山谷名醫曰生太山六月採案說文云松木也或作窠範子計然云松脂出隴西松膠者善槐實味苦寒主五內邪氣熱止涎唾補絶傷五痔火創婦人乳瘕子藏急痛生平澤名醫曰生河南案說文云槐木也爾雅云櫰槐大葉而黑郭璞云槐樹葉大色黑者名為櫰又守宮槐葉晝聶宵炕郭璞云槐葉晝日聶合而夜炕布者名為守宮槐枸杞味苦寒主五內邪氣熱中消渴周痹久服堅筋骨輕身不老御覽作耐老一名杞根一名地骨一名枸杞一名地輔生平澤吳普曰枸杞一名枸己一名羊乳御覽名醫曰一名羊乳一名卻暑一名仙人杖一名西王母杖生常山及諸邱陵阪岸冬採根春夏採葉秋採莖實陰乾案說文云繼枸杞也杞枸杞也廣雅云地筋枸杞也爾雅云杞枸檵郭璞云今枸杞也毛詩云集子苞杞傳云杞枸檵也陸璣云苦杞秋熟正赤服之輕身益氣列仙傳云陸通食橐盧木實抱朴子仙藥篇云象紫一名托盧是也或名仙人杖或云西王母杖或名天門精或名卻老或名地骨或名枸杞也柏實味甘平主驚悸安五臟益氣除濕痹久服令人悅澤美色耳目聰明不飢不老輕身延年生山谷名醫曰生太山柏葉尤良田四時各依方面採陰乾案說文云柏鞠也廣雅云栝柏也爾雅云柏椈熟郭璞云禮記曰鬯日以椈範子計然云柏脂出三輔上升價七千中三千一斗伏苓味甘平主胸脅逆氣御覽作疝氣憂恚驚邪悸心下結痛寒熱煩滿咳逆口焦舌乾利小便久服安魂養神不飢延年一名茯菟御覽作茯神案原本云其有抱根者名茯神作黑字生山谷吳普曰茯苓通神桐君甘雷公扁鵲甘無毒或生茂州大松根下入地三丈一尺二月七日採御覽名醫曰其有抱根者名茯神生太山大松下二月八月採陰乾案廣雅云茯神茯苓也範子計然云茯苓出嵩高三輔列仙傳云昌容採茯苓餌而食之史記褚先生云傳曰下有伏靈上有菟絲所謂伏靈者在菟絲之下狀似飛鳥之形伏靈者千歲松根也食之不死淮南子說林訓云茯苓掘菟絲死舊作茯非榆皮味甘平主大小便不通利水道除邪氣久服輕身不飢其實尤良一名零榆生山谷名醫曰生潁川三月採皮取白曝乾八月採實案說文云榆白枌榆也廣雅云柘榆梗榆也爾雅云榆白枌郭璞云枌榆先生葉卻著莢皮色白又樞荎郭璞云今云刺榆毛詩云東門之枌傳云枌白榆也又山有藲傳云樞荎也陸璣云其針刺如柘其葉如榆渝為茹美滑如白榆之類有十種葉皆相似皮及木理異矣酸棗味酸平主心腹寒熱邪結氣聚四肢痠疼濕痹久服安五臟輕身延年生川澤名醫曰生河東八月採實陰乾四十日成案說文云樲酸棗也爾雅云樲酸棗郭璞云味小實酢孟子云養其樲棘趙岐云樲棘小棘所謂酸棗是也蘖木味苦寒主五臟腸胃中結熱黃疸腸痔止泄利女子漏下赤白陰陽蝕創一名檀桓生山谷名醫曰生漢中及永昌案說文云檗黃木也蘖木也司馬相如賦有蘖張揖云檗木可染者顏師古云蘖黃薜也乾漆味辛溫無毒主絶傷補中續筋骨填髓腦安五臟五緩六急風寒濕痹生漆去長蟲久服輕身耐老生川穀名醫曰生漢中夏至後採干之案說文云漆木汁可以䰍物象形漆如水滴而下以漆為漆水字周禮載師云漆林之徵鄭元云故書漆林為漆林杜子春云當為漆林五加皮孕辛溫主心腹疝氣腹痛益氣療躄小兒不能行疸創陰蝕一名豺漆名醫曰一名豺節生漢中及冤句五月十月採莖十月採根陰乾案大觀本草引東華真人煮石經云舜常登蒼梧山曰厥金玉之香草朕用偃息正道此乃五加皮魯定公母單服五加酒以致不死蔓荊實味苦微寒主筋骨間寒熱痹拘攣明目堅齒利九竅去白蟲久服輕身耐老小荊實亦等生山谷名醫曰生河間南陽冤句或平壽都鄉高岸上及田野中八月九月採實陰乾案廣雅云牡荊蔓荊也廣志云楚荊也牡荊蔓荊也據牡曼聲相近故本經於蔓荊不載所出州土以其見牡荊也今或別為二條非辛夷味辛溫主五臟身體寒風頭腦痛面皯久服下氣輕身明目增年耐老一名辛矧御覽作引一名侯桃一名房木生川穀名醫曰九月採實曝乾案漢書楊雄賦云列新雉於林薄師古云新雉即辛夷耳為樹甚大其木枝葉皆芳一名新矧史記司馬相如傳雜以流夷注漢書音義曰流夷新夷也陶弘景雲小時氣辛香即離騷所呼辛夷者陳藏筆器云初發如筆北人呼為木筆其花最早南人呼為迎春按唐人名為玉蕊又曰玉蘭桑上寄生味苦平主腰痛小兒背強癰腫安胎充肌膚堅發齒長鬚眉其實明目輕身通神一名寄屑一名寓木一名宛童生川穀名醫曰一名蔦生宏農桑樹上三月三日採莖陰乾案說文云蔦寄生也詩曰蔦與女蘿或作暴頁廣雅云宛童寄生也寄生暴頁也又寄屏寄生也中山經云龍山上多寓木郭璞云寄生也爾雅云寓木宛童郭璞云寄生樹一名蔦毛詩云蔦與女蘿傳云蔦寄生山也陸璣云蔦一名寄生葉似當盧子如覆盆子赤黑甜美杜仲味辛平主腰脊痛補中益精氣堅筋骨強志除陰下癢濕小便餘瀝久服輕身耐老一名思仙生山谷吳普曰杜仲一名木綿一名思仲御覽名醫曰一名思腫一名木綿生上虞及上黨漢中二月五月六月九月採皮案廣雅云杜仲曼榆也博物志云杜仲皮中有絲折之則見女貞實味苦平主補中安五臟養精神除百疾久服肥健輕身不老生山谷名醫曰生武陵立冬採案說文云楨剛木也東山經云太山上多楨木郭璞云女楨也葉冬不凋毛詩云南山有杞陸璣云木杞其樹如樗陳藏器作栗一名狗骨理白滑其子為木虻子可合藥司馬相如賦有女貞師古曰女貞樹冬夏常青未嘗凋落苦有節操故以名為焉陳藏器云冬青也木蘭味苦寒主身大熱在皮膚中去面熱赤皰酒皶惡風癲疾陰下癢濕明耳目一名林蘭生川穀名醫曰一名杜蘭皮似桂而香生零陵及太山十二月採皮陰乾案廣雅云木欄桂欄也劉逵注蜀都賦云木蘭大樹也葉似長生冬夏榮常以冬花其實如小柿甘美南人以為梅其皮可食顏師古注漢書云皮似椒而香可作面膏藥蕤核味甘溫主心腹邪氣明目目赤痛傷淚出久服輕身益氣不飢生川穀吳普曰蕤核一名𦳚神農雷公甘平無毒生池澤八月採補中強志明目久服不飢御覽名醫曰生函谷及巴西案說文云桵白桵棫爾雅云棫白妥郭璞云桵小木叢生有刺實如耳璫紫赤可啖一切經音義云本草作蕤今桵核是也橘柚味辛溫主胸中瘕熱逆氣利水穀久服去臭下氣通神一名橘皮生川穀舊在果部非名醫曰生南山江南十月採案說文云橘果出江南柚條也似橙而酢爾雅云柚條郭璞云似橙實酢生江南禹貢云厥包橘柚僞孔云大曰橘小曰柚列子湯問篇云吳楚之國有木焉其名為柚碧樹而冬生實丹而味酸食其皮汁已憤厥之疾司馬相如賦有橘柚張揖曰柚即橙也似橘而大味酢皮厚上木上品二十種舊一十九種考果部橘柚當入此發髲味苦溫主五癃關格不通利小便水道療小兒癇大人痙仍自還神化案說文云髮根也髲鬄也鬄髲也或作髢毛詩云不屑髢也箋云髢髲也儀禮云主婦被錫注云被錫讀為髲鬄古者或剔賤者刑者之發以被婦人之紒為飾因名髲鬄焉李當之云是童男發據漢人說發髲當是剃荊人發或童男發本經不忍取人發用之故用剃余也方家至用天靈蓋害及枯骨卒不能治病古人所無矣上人一種舊同龍骨味甘平主心腹鬼注精物老魁咳逆泄利膿血女子漏下癥瘕堅結小兒熱氣驚癇齒主小兒大人驚癇癲疾狂走心下結氣不能喘息諸痙殺精物久服輕身通神明延年生山谷吳普曰龍骨生晉地山谷陰大水所過處是龍死骨也青白者善十二月採或無時龍骨畏乾漆蜀椒理石龍齒神農李氏大寒治驚癇久服輕身御覽大觀本節文名醫曰生晉地及太山岩水岸上穴中死龍處採無時案範子計然云龍骨生河東麝香味辛溫主辟惡氣殺鬼精物溫瘧蠱毒癇痙去三蟲久服除邪不夢寤厭寐生川穀名醫曰生中臺及益州雍州山中春分取之生者益良案說文云麝如小麋臍有香黑色獐也御覽引多三字爾雅云麝父麇足郭璞云腳似麇有香牛黃味苦平主驚癇寒熱熱盛狂痙除邪逐鬼生平澤吳普曰牛黃味苦無毒牛出入呻御覽作鳴吼者有之夜有光御覽作夜視有光走御覽有牛字角中牛死入膽中如雞子黃後漢書延篤傳注名醫曰生晉地於牛得之即陰乾百日使時躁無令見日月光熊脂味甘微寒主風痹不仁筋急五臟腹中積聚寒熱羸瘦頭瘍白禿面皯皰久服強志不飢輕身生山谷名醫曰生雍州十一月取案說文云熊獸似豕山居冬蟄白膠味甘平主傷中勞絶腰痛羸瘦補中益氣女人血閉無子止痛安胎久服輕身延年一名鹿角膠名醫曰生雲中煮鹿角作之案說文云膠昵也作之以皮考工記云鹿膠青白牛膠火赤鄭云皆謂煮用其皮或用角阿膠味甘平主心腹內崩勞極灑灑如瘧狀腰腹痛四肢痠疼女子下血安胎久服輕身益氣一名傅致膠名醫曰生平東郡煮牛皮作之出東阿案二膠本經不著所出疑本經但作膠名醫增白字阿字分為二條上獸上品六種舊同丹雄雞味甘微溫主女人崩中漏下赤白沃補虛溫中止血通神殺毒闢不祥頭主殺鬼東門上者尤良肪主耳聾腸主遺溺肶胵裹黃皮主泄利尿白主消渴傷寒寒熱黑雌雞主風寒濕痹五緩六急安胎翮羽主下血閉雞子主除熱火瘡癇痙可作虎魄神物雞白蠹肥脂生平澤吳普曰丹雞卵可作琥珀御覽名醫曰生朝鮮案說文云雞知時畜也籀文作雞肪肥也腸大小腸也肶鳥胵胵鳥胃也𮏗糞也羽莖也翮羽鳥長毛也此作肶省文尿即尸公水字古文從亦𮏗假音字也雁肪味甘平主風攣拘急偏枯氣不通利久服益氣不飢輕身耐老一名鶩肪生池澤吳普曰雁肪神農岐伯雷公甘無毒御覽有鶩肪二字當作一名鶩肪殺諸石藥毒御覽引云採無時名醫曰生江南取無時案說文云雁鵝也鶩舒鳧也廣雅云𪀉鵝倉𪀉雁也鳧鶩鴨也爾雅云舒雁鵝郭璞云禮記曰出如舒雁今江東呼𪀉又舒鳧鶩郭璞云鴨也方言云雁自關而東謂之𪀉鵝南楚之外謂之鵝或謂之倉𪀉據說文云別有雁以為鴻雁字鴨字鴨即雁之急音此雁肪即鵝鴨脂也當作雁字名醫不曉別出鶩肪條又出白鴨鵝條反疑此為鴻雁何其謬也陶蘇皆亂說之上禽上品二種舊同石蜜味甘平主心腹邪氣諸驚痙癇安五臟諸不足益氣補中止痛解毒除衆病和百藥久服強志輕身不飢不老一名石飴生山谷吳普曰石蜜神農雷公甘氣平生河源或河梁御覽又一引云生武都山谷名醫曰生武都河源及諸山石中色白如膏者良案說文云蜜蜂甘飴也一曰螟子或作蜜中山經云平逢之山多沙石實惟蜂蜜之廬郭璞云蜜赤蜂名西京雜記云南越王獻高帝石蜜五斛玉篇云蠅螽甘飴也蘇恭云當去石字蜂子味甘平主風頭除蠱毒補虛羸傷中久服令人光澤好顏色不老大黃蜂子主心腹復滿痛輕身益氣土蜂子主癰腫一名蜚零生山谷名醫曰生武都案說文云蜂飛蟲螫人者古文省作螽廣雅云蠓螉蜂也又土蜂蠮螉也爾雅云土蜂郭璞云今江南大蜂在地中作房者為土蜂啖其子即馬蜂今荊巴間呼為蟺又木蜂郭璞云似土蜂而小在樹上作房江東亦呼為木蜂又食其子禮記檀弓云範則冠鄭云範蜂也方言云蜂燕趙之間謂之蠮螉其小者謂之蠮螉或謂之蚴蛻其大而蜜謂之壺蜂郭璞云今黑蜂穿竹木作孔亦有蜜者或呼笛師按蜂名為範者聲相近若司馬相如賦以泛為楓左傳渢渢即汛汛也蜜蠟味甘微溫主下利膿血補中續絶傷金創益氣不飢耐老生山谷名醫曰生武都蜜房木石間案西京雜記云南越王獻高帝蜜蠟二百枚玉篇云蠟蜜滓陶弘景雲白蠟生於蜜中故謂蜜蠟說文無蠟字張有云臘別蠟非舊作蠟今據改牡蠣味鹹平主傷寒寒熱溫瘧灑灑驚恚怒氣除拘緩鼠瘻女子帶下赤白久服強骨節殺邪氣延年一名蠣蛤生池澤名醫曰一名牡蛤生東海採無時案說文云蠆蚌屬似螊微大出海中今民食之讀苦賴又云蜃屬有三皆生於海蛤蠣千歲雀所化秦謂之牡蠣龜甲味鹹平主漏下赤白破癥瘕痎瘧五痔陰蝕濕痹四肢重弱小兒囟不合久服輕身不飢一名神屋生池澤名醫曰生南海及湖水中採無時案廣雅云介龜也高誘注淮南云龜殼龜甲也桑螵蛸味鹹平主傷中疝瘕陰痿益精生子女子血閉腰痛通五淋利小便水道一名蝕疣生桑枝上採蒸之吳普曰桑蛸條一名今本脫此二字蝕疣一名害焦一名致神農咸無毒御覽名醫曰螳螂子也二月三月採火炙案說文云蜱蜱蛸也或作蜱蛸蟲蛸螳螂子廣雅云䗚蟭烏涕冒焦螵蛸也爾雅云不過螳蠰其子蜱蛸郭璞云一名䗚焦螳蠰卵也範子計然云螵蛸出三輔上價三百舊作螵聲相近字之誤也玉篇云蜱同螵海蛤味苦平主咳逆上氣喘息煩滿胸痛寒熱一名魁蛤吳普曰海蛤神農甘岐伯甘扁鵲咸大節頭有文文如磨齒採無時名醫曰生南海案說文云蛤蜃屬海蛤者百歲燕所化魁蛤一名復纍老服翼所化爾雅云魁陸郭璞云本草云魁狀如海蛤圓而厚朴有理縱橫即今之蚶也周禮鱉人供𧓎鄭司農云𧓎蛤也杜子春云𧓎蚌也周書王會云東越海蛤孔晃云蛤文蛤按名醫別出海蛤條云一名魁陸一名活東非文蛤主惡瘡蝕御覽作除陰蝕五痔御覽下有大孔出血大觀本作黑字名醫曰生東海表有文採無時蠡魚初學記引作鱧魚味苦寒主濕痹面目浮腫下大水一名鮦魚生池澤案說文云䔡鮦也鮦䔡也讀若褲櫳褲襱廣雅云鱺鱺鮦也爾雅云鱧郭璞注鮦也毛詩云魴鱧傳云鱧鮦也據說文云鱧鱯也與䔡不同而毛萇郭璞以鯛釋鱧與許不合然初學記引此亦作鱧蓋二字音同以致訛舛不可得祥廣雅又作鱺亦間訛又廣志云豚魚一名鮦御覽更異解也又陸璣云鱧即鮑魚也似鱧狹厚今京東人猶呼鱧魚又本草衍義曰蠡魚今人謂之黑鯉魚道家以為頭有星為厭據此諸說若作鯉字說文所云鮦廣志以為江豚本草衍義以為黑鯉魚若作鯉字說文以為鱯廣雅以為鰻鱺陸璣以為鮑魚說各不同難以詳究鯉魚膽味苦寒主目熱赤痛青盲明目久服強悍益志氣志氣生池澤名醫曰生九江採無時案說文云鯉鱣也鱣鯉也爾雅云鯉鱣舍人云鯉一名鱣郭璞注鯉云今赤鯉魚注鱣云大魚似鱘毛詩云鱣鮪發發傳云鱣鯉也據此知郭璞別為二非矣古今注云兗州人呼赤鯉為赤驥謂青鯉為青馬黑鯉為元駒白鯉為白騏黃鯉為黃雉上蟲魚上品一十種舊同藕實莖味甘平主補中養神益氣力除百疾久服輕身耐老不飢延年一名水芝丹生池澤名醫曰一名蓮生汝南八月採案說文云藕夫渠根蓮夫渠之實也茄夫渠莖爾雅云荷芙渠郭璞云別名芙蓉江東呼荷又其莖茄其實蓮郭璞云蓮謂房也又其根藕大棗味甘平主心腹邪氣安中養脾肋十二經平胃氣通九竅補少氣少津液身中不足大驚四肢重和百藥久服輕身長年葉覆麻黃能令出汗生平澤吳普曰棗主調中益脾氣令人好顏色美志氣大觀本草引吳氏本草名醫曰一名干棗一名美棗一名良棗八月採曝乾生河東案說文云棗羊棗也爾雅云遵羊棗郭璞云實小而圓紫黑色今俗呼之為羊矢棗又洗大棗郭璞云今河東猗氏縣出大棗也如雞卵葡萄味甘平主筋骨濕痹益氣倍力強志令人肥健耐飢忍風寒久食輕身不老延年可作酒生山谷名醫曰生隴西五原敦煌案史紀大宛列傳云大宛左右以葡萄為酒漢使取其實來於是天子始種苜蓿葡萄肥饒也或疑本經不合有葡萄名醫所增當為黑字然周禮場人云樹之果蓏珍異之物鄭玄雲珍異葡萄枇杷之屬則古中國本有此大宛種類殊常故漢特取來植之舊作葡據史記作蒲蓬藟味酸平主安五臟益精氣長陰令堅強志倍力有子久服輕身不老一名覆盆生平澤吳普曰蒛盆一名決盆御覽甄氏本草曰覆盆子一名馬瘻一名陸荊同上名醫曰一名陵藟一名陰藥生荊山及冤句案說文云虆木也茥缺盆也廣雅云蒛盆陸英莓也爾雅云茥蒛盆郭璞云覆盆也實似莓而小亦可食毛詩云葛苗苗之陸璣云一名巨瓜似燕薁亦連蔓葉似艾白色其子赤可食列仙傳云昌容食蓬藟根李當之云即是人所食莓陶弘景雲蓬藟是根名覆盆是實名雞頭實味苦平主濕痹腰脊膝痛補中除暴疾益精氣強志令耳目聰明久服輕身不飢耐老神仙一名雁啄實生池澤名醫曰一名芡生雷澤八月採案說文云芡雞頭也廣雅云䓈芡雞頭也周禮籩人加籩之實芡鄭元云芡雞頭也方言云䓈芡雞頭也北燕謂之䓈青徐淮泗之間謂之芡南楚江湘之間謂之雞頭或謂之雁頭或謂之烏頭淮南子說山訓云雞頭已瘻高誘云水中芡幽州謂之雁頭古今注云葉似荷而大葉上蹙皺如沸實有芒刺其中有米可以度飢即今蔦子也上果上品五種舊六種今以橘柚入木胡麻味甘平主傷中虛羸補五內御覽作臟益氣力長肌肉填髓腦久服輕身不老一名巨勝葉名青蘘生川澤吳普曰胡麻一名方金神農雷公甘無毒一名狗蝨立秋採名醫曰一名狗蝨一名方莖一名鴻藏生上黨案廣雅云狗蝨巨勝藤苰胡麻也孝經援神契云鉕勝延年宋均云世以鉕勝為苟杞子陶弘景雲本生大宛故曰胡麻按本經已有此陶說非也且與麻賁並列胡之言大或以葉大於麻故名之麻賁味辛平主五勞七傷利五臟下血寒氣多食令人見鬼狂走久服通神明輕身一名麻勃麻子味甘平主補中益氣肥健不老神仙生川穀吳普曰麻子中仁神農岐伯辛雷公扁鵲無毒不欲牡蠣白薇先藏地中者食殺人麻藍一名麻賁一名青欲一名青葛神農辛岐伯有毒雷公甘畏牡蠣白薇葉上有毒食之殺人麻勃一名花雷公辛無毒畏牡蠣御覽名醫曰麻勃此麻花上勃勃者七月七日採良子九月採生太山案說文云麻與秫同人所治在屋下枲麻也萉枲實也或作黂荸麻母也𦯸𧐖也以賁為雜雜香草爾雅云黂枲實枲麻孫炎云黂麻子也郭璞云別二名又𧐖麻母郭璞云苴麻盛子者周禮籩朝事之籩其實麷鄭云黂枲實也鄭司農云麻實曰黂淮南子齊俗訓云胡人見黂不知其可以為布高誘云黂麻實也據此則弘景以為牡麻無實非也唐本以為麻實是上米谷上品二種舊三種今以青蘘入草冬葵子味甘寒主五臟六腑寒熱羸瘦五癃利小便久服堅骨長肌肉輕身延年名醫曰生少室山十二月採之案說文云薖古文終葵菜也廣雅云蘬葵也考薖與終形相近當即爾雅蔠葵爾雅云蔠葵繁露郭璞云承露也大莖小葉花紫黃色本草圖經云吳人呼為繁露俗呼胡燕支子可婦人塗面及作口脂按名醫別有落葵條一名繁露亦非也陶弘景以為終冬至春作子謂之冬葵不經甚矣莧實味甘寒主青盲明目除邪利大小便去寒熱久服益氣力不飢輕身一名馬莧名醫曰一名莫實生淮陽及田中葉如藍十一月採案說文云莧莧菜也爾雅云蕢赤莧郭璞云今莧葉之赤莖者李當之云莧實當是今白莧唐本注云赤莧一名𧂠今名莫實字誤瓜蒂味苦寒主大水身面四肢浮腫下水殺蠱毒咳逆上氣及食諸果病在胸腹中皆吐下之生平澤名醫曰生蒿高七月七日採陰乾案說文云瓜㼌也象形蒂瓜當也廣雅云水芝瓜也陶弘景雲甜瓜蒂也瓜子味甘平主令人閲澤好顏色益氣不飢久服輕身耐老一名水芝御覽作土芝生平澤吳普曰瓜子一名瓣七月七日採可作面脂御覽名醫曰一名白瓜子生蒿高冬瓜仁也八月採案說文云瓣瓜中實廣雅云冬瓜𦶍也其子謂之瓤陶弘景雲白當為甘舊有白字據名醫云列中白瓜子則本名當無苦菜味苦寒主五臟邪氣厭谷胃痹久服安心益氣聰察少臥輕身耐老一名荼草一名選生川穀名醫曰一名遊冬生益州山陵道旁凌冬不死三月三日採陰乾案說文云荼苦菜也廣雅云遊冬苦菜也爾雅云荼苦菜又檟苦荼郭璞云樹小如梔子冬生葉可煮作羹今呼早萊者為荼晚取者為茗一名荈蜀人名之苦菜陶弘景雲此即是今茗茗一名荼又令人不眠亦凌冬不凋而兼其止生益州唐本注駁之非矣選與荈音相近上菜上品五種舊同

body:
  text: 卷三下經下藥一百二十五種為左使主治病以應地多毒不可久服欲除寒熱邪氣破積聚愈疾者本下經石灰礬石鉛丹粉錫錫鏡鼻代赭戎鹽大鹽滷鹽白堊冬灰青琅玕上玉石下品八種舊一十二種附子烏頭天雄半夏虎掌鳶尾大黃葶藶桔梗莨蕩子草蒿旋覆花藜蘆鉤吻射干蛇合恆山蜀漆甘遂白蘞青葙子藿菌白芨大戟澤漆茵芋貫衆蕘花牙子羊躑躅商陸羊蹄萹蓄狼毒白頭翁鬼臼羊桃女青連翹閭茹烏韭鹿藿蚤休石長生陸英藎草牛萹夏枯草芫花上草下品四十九種舊四十八種巴豆蜀椒皂莢柳花楝實郁李仁莽草雷丸桐葉梓白皮石南黃環溲疏鼠李藥實根欒花蔓椒上木下品一十七種舊一十八種豚卵麇脂鼺鼠六畜毛蹄甲上獸下品四種舊同蛤蟆馬刀蛇蛻蚯蚓蠮螉蜈蚣水蛭班苗貝子石蠶雀甕蜣螂螻蛄馬陸地膽鼠婦熒火衣魚上蟲魚下品一十九種舊一十八種桃核仁杏核仁上下品三種舊同腐婢上米谷下品一種舊同苦瓠水靳上菜下品二種舊同彼子上一種未祥附吳普本草石灰味辛溫主疽瘍疥瘙熱氣惡創癩疾死肌墮眉殺痔蟲去黑子息肉一名惡疢生山谷名醫曰一名希疢生中山按惡灰疑當為堊灰希石聲之緩急礜石味辛大熱主寒熱鼠瘻蝕創死肌風痹腹中堅一名青分石一名立制石一名固羊石御覽引云除熱殺百獸大觀本作黑字出山谷吳普曰白鞏石一名鼠鄉神農岐伯辛有毒桐君有毒黃帝甘有毒李氏云或生魏興或生少室十二月採御覽引云一名太白一名澤乳一名食鹽又云李氏大寒主溫熱名醫曰一名白鞏石一名太白石一名澤乳一名食鹽生漢中及少室採無時案說文云鞏毒石也出漢中西山經云皋塗之山有白石焉其名曰鞏可以毒鼠範子計然云鞏石出漢中色白者善淮南子地形訓云白天九百歲生白鞏高誘云白鞏鞏石也又說林訓云人食鞏石而死蠶食之而肥高誘云出陰山一曰能殺鼠案西山經云毒鼠即治鼠瘻也鉛丹味辛微寒主土逆胃反驚癇癲疾除熱下氣煉化還成九光久服通神明御覽引作吐下云久服成仙生平澤名醫曰一名鉛華生蜀郡案說文云鉛青金也陶弘景雲即今熬鉛所作黃丹也粉錫味辛寒主伏尸毒螫殺三蟲一名解錫錫鏡鼻主女子血閉癥瘕伏腸絶孕生山谷舊作二種今並名醫曰生桂陽案說文云錫銀鉛之間也代赭味苦寒主鬼注賊風蠱毒殺精物惡鬼腹中毒邪氣女子赤沃漏下一名須丸生山谷名醫曰一名血師生齊國赤紅青色如雞冠有澤染爪甲不渝者良採無時案說文云赭赤土也北山經云少陽之山其中多美赭管子地數篇云山上有赭者其下有鐵範子計然云石赭出齊郡赤色者善蜀赭出蜀郡據元和郡縣志云少陽山在交城縣其地近代也戎鹽主明目目痛益氣堅肌骨去毒蠱大鹽令人吐御覽引云主腸胃結熱大觀本作黑字滷鹽味苦寒主大熱消渴狂煩除邪及下蠱毒柔肌膚御覽引云一名寒石明目益氣生池澤舊作三種今並名醫曰戎鹽一名胡鹽生胡鹽山及西羌北地酒泉福祿城東南角北海青南海赤十月採大鹽生邯鄲又河東滷鹽生河東鹽池案說文云鹽咸也古者宿沙初作煮海鹽滷西方咸地也從西省象鹽形安定有滷縣東方謂之斥西方謂之滷鹽河東鹽池袤五十一里廣七里周百十六里北山經云景山南望鹽販之澤郭璞云即解縣鹽池也今在河東猗氏縣案在山西安邑運城白堊味苦溫主女子寒熱癥瘕目閉積聚生山谷吳普曰白堊一名白蟺一切經音義名醫曰一名白善生邯鄲採無時案說文云堊白塗也中山經云蔥聾之山是多白堊冬灰味辛微溫主黑子去疣息肉疽蝕疥瘙一名藜灰生川澤名醫曰生方谷青琅玕味辛平主身癢火創癰傷疥瘙死肌一名石珠生平澤名醫曰一名青珠生蜀郡採無時案說文云琅玕似珠者古文作禹貢云雍州貢與𧸗琳琅木草癶日小鄭云琅木草癶日小珠也上玉石下品九種舊十二種粉錫錫鏡鼻為二戎鹽大鹽滷鹽為非三考當各為一附子味辛溫主風寒咳逆邪氣溫中金創破症堅積聚血瘕寒濕踒御覽作痿躄拘攣腳痛不能行步御覽引云為百藥之長大觀本作黑字生山谷吳普曰附子一名莨神農辛岐伯雷公甘有毒李氏苦有毒大溫或生廣漢八月採皮黑肥白御覽名醫曰生楗為及廣漢東月採為附子春採為烏頭御覽案範子計然云附子出蜀武都中白色者善烏頭味辛溫主中內惡風洗洗出汗除寒濕痹咳逆上氣破積聚寒熱其汁煎之名射罔殺禽獸一名奚毒一名即子一名烏喙生山谷吳普曰烏頭一名莨一名千狄一名毒公一名卑負御覽作果負一名耿子神農雷公桐君黃帝甘有毒正月始生葉厚莖方中空葉四四相當與蒿相似又云烏喙神農雷公桐君黃帝有毒李氏小寒十月採形如烏頭有兩岐相合如烏之喙名曰烏喙也所畏惡使盡與烏頭同一名萴子一名莨神農岐伯有大毒李氏大寒八月採陰乾是附子角之大者畏惡與附子同御覽名醫曰生郎陵正月二月採陰乾長三寸以上為天雄按說文云萴烏喙也爾雅云芨堇草郭璞云即烏頭也江東呼為堇範子計然云烏頭出三輔中白者善國語云驪姬置堇於肉韋昭云堇烏頭也淮南子主術訓云莫凶於雞毒高誘云雞毒烏頭也按雞毒即奚毒即子即萴子側子也名醫別出側子條非天雄味辛溫主大風寒濕痹瀝節痛拘攣緩急破積聚邪氣金創強筋骨輕身健行一名白幕御覽引云長陰氣強志令人武勇力作不倦大觀本作黑字生山谷名醫曰生少室二月採根陰乾案廣雅云𧄝奚毒附子也一歲為萴子二歲為烏喙三歲為附子四歲為烏頭五歲為天雄淮南子繆稱訓云天雄烏喙藥之凶毒也良醫以活人半夏味辛平主傷寒寒熱心下堅下氣喉咽腫痛頭眩胸脹咳逆腸鳴止汗一名地文一名水玉以上八字原本黑字生川穀吳普曰半夏一名和姑生微邱或生野中葉三三相偶二月始生白花員上御覽名醫曰一名示姑生槐里五月八月採根曝乾案月令云二月半夏生範子計然云半夏出三輔色白者善列仙傳云赤松子服水玉以教神農疑即半夏別名虎掌味苦溫主心痛寒熱結氣積聚伏梁傷筋痿拘緩利水道生山谷吳普曰虎掌神農雷公苦無毒岐伯桐君辛有毒立秋九月採之御覽引云或生太山或宛朐名醫曰生漢中及冤句二月八月採陰乾案廣雅云虎掌瓜屬也鳶尾味苦平主蠱毒邪氣鬼注諸毒破癥瘕積聚去水下三蟲生山谷吳普曰鳶尾治蠱毒御覽名醫曰一名烏園生九嶷山五月採案廣雅云鳶尾烏萐射干也疑當作鳶尾烏園也烏翣射干也是二物唐本注云與射干全別大黃味苦寒主下瘀血血閉寒熱破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水殺御覽此下有道字調中化食安和五臟生山谷吳普曰大黃一名黃良一名火參一名膚如神農雷公苦有毒扁鵲苦無毒李氏小寒為中將軍或生蜀郡北部或隴西二月花生生黃赤葉四四相當黃莖高三尺許三月花黃五月實黑三月採根根有黃汁切陰乾御覽名醫曰一名黃良生河西及隴西二月八月採根火干案廣雅云黃良大黃也亭歷舊作葶藶御覽作亭歷味辛寒主癥瘕積聚結氣飲食寒熱破堅一名大室一名大適生平澤及田野名醫曰一名下歷一名蕇蒿生藁城立夏後採實陰乾得酒良案說文云蕇亭歷也廣雅云狗薺大室亭藶也爾雅云蕇亭歷郭璞云實葉皆似芥淮南子繆稱訓云亭歷愈張西京雜記云亭歷死於盛夏桔梗味辛微溫主胸脅痛如刀刺腹滿腸鳴幽幽驚恐悸氣御覽引云一名利如大觀本作黑字生山谷吳普曰桔梗一名符扈一名白芍一名利如一名梗草一名盧如神農醫和苦無毒扁鵲黃帝咸岐伯雷公甘無毒李氏大寒葉如薺苨莖如筆管紫赤二月生御覽名醫曰一名利如一名房圖一名白藥一名梗草一名薺苨生蒿高及冤句二八月採根曝乾案說文云桔桔梗藥名廣雅云犁如桔梗也戰國策云今求柴胡及之睪黍梁父之陰則郤車而載耳桔梗於沮澤則纍世不得一焉爾雅云苨茋苨郭璞云薺苨據名醫是此是別名下又出薺苨條非然陶弘景亦別為二矣莨蕩子味苦寒主齒痛出蟲肉痹拘急使人健行見鬼多食令人狂走久服輕身走及奔馬強志益力通神一名橫唐生川穀名醫曰一名行唐生海濱及壅州五月採子案廣雅云𦶐萍䕞蕩也陶弘景雲今方家多作狼蓎舊作菪案說文無菪蓎字史記淳于意傳云淄川王美人懷子而不乳引以莨蕩藥一撮本草圖經引作浪蕩是草蒿味苦寒主疥瘙痂癢惡創殺蟲留熱在骨節間明目一名青蒿一名方潰生川澤名醫曰生華陰案說文云蒿菣也菣香蒿也或作𦸃爾雅云蒿菣郭璞云今人呼青蒿香中炙啖者為菣史記司馬相如傳菴䕡注漢書音義曰菴䕡蒿也陶弘景雲即今青蒿旋覆花味鹹溫主結氣脅下滿驚悸除水去五臟間寒熱補中下氣一名金沸草一名盛椹生川穀名醫曰一名戴椹生平澤五月採花曬乾二十日成案說文云蕧盜庚也爾雅云蕧盜庚郭璞云旋覆似菊藜蘆御覽作梨蘆味辛寒主蠱毒咳逆泄利腸澼頭瘍疥瘙惡創殺諸蠱毒去死肌一名蔥苒生山谷吳普曰藜蘆一名蔥葵一名豐蘆一名蕙葵御覽引云一名山蔥一名公苒神農雷公辛有毒御覽引云玄黃帝有毒岐伯咸有毒李氏大寒大毒扁鵲苦有毒大寒葉根小相連御覽引云二月採根名醫曰一名蔥菼一名山蔥生太山三月採根陰乾案廣雅云藜蘆蔥苒也範子計然云藜蘆出河東黃白者善爾雅云茖山蔥疑非此鉤吻御覽作吻味辛溫主金創乳痓中惡風咳逆上氣水腫殺鬼注舊作疰御覽作注是蠱毒一名野葛生山谷吳普曰秦鉤腸一名毒根一名野葛神農辛雷公有毒殺人生南越山或益州葉如葛赤莖大如箭方根黃或生會稽東治正月採御覽名醫曰生傅高山及會稽東野案廣雅云莨鉤吻也淮南子說林訓云蝮蛇螫人敷以和堇則愈高誘云和堇野葛毒藥博物志云鉤吻毒桂心蔥葉沸解之陶弘景雲或云鉤吻是毛莨沈括補筆談云閩中人呼為吻莽亦謂之野葛嶺南人謂之胡蔓俗謂之斷腸草此草人間至毒之物不入藥用恐本草所出別是一物非此鉤吻也射干味苦平主咳逆上氣喉痹咽痛不得消息散急氣腹中邪逆食飲大熱一名烏扇一名烏蒲生川穀吳普曰射干一名黃遠也御覽名醫曰一名烏翣一名烏吹一名草姜生南陽田野三月三日採根陰乾案廣雅云鳶尾烏萐射干也荀子勸學篇云西方有木焉名曰射干莖長四寸範子計然云射干根如囗囗囗安定蛇合原注云合是含字味苦微寒主驚癇寒熱邪氣除熱金創疽痔鼠瘻惡創頭瘍一名蛇銜生山谷名醫曰生益州八月採陰乾按本草圖經云或云是雀瓢即是蘿摩之別名據陸璣云芄蘭一名蘿摩幽州謂之雀瓢則即爾雅雚芄蘭也唐本草別出蘿摩條非又見女青恆山舊作常山御覽作恆山是味苦寒主傷寒寒熱熱發溫瘧鬼毒胸中痰結吐逆一名互草生川穀吳普曰恆山一名漆葉神農岐伯苦李氏大寒桐君辛有毒二月八月採名醫曰生益州及漢中八月採根陰乾案後漢書華他傳云他授以漆葉青黏散漆葉屑一斗青黏十四兩以是為率言久服去三蟲利五臟輕體使人頭不白蜀漆味辛平主瘧及咳逆寒熱腹中症堅痞結積聚邪氣蠱毒鬼注舊作疰御覽作蛀生川穀吳普曰蜀漆葉一名恆山神農岐伯雷公辛有毒黃帝辛一經酸如漆葉藍青相似五月採御覽名醫曰生江陵山及蜀漢中常山苗也五月採葉陰乾案廣雅云恆山蜀漆也範子計然云蜀漆出蜀郡甘遂味苦寒主大腹疝瘕腹滿面目浮腫留飲宿食破症堅積聚利水穀道一名主田生川穀吳普曰甘遂一名主田一名白澤一名重澤一名鬼醜一名陵藁一名甘槁一名甘澤神農桐君苦有毒歧伯雷公有毒須二月八月採御覽名醫曰一名甘藁一名陵藁一名陵澤一名重澤生中山二月採根陰乾案廣雅云陵澤甘遂也範子計然云甘遂出三輔白蘞味苦平主癰腫疽創散結氣止痛除熱目中赤小兒驚癇溫瘧女子陰中腫痛一名免核一名白草生山谷名醫曰一名白根一名崑崙生衡山二月八月採根曝乾案說文云蘞白蘞也或作蘞毛詩云蘞蔓於野陸璣疏云蘞似栝蔞葉盛而細其子正黑如燕薁不可食也幽人謂之烏服其莖葉鬻以哺牛除熱爾雅云镸舜菟荄郭璞云未詳據玉篇云镸舜白蘞也經云一名菟核核與荄聲相近即此矣青葙子味苦微寒主邪氣皮膚中熱風瘙身癢殺三蟲子名草決明療唇口青一名草蒿一名萋蒿生平谷名醫曰生道旁三月三日採莖葉陰乾五月六日採子案魏略云初平中有青牛先生常服青葙子葙當作箱字雚菌味鹹平主心痛溫中去長患白瘲蟯蟲蛇螫毒癥瘕諸蟲一名雚蘆生池澤名醫曰生東海及渤海章武八月採陰乾案爾雅云滇灌茵芝文選注引作菌聲類云滇灌茵芝也疑即此灌菌或一名滇一名芝未敢定之白芨御覽作芨味苦平主癰腫惡創敗疽傷陰死肌胃中邪氣賊風鬼擊痱緩不收一名甘根一名連及草生川穀吳普曰神農苦黃帝辛李氏大寒雷公辛無毒莖葉似生薑藜蘆十月花直上紫赤根白連二月八月九月採名醫曰生北山及冤句及越山案隋羊公服黃精法云黃精一名白芨亦為黃精別名今名醫別出黃精條大戟味苦寒主蠱毒十二水腫滿急痛積聚中風皮膚疼痛吐逆一名卬巨案此無生川澤三字者古或與澤漆為一條名醫曰生常山十二月採根陰乾案爾雅云蕎卬巨郭璞云今藥草之戟也淮南子繆爾訓云大戟去水澤漆味苦微寒主皮膚熱大腹水氣四肢面目浮腫丈夫陰氣不足生川澤名醫曰一名漆莖大戟苗也生太山三月三日七月七日採莖葉陰乾案廣雅云黍莖澤漆也茵芋味苦溫主五臟邪氣心腹寒熱羸瘦如瘧狀發作有時諸關節風濕痹痛生川穀吳普曰茵芋一名卑共微溫有毒狀如莽草而細軟御覽名醫曰一名莞草一名卑共生太山三月三日採葉陰乾貫衆味苦微寒主腹中邪熱氣諸毒殺三蟲一名貫節一名貫渠一名百頭御覽作白一名虎卷一名扁符生山谷吳普曰貫衆一名貫來一名貫中一名渠母一名貫鍾一名柏芹一名藥藻一名扁符一名黃鐘神農岐伯苦有毒桐君扁鵲苦一經甘有毒黃帝咸酸一經苦無毒葉黃兩兩相對莖黑毛聚生冬夏不老四月花八月實黑聚相連卷旁行生三月八月採根五月採藥御覽名醫曰一名伯萍一名藥藻此謂草鴟頭生元山及冤句少室山二月八月採根陰乾案說文云𦬕草也廣雅云貫節貫衆也爾雅云濼費衆郭璞云葉圓鋭莖毛黑布地冬夏不死一名貫渠又上云扁符止郭璞云未祥據經云一名篇符即此也爾雅當云篇符止濼貫衆蕘花味苦平寒主傷寒溫瘧下十二水破積聚大堅癥瘕蕩滌腸胃中留癖飲食寒熱邪氣利水道生川穀名醫曰生咸陽及河南中牟六月採花陰乾牙子味苦寒主邪氣熱氣疥瘙惡瘍創痔去白蟲一名狼牙生川穀吳普曰狼牙一名支蘭一名狼齒一名犬牙一名抱子神農黃帝苦有毒桐君或咸岐伯雷公扁鵲無毒生冤句葉青根黃赤六月七月花八月實黑正月八月採根御覽名醫曰一名狼齒一名狼子一名犬牙生淮南及冤句八月採根曝乾案範子計然云狼牙出三輔色白者善羊躑躅味辛溫主賊風在皮膚中淫淫痛溫瘧惡毒諸痹生川穀吳普曰羊躑躅花神農雷公辛有毒生淮南治賊風惡毒諸邪氣御覽名醫曰一名玉支生太行山及淮南山三月採花陰乾案廣雅云羊躑躅英光也古今注云羊躑躅花黃羊食之則死羊見之則躑躅分散故名羊躑躅陶弘景雲花苗似鹿蔥商陸味辛平主水張疝瘕痹尉除癰腫殺鬼精物一名𦳝根一名夜呼生川穀名醫曰如人行者有神生咸陽案說文𦳝草枝枝相值葉葉相當廣雅云常蓼馬尾商陸也爾雅云蓫𧀫馬尾郭璞云今關西亦呼為陸也蓋𧀫即𦳝俗字商即𦳝假音羊蹄味苦寒主頭禿疥瘙除熱女子陰蝕御覽此四字作無字一名東方宿一名連蟲陸一名鬼目生川澤名醫曰名蓄生陳留案說文云荲草也讀若釐藋釐草也芨堇草也廣雅云荲羊蹄也毛詩云言採其蓫陸德明云本又作蓄陸璣云今人謂之羊蹄陶弘景雲今人呼禿菜即是蓄音之僞詩云言採其蓄案陸英疑即此草之花此草一名連蟲陸又陸英即蒴藋一名荲也亦苦寒萹蓄味辛平主浸淫疥瘙疽痔殺三蟲御覽引云一名篇竹大觀本無文生山谷吳普曰萹蓄一名蓄辨一名萹蔓御覽名醫曰生東萊五月採陰乾案說文云萹萹草工几也草工几萹草工几也藩水萹藩讀若督爾雅云竹萹蓄郭璞云似水藜赤莖節好生道旁可食又殺蟲毛詩云緑竹猗猗傳云竹萹竹也韓詩𦺇云𦺇萹草工几也石經同狼毒味辛平主咳逆上氣破積聚飲食寒熱水氣惡創鼠瘻疽蝕鬼精蠱毒殺飛鳥走獸一名續毒生山谷名醫曰生秦亭及奉高二月八月採根陰乾案廣雅云狼毒也疑上脫續毒二字中山經云大水畨之山有草焉其狀如蓍而毛青花而白實其名曰𦴭服之不夭可以為腹病白頭翁味苦溫主溫瘧易狂寒熱癥瘕積聚癭氣逐血止痛療金瘡一名野丈人一名胡王使者生山谷吳普曰白頭翁一名野丈人一名奈河草神農扁鵲苦無毒生嵩山川穀破氣狂寒熱止痛御覽名醫曰一名奈河草生高山及田野四月採案陶弘景雲近根處有白茸狀似人白頭故以為名鬼臼味辛溫主殺蠱毒鬼注精物辟惡氣不祥逐邪解百毒一名爵犀一名馬目毒公一名九臼生山谷吳普曰一名九臼一名天臼一名雀犀一名馬目公一名解毒生九真山谷及冤句二月八月採根御覽名醫曰一名天臼一名解毒生九真及冤句二月八月採根羊桃味苦寒主熛熱身暴赤色風水積聚惡瘍除小兒熱一名鬼桃一名羊腸生川穀名醫曰一名萇楚一名御弋一名銚弋生山林及田野二月採陰乾案說文云萇萇楚銚弋一名羊桃廣雅云鬼桃銚弋羊桃也中山經云豐山多羊桃狀如桃而方莖可以為皮張爾雅云長楚姚芅郭璞云今羊桃也或曰鬼桃葉似桃花白子如小麥亦似桃毛詩云隰有萇楚傳云萇楚銚弋也陸璣云今羊桃是也葉長而狹花紫赤色其枝莖弱過一尺引蔓於草上今人以為汲灌重而善沒不如楊柳也近下根刀切其皮著熱灰中脫之可韜筆管女青味辛平主蠱毒逐邪惡氣殺鬼溫瘧闢不祥一名雀瓢御覽作閭吳普曰女青一名霍由祗神農黃帝辛御覽名醫曰蛇銜根也生朱崖八月採陰乾案廣雅云女青烏葛也爾雅云芄蘭郭璞云雚芄蔓生斷之有白汁可啖毛詩云芄蘭之支傳云芄蘭草也陸璣云一名蘿摩幽州人謂之雀瓢別録云雀瓢白汁注蟲蛇毒即女青苗汁也唐本草別出蘿摩條非連翹味苦平主寒熱鼠瘻瘰癧癰腫惡創癭瘤結熱蠱毒一名異翹一名蘭花一名軹一名三廉生山谷名醫曰一名折根生太山八月採陰乾案爾雅云連異翹郭璞云一名連苕又名連本草云蘭茹御覽作閭是味辛寒主蝕惡肉敗創死肌殺疥蟲排膿惡血除大風善忘不樂生川穀吳普曰閭茹一名離樓一名屈居神農辛岐伯酸咸有毒李氏大寒二月採葉圓黃高四五尺葉四四相當四月花黃五月實黑根黃有汁亦同黃三月五月採根黑頭者良御覽名醫曰一名屈據一名離婁生代郡五月採陰乾案廣雅云屈居蘆茹也範子計然云閭茹出武都黃色者善烏韭味甘寒主皮膚往來寒熱利小腸膀胱氣生山谷石上案廣雅云昔邪烏韭也在屋曰昔邪在牆曰垣衣西山經云萆荔狀如烏韭唐本注云即石衣也亦名石苔又名石發按廣雅又云石發石衣也未知是一否鹿藿味苦平主蠱毒女子腰腹痛不樂腸癰瘰癧御覽作歷瘍氣生山谷名醫曰生汶山案說文云藨鹿藿也讀若剽廣雅云藨鹿藿也爾雅云蔨鹿藿其實莥郭璞云今鹿豆也葉似大豆根黃而香蔓延生蚤休味苦微寒主驚癇搖頭弄舌熱氣在腹中癲疾癰創陰蝕下三蟲去蛇毒一名蚩休生川穀名醫曰生山及冤句案鄭樵云蚤休曰螫休曰重樓金綿曰重臺曰草甘遂今人謂之紫河車服食家所用而莖葉亦可愛多植庭院間石長生味鹹微寒主寒熱惡創火熱闢鬼氣不祥御覽作辟惡氣不祥鬼毒一名丹草御覽引云丹沙草生山谷吳普曰石長生神農苦雷公辛一經甘生咸陽御覽名醫曰生咸陽陸英味苦寒主骨間諸痹四肢拘攣疼酸膝寒痛陰痿短氣不足腳腫生川穀名醫曰生熊耳及冤句立秋採又曰蒴藋味酸溫有毒一名堇今本誤作堇一名芨生田野春夏採葉秋冬採莖根案說文云堇草也讀若釐芨荲草也讀若急藋釐草也廣雅云蒛盆陸英莓也爾雅云芨荲草唐本注陸英云此物蒴藋是也後人不識浪出蒴藋條今注云陸英味苦寒無毒蒴藋味酸溫有毒既此不同難謂一種蓋其類爾藎草味苦平主久咳上氣喘逆久寒驚悸痂疥白禿瘍氣殺皮膚小蟲生川穀吳普曰王芻一名黃草神農雷公曰生太山山谷治身熱邪氣小兒身熱氣御覽名醫曰可以染黃作金公生青衣九月十月採案說文云藎草也䗫王芻也爾雅云䗫王芻郭璞云䗫蓐也今呼鴟腳莎毛詩云緑竹猗猗傳云䗫王芻也唐本注云藎草俗名䗫蓐草爾雅所謂王芻牛扁味甘微寒主身皮創熱氣可作浴湯殺牛蝨小蟲又療牛病生川穀名醫曰生桂陽案陶弘景雲太常貯名扁特或名扁毒夏枯草味苦辛主寒熱瘰癧鼠瘻頭創破症散癭結氣腳腫濕痹輕身一名夕句一名乃東生川穀名醫曰一名燕面生蜀郡四月採芫花味辛溫主咳逆上氣喉鳴喘咽腫短氣蠱毒鬼瘧疝瘕癰腫殺蟲魚一名去水生川穀舊在木部非吳普曰芫花一名去水一名敗花一名兒草根一名黃大戟神農黃帝有毒扁鵲岐伯苦李氏大寒二月生葉青加厚則黑華有紫赤白者三月實落盡葉乃生三月五月採花芫花根一名赤芫根神農雷公苦有毒生邯鄲九月八月採陰乾久服令人泄可用毒魚御覽亦見圖經節文名醫曰一名毒魚一名杜芫其根名蜀桑可用毒魚生淮源三月三日採藥陰乾案說文云芫魚毒也爾雅云杬魚毒郭璞云杬大木子似栗生南方皮厚汁赤中藏卵果範子計然云芫花出三輔史記倉公傳臨淄女子病蟯瘕飲以芫花一撮出蟯可數升病已顏師古注急就篇云郭景純說誤耳其生南方用藏卵果自別一杬木乃左思所云綿杬杶櫨者耳非毒魚之杬上草下品四十九種舊四十八種考木部芫華宜入此巴豆味辛溫主傷寒溫瘧寒熱破癥瘕結聚堅積留飲痰癖大腹水張蕩煉五臟六腑開通閉塞利水穀道去惡內除鬼毒蠱注邪物御覽作鬼毒邪注殺蟲魚一名巴叔占作椒御覽作菽生川穀吳普曰巴豆一名巴菽神農岐伯桐君辛有毒黃帝甘有毒李氏主溫熱寒葉如大豆八月採御覽名醫曰生巴郡八月採陰乾用之去心皮案廣雅云巴菽巴豆也列仙傳云元俗餌巴豆淮南子說林訓云魚食巴菽而死人食之而肥蜀菽味辛溫主邪氣咳逆溫中逐骨節皮膚死肌寒濕痹痛下氣久服之頭不白輕身增年生川穀名醫曰一名巴椒一名蓎藙生武都及巴郡八月採實陰乾案範子計然云蜀椒出武都赤色者善陸璣云蜀人作荼又見秦椒即爾雅莍陶弘景雲俗呼為樛皂莢味辛咸溫主風痹死肌邪氣風頭淚出利九竅殺精物生川穀名醫曰生壅州及魯鄒縣如豬牙者良九月十月採陰乾案說文云莢草實範子計然云皂莢出三輔上價一枚一錢廣志曰雞棲子皂莢也御覽皂即草省文柳花味苦寒主風水黃疸面熱黑一名柳絮葉主馬疥痂創實主潰癰逐膿血子汁療渴生川澤名醫曰生琅邪案說文云柳小楊也柳河柳也楊木也爾雅柳河柳郭璞云今河旁赤莖小楊又旄澤柳郭璞云生澤中者又楊蒲柳郭璞云可以為箭左傳所謂董澤之蒲毛詩云無折我樹杞傳云杞木名也陸璣云杞柳屬也楝實味苦寒主溫疾傷寒大熱煩狂殺三蟲疥瘍利小便水道生山谷名醫曰生荊山案說文云楝木也中山經云其實如楝郭璞云楝木名子如指頭白而黏可以浣衣也淮南子時則訓云七月其樹楝高誘云楝實鳳凰所食今雒城旁有楝樹實秋熟郁李仁味酸平主大腹水腫面目四肢浮腫利小便水道根主齒齦腫齲齒一名爵李生堅齒川穀吳普曰郁李一名雀李一名車下李一名棣御覽名醫曰一名車下李一名棣生高山及邱陵上五月六月採根案說文云棣白棣也廣雅云山李雀其鬱也爾雅云常棣棣郭璞云今關西有棣樹子如櫻桃可食毛詩云六月食鬱傳云郁棣屬劉稹毛詩義問云常棣之樹高五六尺其實大如李正赤食之甜又詩云常棣之花傳云常棣棣也陸璣云奧李一名雀李一曰李下李所在山中皆有其花或白或赤六月中熟大子如李子可食沈括補筆談云晉宮閣銘曰華林園中有車下李三百一十四株薁李一侏莽草味辛溫主風頭癰腫乳癰疝瘕除結氣疥瘙御覽有癰瘡二字殺蟲魚生山谷吳普曰莽草一名春草神農辛雷公桐君苦有毒生上谷山谷中或冤句五月採治風御覽名醫曰一名葞一名春草生上谷及冤句五月採葉陰乾案中山經云朝歌之山有草焉名曰莽草可以毒魚又葌山有木焉其狀如棠而赤葉可以毒魚爾雅云葞春草郭璞云一名芒草本草云周禮云翦氏掌除蠹物以薰草莽之範子計然云莽草出三輔者善陶弘景雲字亦作兩雷丸御覽作雷公丸味苦寒主殺三蟲逐毒氣胃中熱利丈夫不利女子作摩膏除小兒百病御覽引云一名雷矢大觀本作黑字生山谷吳普曰雷丸神農苦黃帝岐伯桐君甘有毒扁鵲甘無毒李氏大寒御覽引云一名雷實或生漢中八月採名醫曰一名雷矢一名雷實生石城及治中土中八月採根曝乾案範子計然云雷矢出漢中色白者善桐葉味苦寒主惡蝕創著陰皮主五痔殺三蟲花主傳豬創飼豬肥大三倍生山谷名醫曰生桐柏山案說文云桐榮也梧梧桐木一名梓爾雅云櫬梧郭璞云今梧桐又榮桐木郭璞云即梧桐毛詩云梧桐生矣傳云梧桐柔木也梓白皮味苦寒主熱去三蟲葉搗傳豬創飼豬肥大三倍生山谷名醫曰生河內案說文云梓楸也或作榟椅梓也楸梓也檟楸也爾雅云槐小葉曰檟郭璞云槐為楸楸當細葉者為檟又大而皵楸郭璞云老乃皮粗皵者為楸又椅梓郭璞云即楸毛詩云椅桐梓漆傳云椅梓屬陸璣云梓者楸之疏理白色而生子者梓梓關桐皮曰椅石南味辛苦主養腎氣內傷陰衰利筋骨皮毛實殺蠱毒破積聚逐風痹一名鬼目生山谷名醫曰生華陰二月四月採實陰乾黃環味苦平主蠱毒鬼注鬼魅邪氣在臟中除咳逆寒熱一名凌泉一名大就生山谷吳普曰蜀黃環一名生芻一名根韭神農黃帝岐伯桐君扁鵲辛一經味苦有毒二月生初出正赤高二尺葉黃員端大莖葉有汗黃白五月實員三月採根根黃從理如車輻解治蠱毒御覽名醫曰生蜀郡三月採根陰乾案蜀都賦有黃環劉逵云黃環出蜀郡沈括補筆談云黃環即今朱藤也天下皆有葉如槐其花穗懸紫色如葛花可作菜食火不熟亦有小毒京師人家園圃中作大架種之謂之紫藤花者是也溲疏味辛寒主身皮膚中熱除邪氣止遺溺可作浴湯生山谷及田野故邱虛地名醫曰一名巨骨生熊耳山四月採案李當之云溲疏一名楊櫨一名牡荊一名空疏皮白中空時時有節子似枸杞子冬日熟色赤味甘苦鼠李主寒熱瘰癧創生田野吳普曰鼠李一名牛李御覽名醫曰一名牛李一名鼠梓一名啤採無時案說文云楰鼠梓木爾雅云鼠梓郭璞云楸屬也今江東有虎梓毛詩云北山有楰傳云楰鼠梓據名醫名鼠梓未知是此否唐本注云一名趙李一名皂李一名烏槎藥實根味辛溫主邪氣諸痹疼酸續絶傷補骨髓一名連木生山谷名醫曰生蜀郡採無時案廣雅云貝父藥實也欒花味苦寒主目痛淚出傷眥消目腫生川穀名醫曰生漢中五月採案說文云欒木似欄山海經云雲雨之山有木名欒黃木赤枝青葉群帝焉取藥白虎通云諸侯墓樹柏大夫欒土槐沈括補筆談云欒有一種樹生其實可作數珠者謂之木欒即本草欒花是也蔓椒味苦溫主風寒濕痹癧節疼除四肢厥氣膝痛一名家椒生川穀及邱家間名醫曰一名豬椒一名彘椒一名狗椒生雲中採莖根釀酒案陶弘景雲俗呼為樛以椒𧅗小不香爾一名稀椒可以蒸病出汗也上木下品一十七種舊十八種今移芫花入草豚卵味苦溫主驚癇癲疾鬼注蠱毒除寒熱賁豚五癃邪氣攣縮一名豚顛懸蹄主五痔伏熱在腸腸癰內蝕案說文云歹巾小豕也從彖省象形從又持肉以給祭祀篆文作豚方言云豬其子或謂之豚或謂之豯吳揚之間謂之豬子麋脂味辛溫主癰腫惡創死肌寒風濕痹四肢拘緩不收風頭腫氣通腠理一名官脂生山谷名醫曰生南山及雀淮南邊十月取案說文云麋鹿屬冬至解其角漢書云劉向以為麋之為言迷也蓋牝獸之淫者也鸓鼠主墮胎令人産易生平谷名醫曰生山都案說文云䴎鼠形飛走且乳之鳥也籀文作鸓廣雅云䍲犬迅飛鸓也陶弘景雲是鼯鼠一名飛生見爾雅云鼯鼠夷由也舊作鸓非六畜毛蹄甲味鹹平主鬼注蠱毒寒熱驚癇癲痓狂走駱駝毛尤良案陶弘景雲六畜謂馬牛羊豬狗雞也蹄即躑省文上獸下品四種舊同蝦蟆味辛寒主邪氣破症堅血癰腫陰創服之不患熱病生池澤名醫曰一名蟾蜍一名𪓰一名去甫一名苦蠪生江湖五月五日取陰乾東行者良案說文云蝦蝦蟆也蟆蝦蟆也蛙蝦蟆也亠囗一電𡹛亠囗一電詹諸也其鳴詹諸其皮蛙蛙其行山亢山亢或作𪓰𪓿𪓰𪓿詹諸也夏小正傳云蜮也者長股也或曰屈造之屬也詩曰得此𪓰𪓿言其行𪓿𪓿鼁䗇詹諸以鳴者蝦蟆也郭璞云似蝦蟆居陸地淮南謂之去蚊又蟼蟆郭璞云蛙類周禮云蟈氏鄭司農云蟈讀為蜮蜮蝦蟆也元謂蟈今御所食蛙也月令云仲夏之月反舌無聲蔡雍云今謂之蝦蟆薛君韓詩注云戚放蟾蜍高誘注淮南子云蟾蜍䗐也又蟈蝦蟆也又蟾蜍蝦蟆又鼓造一曰蝦蟆抱朴子內篇云或問魏武帝曾收左元放而桎梏之而得自然解脫以何法乎抱朴子曰以自解去父血馬刀味辛微寒御覽有補中二字大觀本黑字主漏下赤白寒熱破石淋殺禽獸賊鼠生池澤吳普曰馬刀一名齊蛤神農岐伯桐君咸有毒扁鵲小寒大毒生池澤江海採無時也御覽名醫曰一名馬蛤生江湖及東海採無時案範子計然云馬刀出河東藝文類聚引本經云文蛤表有文又曰馬刀一曰名蛤則豈古本與文蛤為一邪蛇蛻味鹹平主小兒百二十種驚癇瘛瘲癲疾寒熱腸痔蟲毒蛇癇火熬之良一名龍子衣一名蛇符一名龍子單衣一名弓皮生川穀及田野吳普曰蛇蛻一名龍子單衣一名弓皮一名蛇附一名蛇筋一名龍皮一名龍單衣御覽名醫曰一名龍子皮生荊州五月五日十五日取之良案說文云它蟲也從蟲而長象冤曲𠂹尾形或作蛇蛻蛇蟬所解皮也廣雅云蝮蜟蛻也中山經云來山多空奪郭璞云即蛇皮脫也蚯蚓味鹹寒主蛇瘕去三蟲伏尸鬼注蠱毒殺長蟲仍自化作水生平土吳普曰蚯蚓一名白頸螳蚓一名附引御覽名醫曰一名土龍二月取陰乾案說文云蚓側行者或作蚓螼蚓也廣雅云蚯蚓蜿蟺引無也爾雅云螼蚓蜸蠶郭璞云即蜸蟺也江東呼寒蚓舊作蚯非呂氏春秋淮南子邱蚓出不從蟲又說文訓云蚓無筋骨之強高誘注蚓一名蜷𧍒也舊又有白頸二字據吳普古本當無也蠮螉味辛平主久聾咳逆毒氣出刺出汗生川穀名醫曰一名土蜂生熊耳及牂柯或人屋間案說文云識識螺蒲盧細要土蜂也或作螺螺螺螺也廣雅云土蜂蠮螉也爾雅土蜂毛詩云螟蛉有子螺螺負之傳云螺螺蒲盧也禮記云夫政也者蒲盧也鄭云蒲盧果螺謂土蜂也方言云蜂其小者謂之蠮螉或謂之蚴蛻說文無蠮字或當為醫蜈蚣味辛溫主鬼注蠱毒啖諸蛇早魚毒殺鬼物老精溫瘧去三蟲御覽引云一名至掌大觀本在水蛭下生川穀名醫曰生大吳江南赤頭足者良案爾雅云蝍蛆吳公也水蛭味鹹平主逐惡血瘀血月閉御覽作水閉破血瘕積聚無子利水道生池澤名醫曰一名蝍一名至掌生雷澤五月六月採曝乾案說文云蛭蟣也蝚蛭蝚至掌也爾雅云蛭蟣郭璞云今江東呼水中蛭蟲入人肉者為蟣又蛭蝚至掌郭璞云未詳據名醫即蛭也班苗味辛寒主寒熱鬼注蠱毒鼠瘻惡創疽蝕死肌破石癃一名龍尾生川穀吳普曰斑貓一名斑蠔一名龍蠔一名斑苗一名勝發一名盤蛩一名晏青神農辛岐伯咸桐君有毒扁鵲甘有大毒生河內川穀或生水石名醫曰生河東八月取陰乾案說文云螌螌蝥毒蟲也廣雅云螌𧒚晏青也名醫別出芫青條非芫晏音相近也舊作貓俗字據吳氏云一名班苗是也貝子味鹹平主目翳鬼注蟲毒腹痛下血五癃利水道燒用之良生池澤名醫曰一名貝齒生東海案說文云貝海介蟲也居陸名飆在水名蝄象形爾雅云貝小者鰿郭璞云今細貝亦有紫色出日南又𧐐小而橢郭璞云即上小貝石蠶味鹹寒主五癃破五淋墮胎內解結氣利水道除熱一名水蝨生池澤吳普曰石蠶亦名沙蝨神農雷公酸無毒生漢中治五淋破隨內結氣利水道除熱御覽名醫曰生江漢案廣雅云水蝨𧋑也淮南萬畢術云沙蝨一名蓬活一名地脾御覽蟲豸部引李當之云類蟲形如老蠶生附石廣志云皆蝨蝨色赤大過蟣在水中入人皮中殺人與李似不同雀甕味甘平主小兒驚癇寒熱結氣蠱毒鬼注一名躁舍名醫曰生漢中採蒸之生樹枝間蛄蟖房也八月取案說文云蛄蛄斯黑也爾雅云蟔蛄蟖郭璞云蠔屬也今青州人呼蠔為蛄蟖按本經名為雀甕者甕與蛹音相近以其如雀子又如繭蟲之蛹因呼之蜣螂味鹹寒主小兒驚癇瘛瘲腹脹寒熱大人疾狂易一名蛣蜣火熬之良生池澤名醫曰生長沙五月五日取蒸藏之案說文云𧍕渠𧍕一曰天杜廣雅云天杜蜣螂也爾雅云蛣蜣蜣螂郭璞云黑甲蟲啖糞土玉篇蜣螂同說文無蜣字渠𧍕即蛣蜣音之緩急螻蛄味鹹寒主産難出肉中刺御覽作刺在肉中潰癰腫下哽噎御覽作咽解毒除惡創一名蟪蛄御覽作蟪蛄一名天螻一名𧎅夜出者良生平澤名醫曰生東城夏至取曝乾案說文云蠹螻蛄也螻螻蛄也蛄螻蛄也廣雅云炙鼠津姑螻蜮蟓蛉蛞螻螻蛄也夏小正云三月𧎅則鳴𭄰天螻也爾雅云𧎅天螻郭璞云螻蛄也淮南子時則訓云孟夏之月螻蟈鳴高誘云螻螻蛄也方言云蛄詣謂之杜格螻蛞謂之螻蛞或謂之蟓蛉南楚謂之杜狗或謂之𧍎螻陸璣詩疏云本草又謂螻蛄為石鼠今無文馬陸味辛溫主腹中大堅症破積聚息肉惡創白禿一名百足生川穀吳普曰一名馬軸御覽名醫曰一名馬軸生元菟案說文云蠲馬蠲民從蟲皿益聲包象形明堂月令曰腐草為蠲廣雅云蛆蟝馬𧏿馬蚿也又馬踐蛆也爾雅云蛝馬踐郭璞云馬蠲勻俗呼馬𧏿淮南子時則訓云季夏之日腐草化為蚈高誘云蚈馬蚿也幽冀謂之秦渠又汜論訓云蚈足衆而走不若蛇已兵略訓云若研之足高誘云蚈馬蠸也方言云馬蚿北燕謂之蛆渠其大者謂之馬蚰博物志云馬蚿一名百足中斷成兩段各行而去地膽味辛寒主鬼注寒熱鼠螻惡創死肌破癥瘕墮胎一名蚖青生川穀吳普曰地膽一名元青一名杜龍一名青虹御覽名醫曰一名青圭主生汶山八月取案廣雅云地膽蛇要青𧓿青蟲尸𮥼也陶弘景雲狀如大馬蟻有翼僞者即班貓所化狀如大豆鼠婦味酸溫主氣癃不得小便女人月閉血症癇症寒熱利水道一名負蟠一名𡛂威生平谷名醫曰一名𧑓蜲生魏郡及人家地上五月五日取案說文云𡛂𡛂威委黍委黍鼠婦也蟠鼠負也爾雅云蟠鼠負郭璞云甕器底蟲又𡛂威委黍郭璞云舊說鼠婦別名毛詩云伊威在室傳云伊威委黍也陸璣云在壁根下甕底中生似白魚熒火味辛微溫主明目小兒火創傷熱氣蠱毒鬼注通神一名夜光御覽引云一名熠耀一名即照大觀本作黑字生池澤吳普曰熒火一名夜照一名熠耀一名救火一名景天一名據火一名挾火藝文類聚名醫曰一名放光一名熠耀一名即照生階地七月七日收陰乾案說文云𤌠兵死及牛馬之血為磷鬼火也從炎舛爾雅云熒火即照郭璞云夜飛腹下有火毛詩云熠耀宵行傳云熠耀磷也磷熒火也月令云季夏之月腐草化為熒鄭元云螢飛蟲螢火也據毛萇以螢為磷是也說文無螢字當以磷為之爾雅作熒亦是舊作螢非又按月令腐草為螢當是蠲字假音衣魚味鹹溫無毒主婦人疝瘕小便不利御覽作泄利小兒中風御覽作頭風項強御覽作疆背起摩之一名白魚生平澤吳普曰衣中白魚一名蟫御覽名醫曰一名蟫生咸陽案說文云蟫白魚也廣雅云白魚蛃魚也爾雅云蟫白魚郭璞云衣書中蟲一名蚋魚上蟲魚下品一十八種舊同桃核仁味苦平主症血血閉瘕邪殺小蟲桃花殺注惡鬼令人好顏色桃鳧微溫主殺百鬼精物初學記引云梟桃在樹不落殺百鬼桃毛主下血瘕寒熱積寒無子桃蠹殺鬼邪惡不祥生川穀名醫曰桃核七月採取仁陰乾花三月三日採陰乾桃鳧一名桃奴一名梟景是實著樹不落實中者正月採之桃蠹食桃樹蟲也生太山案說文云桃果也玉篇云桃毛果也爾雅云桃李醜核郭璞云子中有核仁孫炎云桃李之實類皆有核杏核仁味甘溫主咳逆上氣雷鳴喉痹下氣産乳金創寒心賁豚生川穀名醫曰生晉山案說文云杏果也管子地員篇云五沃之土其木宜杏高誘注淮南子云杏有竅在中上果下品二種舊同腐婢味辛平主痎瘧寒熱邪氣泄利陰不起病酒頭痛生漢中吳普曰小豆花一名腐婢舊作付月誤神農甘毒七月採陰乾四十日治頭痛止渴御覽名醫曰生漢中即小豆花也七月採陰乾上米谷下品一種舊同苦瓠味苦寒主大水面目四肢浮腫下水令人葉生川澤名醫曰生晉地案說文云瓠匏匏瓠也廣雅云匏瓠也爾雅云瓠棲瓣毛詩云瓠有苦葉傳云匏謂之瓠又九月斷壺傳云壺瓠也古今注云瓠壺蘆也壺蘆瓠之無柄者瓠有柄者又云瓢瓠也其㧾曰匏瓠則別名水靳味甘平主女子赤沃止血養精保血脈益氣令人肥健嗜食一名水英生池澤名醫曰生南海案說文云芹楚葵也近菜類也周禮有近菹爾雅云芹楚葵郭璞云今水中芹菜字林云芹草生水中根可緣器又云荶菜似蒜生水中上菜下品二種舊同彼子味甘溫主腹中邪氣去三蟲蛇螫蠱毒鬼注伏尸生山谷舊在唐本退中名醫曰生永昌案陶弘景雲方家從來無用此者古今諸醫及藥家子不復識又一名熊子不知其形何類也掌禹錫云樹似杉子如檳榔本經蟲部云彼子芝注云彼字合從木爾雅云彼一名棑三品合三百六十五種法三百六十度一度應一日以成一歲倍其數合七百三十名也掌禹錫曰本草例神農本經以朱書名醫別録以墨書神農藥三百六十五種今此言倍其數合七百三十名是並名醫別録副品而言也則此下節別録之文也當作墨書矣蓋傳定浸久朱墨錯亂之所致耳案禹錫說是也改為細字藥有君臣佐使以相宣攝合和宜用一君二臣三佐五使又可一君三臣九佐使也藥有陰陽配合子母兄弟根莖花實草石骨肉有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者凡此七精合和時之當用相須相使者良勿用相惡相反者若有毒宜制可用相畏相殺者不爾勿合用也藥有酸咸甘苦辛五味又有寒熱溫涼四氣及有毒無毒陰乾曝乾採造時月生熟土地所出真僞陳新並各有法藥性有宜丸者宜散者宜水煮者宜酒漬者宜膏煎者亦有一物兼宜者亦有不可入湯酒者並隨藥性不得違越欲療病先察其原先候病機五臟未虛六腑未竭血脈未亂精神未散服藥必活若病已成可得半愈病勢已過命將難全若用毒藥療病先起如黍粟病去即止不去倍之不去十之取去為度療寒以熱藥療熱以寒藥飲食不消以吐下藥鬼注蠱毒以毒藥癰腫創瘤以創藥風濕以風濕藥各隨其所宜病在胸膈以上者先食後服藥病在心腹以下者先服藥而後食病在四肢血脈者宜空腹而在旦病在骨髓者宜飽滿而在夜夫大病之主有中風傷寒寒熱溫瘧中惡霍亂大腹水腫腸澼下利大小便不通賁肫上氣咳逆嘔吐黃疽消渴留飲癖食堅積癥瘕驚邪癲癇鬼注喉痹齒痛耳聾目盲金創踒折癰腫惡創痔瘻癭瘤男子五勞七傷虛乏羸瘦女子帶下崩中血閉陰蝕蟲蛇蠱毒所傷此大略宗兆其間變動枝葉各宜依端緒以取之上藥令人身安命延升天神仙遨遊上下役使萬靈體生毛羽行廚立至抱朴子內篇引神農經據太平御覽校中藥養性下藥除病能令毒蟲不加猛獸不犯惡氣不行衆妖並闢抱朴子內篇引神農經太一子曰凡藥上者養命中者養性下者養病藝文類聚引本草經太一子曰凡藥上者養命中藥養性下藥養病神農乃作赭鞭鉤𨨪尺制切從六陰陽與太乙外巡字五嶽四瀆土地所生草石骨肉心灰皮毛羽萬千類皆鞭問之得其所能治主當其五味一日一字舊誤作百七十毒太平御覽引本草經神農稽首再拜問於太乙子曰曾聞之時壽過百歲而徂落之咎獨何氣使然也太乙子曰天有九門中道最良神農乃從其嘗藥以拯救人命太平御覽引神農本草按此諸條與今本經卷上文略相似諸書所引較本經文多又云是太一子說今無者疑後節之其云赭鞭鉤𨨪當是煮辨候制之假音鞭問之即辨問之無怪說也藥物有大毒不可入口鼻耳目者即殺人一曰鉤吻盧氏曰陰地黃精不相連根苗獨生者是也二曰鴟狀如雌雞生山中三曰陰命赤色著木縣其子生海中四曰內童狀如鵝亦生海中五曰鴆羽如雀墨頭赤喙六曰𧎸䖷生海中雄曰䖷雌曰𧎸也博物志引神農經藥種有五物一曰狼毒占斯解之二曰巴頭藿汁解之三曰黎盧湯解之四曰天雄烏頭大豆解之五曰班茅戎鹽解之毒菜害小兒乳汁解先食飲二升博物志引神農經五芝及餌丹砂玉札曾青雄黃雌黃雲母太乙禹餘糧各可單服之皆令人飛行長生抱朴子內篇引神農四經春夏為陽秋冬為陰文選注引神農本草春為陽陽溫生萬物同上黃精與術餌之卻粒或遇凶年可以絶粒謂之米脯太平御覽引抱朴子神農經五味養精神強魂魄五石養髓肌肉肥澤諸藥其味酸者補肝養心除腎病其味苦者補心養脾除肝病其味甘者補肺養脾除心病其味辛者補肺養腎除脾病其味鹹者補肺除肝病故五味應五行四體應四時夫人性生於四時然後命於五行以一補身不死命神以母養子長生延年以子守母除病究年太平御覽引養生要略神農經案此諸條當是玉石草木三品前總論而後人節去附吳氏本草十二條龍眼一名益智一名比目齊民要術鼠尾一名徑一名山陵翹治痢也太平御覽滿陰實生平谷或圃中延蔓如瓜葉實如桃七月採止渴延年太平御覽千歲垣中膚皮得薑赤石胎治太平御覽小華一名結草太平御覽木瓜生夷陵太平御覽谷樹皮治喉閉一名楮太平御覽櫻桃味甘主調中益氣令人好顏色美志氣一名朱桃一名麥英也藝文類聚李核治僕僵花令人好顏色太平御覽大麥一名穬麥五穀之大盛無毒治消渴除熱益氣食蜜為使麥種一名小麥無毒治利而不中囗太平御覽豉益人氣太平御覽暉日一名鴆羽太平御覽附諸藥制使唐慎微曰神農本經相使正各一種冀以藥對參之乃有兩三玉石上部玉泉畏款冬花玉屑惡鹿角丹砂惡磁石畏鹹水曾青畏菟絲子石膽水英為使畏牡桂菌桂芫花辛夷白鍾乳蛇床子為使惡牡丹牡蒙元石畏紫石英蘘草雲母澤瀉為使畏蛇甲及流水消石口為使惡苦參苦菜畏女菀朴硝畏麥句姜芒硝石葦為使惡麥句姜礬石甘草為使畏牡蠣滑石石葦為使惡曾青紫石英長石為使畏扁青附子不欲蛇甲黃連麥句姜白石英惡馬目毒公赤石脂惡大黃畏蕪花黃石脂曾青為使惡細辛畏蜚蠊太一餘糧杜仲為使畏鐵落菖蒲貝母玉石中部水銀畏磁石殷孽惡防己畏木孔公孽木蘭為使惡細辛陽起石桑螵蛸為使惡澤瀉菌桂雷丸蛇蛻皮畏菟絲子石膏雞子為使惡莽草毒公凝水石畏地榆解巴豆毒磁石柴胡為使畏黃石脂惡牡丹莽草元石惡松脂柏子仁菌桂理石滑石為使惡麻黃玉石下部礬石得火良棘針為使惡虎掌毒公鶩屎細辛水青琅玕得水銀良畏雞骨殺錫毒特生礬石得火良畏水代赭畏天雄方解石惡巴豆大鹽漏蘆為使草藥上部六芝薯蕷為使得發良惡常山畏扁青茵陳術防風地榆為使天門冬垣衣地黃為使畏曾青麥門冬地黃車前為使惡款冬苦瓠畏苦參青蘘女萎蕤主畏滷䖨咸乾地黃得麥門冬清酒良惡貝母畏元荑菖蒲秦花秦皮為使惡地膽麻黃澤瀉畏海蛤文蛤遠志得茯苓冬葵子龍骨良殺天雄附子毒畏珍珠蜚蠊藜蘆齊蛤薯蕷紫芝為使惡甘遂石斛陸英為使惡凝水石巴豆畏白殭蠶雷丸菊花朮枸杞根桑根白皮為使甘草朮乾漆苦參為使惡遠志反甘遂大戟芫花海藻人參茯苓為使惡溲疏反藜蘆牛膝惡熒火龜陸英畏白細辛曾青東根為使惡狼毒山茱萸黃耆畏滑石硝石反藜蘆獨活蠡石為使柴胡半夏為使惡皂莢畏女苑藜蘆菴䕡子荊子薏苡仁為使菥蓂子得荊子細辛良惡乾薑苦參龍膽貫衆為使惡防葵地黃菟絲子得酒良薯蕷松脂為使惡雚茵巴戟天覆盆子為使惡朝生雷丸丹參蒺藜子烏頭為使沙參惡防己反藜蘆防風惡乾薑藜蘆白蘞芫花殺附子毒絡石杜仲牡丹為使惡鐵落畏菖蒲貝母黃連黃芩龍骨理石為使惡菊花芫花元參白蘚皮畏款冬勝烏頭解巴豆毒丹參味鹹水反藜蘆天名精垣衣為使決明子蓍實為使惡大麻子續斷地黃為使惡雷丸芎藭白芷為使黃耆惡龜甲杜若得辛夷細辛良惡柴胡前胡蛇床子惡牡丹巴豆貝母茜根畏鼠姑飛蠊得烏頭良惡麻黃薇銜得秦皮良五味子蓯蓉為使惡葳蕤勝烏頭草藥中部當歸惡蘭茹畏菖蒲海藻牡蒙秦艽菖蒲為使黃芩山茱萸龍骨為使惡蔥實畏丹砂牡丹藜蘆芍藥須丸為使惡石斛芒硝畏石鱉甲小薊反藜蘆乾薑秦椒為使惡黃連黃芩天鼠屎殺半夏莨菪毒藁本畏䕡茹麻黃厚朴為使惡辛夷石葦葛根殺野葛巴豆百藥毒前胡半夏為使惡皂莢畏藜蘆貝母厚朴白薇為使惡桃花畏秦艽礬石莽草反烏頭栝蔞枸杞為使惡乾薑畏牛膝乾漆反烏頭元參惡黃耆乾薑大棗山茱萸反藜蘆苦參元參為使惡貝母漏蘆菟絲子反藜蘆石龍芮大戟為使畏蛇蛻吳茱萸萆薢薏苡為使畏葵根大黃柴胡牡蠣前胡石葦滑石杏仁為使得菖蒲良狗脊萆薢為使惡敗醬瞿麥蘘草牡丹為使惡螵蛸白芷當歸為使惡旋覆花紫菀款冬為使惡天雄瞿麥雷丸遠志畏茵陳白蘚皮惡螵蛸桔梗茯苓萆薢白薇惡黃耆大黃大戟乾薑乾漆大棗山茱萸紫參畏辛夷淫羊藿薯蕷為使款冬花杏仁為使得紫菀良惡皂莢硝石元參畏貝母辛夷麻黃黃芩黃連黃耆青葙牡丹畏菟絲子防己殷孽為使惡細辛畏萆薢殺雄黃毒女苑畏滷咸澤蘭防己為使地榆得發良惡麥門冬海藻反甘草草藥下部大黃黃芩為使桔梗節皮為使畏白芨反龍膽龍眼甘遂瓜蒂為使惡遠志反甘草葶藶榆皮為使得酒良惡殭蠶石龍芮芫花決明為使反甘草澤漆小豆為使惡薯蕷大戟反甘草鉤吻半夏為使惡黃芩藜蘆黃連為使反細辛芍藥五參惡大黃烏頭烏喙莽草為使反半夏栝蔞貝母白蘞白芨惡藜蘆天雄遠志為使惡腐婢附子地坦為使惡蜈蚣畏防風甘草黃耆人參烏韭大豆貫衆雚菌為使半夏射干為使惡皂莢畏雄黃生薑乾薑秦皮龜甲反烏頭蜀漆栝樓為使惡貫衆虎掌蜀漆為使畏莽草狼牙蕪荑為使惡棗肌地榆常山畏玉札白芨紫石英為使惡理石李核仁杏仁白蘞代赭為使反烏頭雚菌得酒良畏雞子䕡茹甘草為使惡麥門冬藎草畏鼠婦夏枯草土瓜為使狼毒大豆為使惡麥句姜鬼臼畏衣木藥上部茯苓茯神馬間為使惡白蘞畏牡蒙地榆雄黃秦艽龜甲杜仲惡蛇蛻元參柏實牡蠣桂心瓜子為使畏菊花羊蹄諸石面曲乾漆半夏為使畏雞子蔓荊子惡烏頭石膏五加皮遠志為使畏蛇皮元參孽木惡乾漆辛夷芎藭為使惡五石脂畏菖蒲蒲黃黃連石膏黃環酸棗仁惡防己槐子景天為使牡荊實防己為使惡石膏木藥中部厚朴乾薑為使惡澤瀉寒水石硝石山茱萸蓼實為使惡桔梗防風防己吳茱萸蓼實為使惡丹參硝石白堊畏紫石英秦皮大戟為使惡茱萸占斯解狼毒毒梔子解躑躅毒秦椒惡栝蔞防葵畏雌黃桑根白皮續斷桂心麻子為使木藥下部黃環鳶尾為使惡茯苓防己石南五加皮為使巴豆芫花為使惡蘘草畏大黃黃連藜蘆殺斑蝥毒欒花決明為使蜀椒杏仁為使畏款冬溲疏漏蘆為使皂莢柏實為使惡麥門冬畏空青人參苦參雷丸荔實厚朴為使惡葛根獸上部龍骨得人參牛黃良畏石膏龍角畏乾漆蜀椒理石牛黃人參為使惡龍骨地黃龍膽蜚蠊畏牛膝白膠得火良畏大黃阿膠得火良畏大黃獸中部犀角松子為使惡雚菌雷丸羚羊角菟絲子為使鹿茸麻勃為使鹿角杜仲為使獸下部麋脂畏大黃伏翼莧實雲實為使天鼠屎惡白蘞白薇蟲魚上部蜜蠟惡芫花齊蛤蜂子畏黃芩芍藥牡蠣牡蠣貝母為使得甘草牛膝遠志蛇床良惡麻黃吳茱萸辛夷桑螵蛸畏旋覆花海蛤蜀漆為使畏狗膽甘遂芫花龜甲惡沙參蜚蠊蟲魚中部蝟皮得酒良畏桔梗麥門冬蜥蜴惡硫黃斑蝥蕪荑露蜂房惡乾薑丹參黃芩芍藥牡蠣䘌蟲畏皂莢菖蒲蠐螬蜚蠊為使惡附子龜甲惡礬石蟹殺莨菪毒漆毒鮀魚甲蜀漆為使畏狗膽甘遂芫花烏賊魚骨惡白蘞白芨蟲魚下部蜣螂畏羊角石膏蛇蛻畏磁石及酒斑蝥馬刀為使畏巴豆丹參空青惡膚青地膽惡甘草馬刀得水良果上部大棗殺烏頭毒果下部菜上部冬葵子黃芩為使蔥實解藜蘆毒米上部麻蕡麻子畏牡蠣白薇惡茯苓米中部大豆及黃卷惡五參龍膽得前胡烏喙杏仁牡蠣良殺烏頭毒大麥蜜為使上二百三十一種有相制使其餘皆無三十四種續添案當云三十五種立冬之日菊卷柏先生時為陽起石桑螵蛸凡十物使主二百草為之長立春之日木蘭射干先生為柴胡半夏使主頭痛四十五節立夏之日蜚蠊先生為人參茯苓使主腹中七節保神守中夏至之日豕道茱萸先生為牡蠣烏喙使主四肢三十二節立秋之日白芷防風先生為細辛蜀漆使主胸背二十四節原注上此五條出藥對中義旨淵深非俗所究雖莫可遵用而是主統之本故亦載之

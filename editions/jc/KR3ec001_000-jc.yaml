body:
  text: 邵序記曰醫不三世不服其藥鄭康成曰慎物齊也孔沖遠引舊說云三世者一曰黃帝針灸二曰神農本草三曰素女脈訣康成周禮注亦曰五藥草木蟲石谷也其治合之齊則存乎神農子儀之術是禮記注所謂慎物齊者猶言治合之齊指本草諸書而言也沖遠既引舊說復疑其非鄭義過矣漢書引本草方術而藝文志缺載賈公彥引中經簿有子儀本草經一卷不言出於神農至隋經籍志始載神農本草經三卷與今分上中下三品者相合當屬漢以來舊本隋志又載雷公本草集註四卷蔡邕本草七卷今俱不傳自別錄以後累有損益升降隨時條記或傳合本文不相別白據陸元朗經典釋文所引則經文與名醫所附益者合併為一其來舊矣孫君伯淵偕其從子因大觀本草黑白字書釐正神農本經三卷又據太平御覽引經云生山谷生川澤者定為本文其有預章朱崖常山奉高郡縣名者定為後人羼入釋本草者以吳普本為最古散見於諸書徵引者綴集之以補大觀本所未備疏通古義系以考證非澹雅之才沉鬱之思未易為此也古者協陰陽之和宣羸縮之節凡夫含聲負氣以及倒生旁達蠉飛蠕動之倫胥盡其性遇物能名以達於利用生生之具儒者宜致思焉淮南王書曰地黃主屬骨而甘草主生肉之藥也又曰大戟去水葶藶愈張用之不節乃反為病論衡曰治風用風治熱用熱治邊用蜜丹潛夫論曰治疾當真人參反得支羅服當得麥門冬反蒸橫麥已而不識真合而服之病以浸劇斯皆神農之緒言惟其贍涉者博故引類比方悉符藥論後儒或忽為方技家言漁獵所及又是末師而非往古甚至經典所載鳥獸草木亦輾轉而昧其名不已慎乎後漢書華佗傳吳普從佗學依准佗療多所全濟佗以五禽之戲別傳又載魏明帝使普為禽戲普以其法語諸醫疑其方術相傳別有奇文異數今觀普所釋本草則神農黃帝岐伯雷公桐君醫和扁鵲以及後代名醫之說靡不賅載則其多所全濟由於稽考之勤比驗之密而非必別有其奇文異數信乎非讀三世書者不可服其藥也世俗所傳黃帝神農扁鵲之書多為後人竄易余願得夫閎覽博物者為之是正也因孫君伯仲校定本草而發其端至其書考證精審則讀者宜自得之餘姚邵晉涵序張序儒者不必以醫名而知醫之理則莫過於儒者春秋時和與緩神於醫者也其通周易辨皿蟲之義醫也而實儒也世之言醫者必首推神農然使神農非與太乙遊則其傳不正非作赭鞭鉤𨨪巡五嶽四瀆則其識不廣非以土地所生萬千類驗其能治與否則其業不神傳不正識不廣業不神難曰取玉石草木禽獸蟲魚米穀之屬歷試之親嘗之亦僅與商賈市販等耳於醫乎何與吾故曰神農千古之大儒也考崇文總目載食品一卷五臟論一卷皆系之神農其本久不傳傳之者神農本草經耳而亦無專本唐審元裒輯之書錄解題謂之大觀本草讀書志謂之證類本草闕後繆雍有疏盧之頤有乘雅半偈皆以本經為之主然或參以臆說或益以衍斷解愈紛義愈晦未有考覈精審卓然有所發明者則證古難證古而折衷於至是為尤難孫淵如觀察偕其從子鳳卿輯神農本草經三卷於吳普名醫外益以說文爾雅廣雅淮南子抱朴子諸書不列古方不論脈證而古聖殷殷治世之意燦然如列眉孔子曰多識於鳥獸草木之名又曰致知在格物則是書也非徒醫家之書而實儒家之書也其遠勝於希雍之諸人也固宜或以本草之名始見漢書平帝紀樓護傳幾有疑於本草經者然神農始嘗百草始有醫藥見於三皇紀矣因三百六十五種註釋為七卷見於陶隱居錄矣增一百十四種廣為二十卷唐本草宗之增一百三十三種孟昶復加釐定蜀本草又宗之至郡縣本屬後人所附益經但云生山谷生川澤耳洪範以康寧為福雅頌稱壽考萬年又何疑於久服輕身延年為後世方士之說哉大抵儒者之嗜學如醫然淵源其脈也覆審其胗視也辨邪正定是非則溫寒平熱之介也觀察方聞綴學以鴻儒名海內求其著述者如金膏水碧之珍鳳卿好博聞研丹吮墨日以儒為事則上溯之羲皇以前數千年如一日非嗜之專且久而能然耶顧吾獨怪是編中無所謂治書癖者安得起神農而一問之嘉慶四年太歲在己未冬十月望日宣城張炯撰於瞻園之灌術莊孫序神農本草經三卷所傳白字書見大觀本草按嘉祐補註序云所謂神農本經者以朱字名醫因神農舊條而有增補者以墨字間於朱字開寶重定序云舊經三卷世所流傳名醫別錄互為編纂至梁貞白先生陶弘景乃以別錄參其本經朱墨雜書時謂明白據此則宋所傳黑白字書實陶弘景手書之本自梁以前神農黃帝岐伯雷公扁鵲各有成書魏吳普見之故其說藥性主治各家殊異後人纂為一書然猶有旁註或朱墨字之別本經之文以是不亂舊說本草之名僅見漢書平帝紀及樓護傳予按藝文志有神農黃帝食藥七卷今本偽為食禁賈公彥周禮醫師疏引其文正作食藥宋人不考遂疑本草非七略中書賈公彥引中經簿又有子儀本草經一卷疑亦此也梁七錄有神農本草三卷其卷數不同者古今分合之異神農之世書契未作說者以此疑經如皇甫謐言則知四捲成於黃帝陶弘景雲軒轅以前文字未傳藥性所主嘗以識識相因至於桐雷乃著在於編簡此書當與素問同類其言良是且藝文志農兵五行雜占經方神仙諸家俱有神農書大抵述作有本其傳非妄是以博物志云太古書今見存有神農經春秋傳注賈逵以三墳為三皇之書神農預其列史記言秦始皇不去醫藥卜筮之書則此經幸與周易並存顏之推家訓乃云本草神農所述而有豫章朱崖趙國常山奉高真定臨淄馮翊等郡縣名出諸藥物皆由後人所羼非本文陶弘景亦云所出郡縣乃後漢時制疑仲景云化等所記按薛綜注張衡賦引本草經太一禹餘糧一名石腦生山谷是古本無郡縣名太平御覽引經上云生山谷或川澤下云生某山某郡明生山谷本經文也其下郡縣名醫所益今大觀本俱作黑字或合其文云某山川穀某郡川澤恐傳寫之誤古本不若此仲景元化後有吳普李當之皆修此經當之書世少行用魏志華佗傳言普從佗學隋經籍志稱吳普本草梁有六卷嘉祐本草云普修神農本草成四百四十一種唐經籍志尚存六卷今廣內不復存惟諸書多見引據其說藥性寒溫五味最為詳悉是普書宋時已佚今其文惟見掌禹錫所引藝文類聚初學記後漢書注事類賦諸書太平御覽引據尤多足補大觀所缺重是別錄前書因採其文附於本經亦略備矣其普所稱有神農說者即是本經大觀或誤作黑字亦據增其藥物或數浮於三百六十五種由後人以意分合難以定之其藥名有禹餘糧王不留行徐長卿鬼督郵之屬不類太古時文按字書以禹為蟲不必夏禹其餘名號或系後人所增或聲音傳述改古舊稱之致又經有云宜酒漬者或以酒非神農時物然本草衍義已據素問首言以妄為常以酒為漿謂酒自黃帝始又按文選注引博物志亦云杜康作酒王著與杜康絕交書曰康字仲寧或云黃帝時人則俱不得疑經矣孔子云述而不作信而好古又云多誤於鳥獸草木之名今儒家拘泥耳目未能及遠不睹醫經本草之書方家循守俗書不察古本藥性異同之說又見明李時珍作本草綱目其名已愚僅取大觀本割裂舊文妄加增駁迷誤後學予與家鳳卿集成是書庶以輔冀完經啟蒙方伎略以所知加之考證本經云上藥本上經中藥本中經下藥本下經是古以玉石草木等上中下品分卷而序錄別為一卷陶序朱書云本草經卷上注云序藥性之源本論病名之形論卷中云玉石草木三品卷下云蟲獸果菜米合三品此名醫所改今依古為次又帝王世紀及陶序稱四卷者掌禹錫云按舊本亦作四卷韓保升又云神農本草上中下並序錄合四卷若此則三四之異以有序錄則抱朴子養生要略太平御覽所引神農經或云問於太乙子或引太乙子云云皆經所無或亦在序錄中後人節去之耳至其經文或以癢為養創為瘡淡為痰注為蛀沙為砂兔為菟之類皆由傳寫之誤據古訂正勿嫌驚俗也其辨析物類引據諸書本之毛詩爾雅說文方言廣雅諸子雜家則鳳卿增補之力俱多雲陽湖孫星衍撰周序著本草者代有明哲矣而求道者必推本於神農以為神聖之至誠儘性其興物以全民義至精而用至大也歷三代之世以迄秦漢守其書而傳習之蓋無敢違其教者自陶貞白雜入名醫別錄朱墨分書其書無傳本矣至宋以降朱墨互淆其書無真本矣紛紜散亂千有餘歲好古者乃欲一一收拾以復其舊亦難矣哉故靈胎徐氏有本草百種錄修園陳氏有本草經讀各於經旨有所發明不愧述者要止體厥功能以便世用而於三品之全物卒闕焉而無聞久之乃得顧氏輯本復於同郡石埭徐氏借得孫氏輯本二書皆以用一無所發蓋孫氏本非知醫者此無足怪乃於名物形狀亦徒羅列富有莫正是非如水萍則薸蘋並列柳華則檉杞同稱如此之類未可殫舉然而備錄前文以待來哲之論定勝九穀長其可實谷而苗草耶二種出入嫌入於妄作矣尤異者孫顧二書同出大觀而三品互殊幾於十二顧氏詆孫不考本經目錄故三品種數顯與名例相違夫本經目錄載在李氏綱目第二卷昭昭者也孫氏之輯此書不可謂不勤者矣獨於此忽焉而不一寓目耶豈謂本經久無真本安所得其目錄李氏所述不足據耶然而名例相違又何也夫數典者經生之空談而無與於醫之實用者也天下無無用之物而患無用物之人物無不樂效用於人而人每至於負物是書也苟不求所以用之即名物品數盡如神農之舊而何所濟於世古聖垂教之深心歷代賢士表章之盛意其在是耶用藥一用兵也善用則攻即為補不善用則補亦殺人世人於兵皆知不可妄動獨於醫藥往往輕於嘗試抑獨何哉學海慮古籍之湮也亟為刊布而敘其梗概如此以見舍顧而從孫者亦取徵引之富贍耳至於名象之是非功用之變化在善讀者之自得之矣時光緒辛卯秋仲建德周學海澂之記

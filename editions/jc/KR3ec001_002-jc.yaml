body:
  text: 卷二中經中藥一百二十種為臣主養性以應人無毒有毒斟酌其宜欲遏病補羸者本中經雄黃石流黃雌黃水銀石膏磁石凝水石陽起石孔公孽殷孽鐵精理石長石膚青上玉石中品十四種舊十六種乾薑枲耳實葛根栝蔞根苦參當歸麻黃通草芍藥蠡實瞿麥元參秦艽百合知母貝母白芷淫羊藿黃芩狗脊石龍芮茅根紫菀紫草敗醬白蘚酸醬紫參藁本石葦萆薢白薇水萍王瓜地榆海藻澤蘭防己款冬花牡丹馬先蒿積雪草女菀王孫蜀羊泉爵床假蘇翹根上草中品四十九種舊四十六種桑根白皮竹葉吳茱萸梔子蕪萸枳實厚朴秦皮秦菽山茱萸紫薇豬苓白棘龍眼松蘿衛矛合歡上木中品一十七種舊同馬莖鹿茸牛角腮羖羊角牡狗陰莖羚羊角犀角上獸中品七種舊同燕尿天鼠尿上禽中品二種舊三種猥皮露蜂房鱉甲蟹作蟬蠐螬烏賊魚骨白殭蠶蛇魚甲椿雞活蝓石龍子木虻蜚虻蜚廉䗪蟲伏翼上蟲魚中品一十七種舊十六種梅實上果中品一種舊同大豆黃卷赤小豆粟米黍米上米谷中品三種舊二種蓼實蔥實薤水蘇上菜中品三種舊同雄黃味苦平寒主寒熱鼠瘻惡創疽痔死肌殺精物惡鬼邪氣百蟲毒勝五兵煉食之輕身神仙一名黃食石生山谷吳普曰雄黃神農苦山陰有丹雄黃生山之陽故曰雄是丹之雄所以名雄黃也名醫曰生武都敦煌之陽採無時案西山經云高山其下多雄黃郭璞云晉太興三年高平郡界有山崩其中出數千斤雄黃抱朴子仙藥篇云雄黃當得武都山所出者純而無雜其赤如雞冠光明曄曄可用耳其但純黃似雄黃色無赤光者不任以作仙藥可以合理病藥耳石流黃流舊作硫御覽引作流是味酸溫主婦人陰蝕癰痔惡血堅筋骨除頭禿能化金銀銅鐵奇物御覽引云石流青白色主益肝氣明目石流赤生羌道山谷生山谷吳普曰硫黃一名石留黃神農黃帝雷公咸有毒醫和扁鵲苦無毒或生易陽或河西或五色黃是潘水石液也潘即礬古字燒令有紫焰者八月九月採治婦人血結御覽云治婦人絕陰能合金銀銅鐵名醫曰生東海牧羊山及太山河西山礬石液也案範子計然石流黃出漢中又云劉馮餌石流黃而更少劉逵注吳都賦云流黃土精也雌黃味辛平主惡創頭禿痂疥殺毒蟲蝨身癢邪氣諸毒煉之久服輕身增年不老生山谷吳普曰磁石一名磁君名醫曰生武都與雄黃同山生其陰山有金金精熏則生雌黃採無時水銀味辛寒主疥瘻痂瘍白禿殺皮膚中蝨墮胎除熱殺金銀銅錫毒熔化還復為丹久服神仙之死生平土名醫曰一名汞生符陵出於丹砂案說文云澒丹沙所作為水銀也廣雅云水銀謂之汞淮南子地形訓云白澒九百歲生白澒白礜九百歲生白金高誘云白澒水銀也石膏味辛微寒主中風寒熱心下逆氣驚喘口乾苦焦不能息腹中堅痛除邪鬼產乳金創生山谷名醫曰一名細石生齊山及齊盧山魯蒙山採無時磁石味辛寒主周痹風濕肢節中痛不可持物洗洗酸消除大熱煩滿及耳聾一名元石生山谷吳普曰磁石一名磁君名醫曰一名處石生太山及慈山山陰有鐵處則生其陽採無時案北山經云灌題之山其中多磁石郭璞云可以取鐵管子地數篇云山上有磁石者下必有銅呂氏春秋精通篇云磁石召鐵淮南子訓云磁石能引鐵只作慈舊作磁非名醫別出元石條亦非凝水石味辛寒主身熱腹中積聚邪氣皮中如火燒煩滿水飲之久服不飢一名白水石生山谷吳普曰神農辛岐伯醫和扁鵲甘無毒李氏大寒或生邯鄲採無時如雲母色御覽引云一名寒水石名醫曰一名寒水石一名淩水石鹽之精也生常案及凝山又中水縣邯鄲範子計然云水石出河東色澤者善陽起石味鹹微溫主崩中漏下破子藏中血癥瘕結氣寒熱腹痛無子陰痿不起御覽引作陰陽不合補不足御覽引有句攣二字一名白石生山谷吳普曰陽起石神農扁鵲酸無毒桐君雷公岐後咸無毒李氏小寒或生太山御覽引云或陽起云採無時名醫曰一名石生一名羊起石雲母根也生齊山及琅邪或云山陽起山採無時孔公孽味辛溫主傷食不化邪結氣惡創疽瘻琅邪利九竅下乳汁御覽引云一名通石大觀本作黑字生山谷吳普曰孔公孽神農辛岐伯咸扁鵲酸無毒色青黃名醫曰一名通石殷孽根也青黃色生梁山殷孽味辛溫主爛傷瘀血泄利寒熱鼠寒瘻癥瘕結氣一名姜石生山谷按此當與孔公孽為一條名醫曰鍾乳根也生越國又梁山及南海採無時鐵精平主明目化銅鐵落味辛平主風熱惡創瘍疽創痂疥氣在皮膚中鐵主堅肌耐痛生平澤舊為三條今並名醫曰鐵精一名鐵液可以染色生牧羊及祊城或析城採無時案說文云鐵黑金也或省作鐵古文作銕理石味辛寒主身熱利胃解煩益精明目破積聚去三蟲一名石立制石生山谷名醫曰一名飢石如石膏順理而細生漢中及盧山採無時長石味辛寒主身熱四肢寒厥利小便通血脈明目去翳眇下三蟲殺蠱毒久服不飢一名方石生山谷吳普曰長石一名方石一名直石生長子山谷如馬齒潤澤玉色長鮮服之不飢御覽名醫曰一名土石一名直石理如馬齒方而潤澤玉色生長子山及太山臨淄採無時膚青味辛平主蠱毒及蛇菜肉諸毒惡創生川穀名醫曰一名推青一名推石生益州案陶弘景雲俗方及仙經並無用此者亦相與不復識上玉石中品一十四種舊十六種考鐵落鐵宜與鐵精為一乾薑味辛溫主胸滿咳逆上氣溫中止血出汗逐風濕痹腸澼下利生者尤良久服去臭氣通神明生川穀名醫曰生楗為及荊揚州九月採案說文云姜御濕之菜也廣雅云葰廉姜也呂氏春秋本味篇云和之美者陽樸之姜高誘注陽樸地名在蜀郡司馬相如上林賦有茈姜云云枲耳實味甘溫主風頭寒痛風濕周痹四肢拘攣痛惡肉死肌久服益氣耳目聰明強志輕身一名胡枲一名地葵生川穀名醫曰一名葹一名常思生安陸及六安田野實熟時採案說文云䓮卷耳也苓卷耳也廣雅云苓耳葹常枲胡枲枲耳也爾雅云蒼耳苓耳郭璞云江東呼為常枲形似鼠耳叢生如盤毛詩云采采卷耳傳云卷耳苓耳也陸璣云葉青白色似胡荽白花細莖蔓生可煮為茹滑而少味四月中生子正如婦人耳璫今或謂之耳璫草鄭康成謂是白鬍荽幽州人謂之爵耳淮南子覽冥訓云位賤尚枲高誘云枲者枲耳菜名也幽冀謂之檀菜雒下謂之胡枲葛根味甘平主消渴身大熱嘔吐諸痹起陰氣解諸毒葛谷主下利十歲以上一名雞齊根生種穀吳普曰葛根神農甘生太山御覽名醫曰一名鹿藿一名黃斤生汶山五月採根曝乾栝蔞根味苦寒主消渴身熱煩滿大熱補虛安中續絕傷一名地樓生川穀及山陰吳普曰栝蔞一名澤巨一名澤姑御覽名醫曰一名果裸一名天瓜一名澤姑實名黃瓜二月八月採根曝乾三十日成生宏農案說文云𦯚𦯚蔞果也廣雅云王白𦯚也當為王𦯚爾雅云果裸之實栝蔞郭璞云今齊人呼之為天瓜毛詩云果裸之實亦施於宇傳云果裸栝蔞也呂氏春秋云王善生高誘云善或作瓜𦧔𤬏也案呂氏春秋善字乃𦯚之誤苦參味苦寒主心腹結氣癥瘕積聚黃疸溺有餘瀝逐水除癰腫補中明目止淚一名水槐一名苦識生山谷及田野名醫曰一名地槐一名菟槐一名驕槐一名白莖一名虎麻一名芩莖一名祿曰一名陵郎生汝南三月八月十月採根曝乾當歸味甘溫主咳逆上氣溫瘧寒熱洗在皮膚中大觀本洗音癬婦人漏下絕子諸惡創瘍金創煮飲之一名干歸生川穀吳普曰當歸神農黃帝桐君扁鵲甘無毒岐伯雷公辛無毒李氏小溫或生羌胡地名醫曰生隴西二月八月採根陰乾案廣雅云山靳當歸也爾雅云薜山靳郭璞云今似靳而粗大又薜白靳郭璞云即上山靳範子計然云當歸出隴西無枯者善麻黃味苦溫主中風傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱破症堅積聚一名龍沙吳普曰麻黃一名卑相一名卑堅神農雷公苦無毒扁鵲酸無毒李氏平或生河東四月立秋採御覽名醫曰一名卑相一名卑鹽生晉地及河東立秋採莖陰乾令青案廣雅云龍沙麻黃也麻黃莖狗骨也範子計然云麻黃出漢中三輔通草御覽作草味辛平主去惡蟲除脾胃寒熱通利九竅血脈關節令人不忘一名附支生山谷吳普曰通草一名丁翁一名附支神農黃帝辛雷公苦生石城山谷葉菁蔓延止汗自正月採御覽名醫曰一名丁翁生石城及山陽正月採枝陰乾案廣雅云附支蓪草也中山經云升山其草多寇脫郭璞云寇脫草生南方高丈許似荷葉而莖中有瓤正白零陵人植而日灌之以為樹也爾雅云離南活莌郭璞注同又倚商活脫郭璞云即離南也範子計然云蓪草出三輔芍藥味苦平主邪氣腹痛除血痹破堅積寒熱疝瘕止痛利小便益氣藝文類聚引云一名白朮大觀本作黑字生川穀及丘陵吳普曰芍藥神農苦桐君甘無毒岐伯咸李氏小寒雷公酸一名甘積一名解倉一名誕一名余容一名白朮三月三日採御覽名醫曰一名白朮一名余容一名犁食一名解食一名鋌生中嶽二月八月採根曝乾案廣雅云攣夷芍藥也白朮牡丹也北山經云繡山其草多芍藥郭璞云芍藥一名辛夷亦香草屬毛詩云贈之以芍藥傳云芍藥香草範子計然云芍藥出三輔崔豹古今注云芍藥有三種有草芍藥有木芍藥木有花大則色深俗呼為牡丹非也又云一名可離蠡實味甘平主皮膚寒熱胃中熱氣寒濕痹堅筋骨令人嗜食久服輕身花葉去白蟲一名劇草一名三堅一名豕首生川穀吳普曰蠡實一名劇草一名三堅一名劇荔華御覽一名澤藍一名豕首神農黃帝甘辛無毒生宛句五月採同上名醫曰一名荔實生河東五月採實陰乾案說文云荔草也似蒲而小根可作刷廣雅云馬䪥荔也月令云仲冬之月荔挺出鄭云荔挺馬薤也高誘注淮南子云荔馬荔草也通俗文云一名馬蘭顏之推云此物河北平澤率生之江東頗多種於階庭但呼為早蒲故不識馬薤瞿麥味苦寒主關格諸癃結小便不通出刺決癰腫明目去翳破胎墮子下閉血一名巨句麥生川穀名醫曰一名大菊一名大蘭生大山立秋採實陰乾案說文云蘧蘧麥也菊大菊蘧麥廣雅云茈威陵苕蘧麥也爾雅云大菊蘧麥郭璞云一名麥句姜即瞿麥陶弘景雲子頗似麥故名瞿麥元參味苦微寒主腹中寒熱積聚女子產乳余疾補腎氣令人目明一名重臺生川穀吳普曰元參一名鬼藏一名正馬一名重臺一名鹿腹一名端一名元臺神農桐君黃帝雷公扁鵲苦無毒岐伯咸李氏寒或生冤朐山陽二月生葉如梅毛四四相植似芍藥黑莖方高四五尺花赤生枝間四月實黑御覽名醫曰一名元臺一名鹿腸一名正馬一名減一名端生河間及冤句三月四月採根曝乾案廣雅云鹿腸元參也範子計然云元參出三輔青色者善秦艽味苦平主寒熱邪氣寒濕風痹肢節痛下水利小便生山谷名醫曰生飛烏山二月八月採根曝乾案說文云𤬓草之相丩者玉篇作䳒居包切云秦艽藥艽同蕭炳云本經名秦瓜然則今本經名亦有名醫改之者百合味甘平主邪氣腹張心痛利大小便補中益氣生川穀吳普曰百合一名重邁一名中庭生冠朐及荊山藝文類聚引云一名重匡名醫曰一名重箱一名摩羅一名中逢花一名強瞿生荊州二月八月採根曝乾案玉篇云蹯百合蒜也知母味苦寒主消渴熱中除邪氣肢體浮腫下水補不足益氣一名蚳母一名連母一名野蓼一名地參一名水參一名水浚一名貨母一名蝭母生川穀吳普曰知母神農桐君無毒補不足益氣御覽引云一名提母名醫曰一名女雷一名女理一名兒草一名鹿列一名韭蓬一名兒踵草一名東根一名水須一名沈燔一名薅生河內二月八月採根曝乾案說文云耆耆母也蕁莧藩也或從爻作薅廣雅云耆母兒踵東根也爾雅云薅艹沉藩郭璞云生山上葉如韭一曰蝭母範子計然云蝭母出三輔黃白者善玉篇作𦳚母貝母味辛平主傷寒煩熱淋瀝邪氣疝瘕喉痹乳難金創風痙一名空草名醫曰一名藥實一名苦花一名苦菜一名商𦯶字草一名勤母生晉地十月採根曝乾案說文云𦯶貝母也廣雅云貝父藥實也爾雅云𦯶貝母郭璞云根如小貝圓而白花葉似韭毛詩云言採其虻傳云虻貝母也陸璣云其葉如栝蔞而細小其子在根下如芋子正白四方連累相著有分解也白芷味辛溫主女人漏下赤白血閉陰腫寒熱風頭侵目淚出長肌膚潤澤可作面脂一名芳香生川穀吳普曰白芷一名䖀一名苻離一名澤芬一名𦺊御覽名醫曰一名白芷一名䖀一名莞一名苻離一名澤芬葉一名蒚麻可作浴湯生河東下澤二月八月採根曝乾案說文云芷䖀也䖀楚謂之籬晉謂之䖀齊謂之芷廣雅云白芷其葉謂之藥西山經云號山其草多藥䖀郭璞云藥白芷別名䖀香草也淮南子修務訓云身苦秋藥被風高誘云藥白芷香草也王逸注楚詞云藥白芷按名醫一名莞云云似即爾雅莞苻離其上鬲而說文別有𦺊夫離也蒚夫蘺上也是非一草舍人云白蒲一名苻離楚謂之莞豈蒲與芷相似而名醫誤合為一乎或說文云楚謂之蘺即夫籬也未可得詳舊作芷非淫羊藿味辛寒主陽痿絕傷莖中痛利小便益氣力強志一名剛前生山谷吳普曰淫羊藿神農雷公辛李氏小寒堅骨御覽名醫曰生上山郡陽山黃芩味苦平主諸熱黃疸腸澼泄利逐水下血閉惡創恆蝕火瘍一名腐腸生川穀吳普曰黃芩一名黃文一名妒婦一名虹勝一名紅芩一名印頭一名內虛神農桐君黃帝雷公扁鵲苦無毒李氏小溫二月生赤黃葉兩兩四四相值莖空中或方員高三四尺四月花紫紅赤五月實黑根黃二月至九月採御覽名醫曰一名空腸一名內虛一名黃文一名紅芩一名妒婦生秭歸及冤句三月三日採根陰乾案說文云菳黃菳也廣雅云艹妊葿黃文內虛黃芩也範子計然云黃芩出三輔色黃者善狗脊味苦平主腰背強關機緩急周痹寒濕膝痛頗利老人一名百枝生川穀吳普曰狗脊一名狗青一名赤節神農桐君黃帝岐伯雷公扁鵲甘無毒李氏小溫如萆薢莖節如竹有刺葉圓赤根黃白亦如竹根毛有刺岐伯經云莖長節葉端員青赤皮白有赤脈名醫曰一名強膂一名扶蓋一名扶筋生常山二月八月採根曝乾案廣雅云菝葜狗脊也玉篇云菝𦸉狗脊根也名醫別出菝葜條非石龍芮味苦平主風寒濕痹心腹邪氣利關節止煩滿久服輕身明目不老一名魯果能御覽作食果一名地椹生川澤石邊吳普曰龍芮一名姜苔一名天豆神農苦平岐伯酸扁鵲李氏大寒雷公咸無毒五月五日採御覽名醫曰一名石能一名彭根一名天豆生太山五月五日採子二月八月採皮陰乾案範子計然云石龍芮出三輔色黃者善茅根味甘寒主勞傷虛羸補中益氣除瘀血血閉寒熱利小便其苗主下水一名蘭根一名茹根生山谷田野名醫曰一名地管一名地筋一名兼杜生楚地六月採根案說文云茅菅也菅茅也廣雅云菅茅也爾雅云白華野菅郭璞云菅茅屬詩云白華菅兮白茅束兮傳云白華野菅也已漚為菅紫菀味苦溫主咳逆上氣胸中寒熱結氣去蠱毒痿蹶安五臟生山谷吳普曰紫菀一名青苑御覽名醫曰一名紫茜一名青苑生房陵及真定邯鄲二月三月採根陰乾案說文云菀茈菀出漢中房陵陶弘景雲白者名白菀唐本注云白菀即女菀也紫草味苦寒主心腹邪氣五疸補中益氣利九竅通水道一名紫丹一名紫芙御覽引云一名地血大觀本無文生川穀吳普曰紫草節赤二月花御覽名醫曰生碭山及楚地三月採根陰乾案說文云茈草也藐茈草也䓞草也可以染留黃廣雅云茈䓞茈草也山海經云勞山多茈草郭璞云一名紫䓞中染紫也爾雅云藐茈草郭璞云可以染紫敗醬味苦平主暴熱火創赤氣疥瘙疸痔馬鞍熱氣一名鹿腸生川穀名醫曰一名鹿首一名馬草一名澤敗生江夏八月採根曝乾案範子計然云敗醬出三輔陶弘景雲氣如敗醬故以為名白蘚味苦寒主頭風黃疸咳逆淋瀝女子陰中腫痛濕痹死肌不可屈伸起止行步生川穀名醫曰生上谷及冤句四月五月採根陰乾案陶弘景雲俗呼為白羊蘚氣息正似羊膻或名白膻酸醬味酸平主熱煩滿定志益氣利水道產難吞其實立產一名醋醬生川澤吳普曰酸醬一名酢醬御覽名醫曰生荊楚及人家田園中五月採陰乾案爾雅云葴寒醬郭璞云今酸醬草江東呼曰苦葴紫參味苦辛寒主心腹積聚寒熱邪氣通九竅利大小便一名牡蒙生山谷吳普曰伏蒙一名紫參一名泉戎一名音腹一名伏菟一名重傷神農黃帝苦李氏大寒生河西山谷或宛句商山圓聚生根黃赤月文皮黑中紫五月花紫赤實黑大如豆三月採根御覽大觀本節文名醫曰一名眾戎一名童腸一名馬行生河西及冤句三月採根火炙使紫色案範子計然云紫參出三輔赤青色者善藁本味辛溫主婦人疝瘕陰中寒腫痛腹中急除風頭痛長肌膚悅顏色一名鬼卿一名地新生山谷名醫曰一名微莖生崇山正月二月採根曝乾三十日成案廣雅云山芷蔚香藁本也管子地員篇云五臭疇生藁本荀子大略篇云蘭芷藁本漸於蜜醴一佩易之樊光注爾雅云藁本一名蘼蕪根名靳芷舊作藁非石葦味苦平主勞熱邪氣五癃閉不通利小便水道一名石䩾生山谷石上名醫曰一名石皮生華陰山谷不聞水及人聲者良二月採葉陰乾萆薢味苦平主腰背痛強骨節風寒濕周痹惡創不瘳熱氣生山谷名醫曰一名赤節生真定八月採根曝乾案博物志云菝葜與萆薢相亂白薇味苦平主暴中風身熱肢滿忽忽不知人狂惑邪氣寒熱酸痋溫瘧洗洗發作有時生川穀名醫曰一名白幕一名薇草一名春草一名骨美生平原三月三日採根陰乾水萍味辛寒主暴熱身癢藝文類聚初學記癢此是下水氣勝酒長鬚發藝文類聚作烏髮消渴久服輕身一名水華藝文類聚引云一名水廉生池澤吳普曰水萍一名水廉生澤水上葉員小一莖一葉根入水五月花白三月採曬乾御覽名醫曰一始水白一名水蘇生雷澤三月採曝乾案說文云蘋蓱也無根浮水而生者萍蘋也䤵大萍也廣雅云鶵萍也夏小正云七月湟潦生苹爾雅云萍蓱郭璞云水中浮萍江東謂之鶵又其大者蘋毛詩云於以採蘋傳云蘋大萍也範子計然曰水萍出三輔色青者善淮南子原道訓云萍樹根於水高誘云萍大蘋也王瓜味苦寒主消渴內痹瘀血月閉寒熱痠疼益氣俞聾一名土瓜生平澤名醫曰生魯地田野及人家坦牆間三月採根陰乾案說文云萯王萯也廣雅云葵茹瓜𤬏王瓜也夏小正云四月王萯秀爾雅云鉤萯菇郭璞云鉤𤬏也一名王瓜實如瓝瓜正赤味苦月令王瓜生鄭元云月令云王萯生孔穎達云疑王萯則王瓜也管子地員篇剽土之次曰五沙其種大萯細萯白莖青秀以蔓本草圖經云大萯即王萯也芴亦謂之土瓜自別是一物地榆味苦微寒主婦人乳痓痛七傷帶下病止痛除惡肉止汗療金創御覽上云主消酒又云明目大觀本草消酒作黑字而無明目生山谷名醫曰生桐柏及冤句二月八月採根曝乾案廣雅云菗蒢地榆也陶弘景雲葉似榆而長初生布地而花子紫黑色如豉故名玉豉海藻味苦寒主癭瘤氣頸下核破散結氣癰腫癥瘕堅氣腹中上下鳴下十二水腫一名落首生池澤名醫曰一名藫生東海七月七日採曝乾案說文云藫水草也或作藻廣雅云海蘿海藻也爾雅云薅海藻也郭璞云藥草也一名海蘿如亂髮生海中本草云又藫石衣郭璞云水苔也一名石發江東食之或曰藫葉似䪥而大生水底也亦可食澤蘭味苦微溫主乳婦內衄御覽作衄血中風余疾大腹水腫身面四肢浮腫骨節中水金創癰腫創膿一名虎蘭一名龍棗生大澤傍吳普曰澤蘭一名水香神農黃帝岐伯桐君酸無毒李氏溫生下地水傍葉如蘭二月生香赤節四葉相值枝節間名醫曰一名虎蒲生汝南三月三日採陰乾案廣雅云虎蘭澤蘭也防己味辛平主風寒溫瘧熱氣諸癰除邪利大小便一名解離御覽作石解引云通腠理利九竅大觀本六字黑生川穀吳普曰木防己一名解離一名解燕神農辛黃帝岐伯桐君苦無毒李氏大寒如艿莖蔓延如艽白根外黃似結梗內黑又如車輻解二月八月十月採根御覽名醫曰生漢中二月八月採根陰乾案範子計然云防己出漢中旬陽款冬花味辛溫主咳逆上氣善喘喉痹諸驚癇寒熱邪氣一名橐吾御覽作石一名顆東御覽作顆冬一名虎鬚一名免奚生山谷吳普曰款冬十二月花黃白藝文類聚名醫曰一名氏冬生常山及目常水傍十一月採花陰乾案廣雅云苦萃款涷也爾雅云菟奚顆涷郭璞云款冬也紫赤花生水中西京雜記云款冬花於嚴冬傳咸款冬賦序曰仲冬之月冰凌積雪款冬獨敷花豔牡丹味苦辛寒主寒熱中風瘛瘲痙驚癇邪氣除症堅瘀血留舍腸胃安五臟療癰創一名鹿韭一名鼠姑生山谷吳普曰牡丹神農岐伯辛李氏小寒雷公桐君苦無毒黃帝苦有毒葉如蓬相植根如柏黑中有核二月採八月採曬乾人食之輕身益壽御覽名醫曰生巴郡及漢中二月八月採根陰乾案廣雅云白朮牡丹也範子計然云牡丹也漢中河內赤色者變善馬先蒿味平主寒熱鬼注中風濕痹女子帶下病無子一名馬尿蒿生川澤名醫曰生南陽案說文云蔚牡蒿也廣雅云因塵馬先也爾雅云蔚牡菣郭璞云無子者毛詩云匪莪伊蔚傳云菣牡菣也陸璣云三月始生七月花花似胡麻花而紫赤八月為角角似小豆角銳而長一名馬新蒿案新先聲相近積雪草味苦寒主大熱惡創癰疽浸淫赤熛皮膚赤身熱生川穀名醫曰生荊州案陶弘景雲荊楚人以葉如錢謂為地錢草徐儀藥圖名連錢草本草圖經云咸洛二京亦有或名胡薄荷女菀御覽作苑味辛溫主風洗洗霍亂泄利腸鳴上下無常處驚癇寒熱百疾生川穀或山陽吳普曰女菀一名白菀一名識女苑御覽名醫曰一名白菀一名織女菀一名茆生漢中正月二月採陰乾案廣雅云女腸女菀也王孫味苦平主五臟邪氣寒濕痹四肢疼酸膝冷痛生川穀吳普曰黃孫一名王孫一名蔓延一名公草一名海孫神農雷公苦無毒黃帝甘無毒生西海山谷及汝南城郭垣下蔓延赤文莖葉相當御覽名醫曰吳名白功草楚名王孫齊名長孫一名黃孫一名黃昏一名海孫一名蔓延生海西及汝南城郭下案陶弘景雲今方家皆呼王昏又云壯蒙蜀羊泉味苦微寒主頭禿惡創熱氣疥瘙痂癬蟲療齲齒生川穀名醫曰一名羊泉一名飴生蜀郡案廣雅云桼姑艾但鹿何澤𤤄也唐本注云此草一名漆姑爵床味鹹寒主腰脊痛不得著床俯仰艱難除熱可作浴湯生川穀及田野吳普曰爵床一名爵卿御覽名醫曰生漢中案別本注云今人名為香蘇假蘇味辛溫主寒熱鼠瘻瘰癧生創破結聚氣下瘀血除濕痹一名鼠蓂生川澤舊在菜部今移吳普曰假蘇一名鼠實一名姜芥也御覽名荊芥葉似落藜而細蜀中生啖之蜀本注名醫曰一名姜芥生漢中案陶弘景雲即荊芥也薑荊聲訛耳先居草部中令人食之錄在菜部中也翹根味甘寒平御覽作味苦平主下熱氣益陰精令人而說好明目久服輕身耐老生平澤舊在唐本退中今移吳普曰翹根神農雷公甘有毒三月八月採以作蒸飲酒病人御覽名醫曰生蒿高二月八月採案陶弘景雲方藥不復用俗無識者上草中品四十九種舊四十六種考菜部假蘇及唐本退中翹根宜入此桑根白皮味甘寒主傷中五勞六極羸瘦崩中脈絕補虛益氣葉主除寒熱出汗桑耳黑者主女子漏下赤白汗血病癥瘕積聚陰補陰陽寒熱無子五木耳名糯益氣不飢輕身強志生山谷名醫曰桑耳一名桑菌一名木麥生犍為六月多雨時採即曝乾案說文云桑蠶所食葉木䓴木耳也蕈桑䓴爾雅云桑瓣有葚梔舍人云桑樹一半有葚半無葚名梔也郭璞云瓣半也又女桑桋桑郭璞云今俗呼桑樹小而條長者為女桑樹又檿山桑郭璞云似桑材中作弓及草轅又桑柳槐條郭璞云阿那垂條竹葉味苦平主咳逆上氣溢筋急惡瘍殺小蟲根作湯益氣止渴補虛下氣汁主風痓實通神明輕身益氣名醫曰生益州案說文云竹冬生草也象形下𠂹者箬箬也吳茱萸御覽引無吳字是味辛溫主溫中下氣止痛咳逆寒熱除濕血痹逐風邪開湊舊作腠御覽作濤是理根殺三蟲一名藙生山谷名醫曰生冤句九月九日採陰乾案說文云茱茱萸屬萸茱萸也煎茱萸漢律會稽獻藙一斗廣雅云𣐊榝檔樾茱萸也三蒼云莍茱萸也御覽爾雅云椒榝醜莍郭璞云茱萸子聚生成房貌今江東亦呼榝似茱萸而小赤色禮記云三牲用藙鄭云藙煎茱萸也漢律會稽獻焉爾雅謂之榝範子計然云茱萸出三輔陶弘景雲禮記名榝而作俗中呼為藙子當是不識藙字似雜字仍似相傳卮子舊作梔藝文類聚及御覽引作支是味苦寒主五內邪氣胃中熱氣面赤酒泡皶鼻白賴赤癩創瘍一名木丹生川穀名醫曰一名樾桃生南陽九月採實曝乾案說文云梔黃木可染者廣雅云梔子㮁桃也史記貨殖傳云巴蜀地饒卮集解云徐廣白音支煙支也紫赤色也據說文當為梔蕪荑味辛主五內邪氣散皮膚骨節中淫淫溫行毒去三蟲化食一名無姑一名殿塘御覽引云逐寸白散腹中溫溫喘息大觀本作黑字生川穀名醫曰一名殿塘生晉山三月採實陰乾案說文云梗山枌榆有束莢可為蕪荑者廣雅云山榆母估也爾雅云莁荑蔱蘠郭璞云一名白蕢又無姑其實夷郭璞云無姑姑榆也生山中葉圓而厚剝取皮合漬之其味辛香所謂蕪荑範子計然云蕪荑在地赤心者善枳實味苦寒主大風在皮膚中如麻豆苦癢御覽作痰非除寒熱結止利舊作痢御覽作利是長肌肉利五臟益氣輕身生川澤吳普曰枳實苦雷公酸無毒李氏大寒九月十月採陰乾御覽名醫曰生河內九月十月採陰乾案說文云枳木似橘周禮云橘渝淮而化為枳沈括筆談云六朝以前醫方唯有枳實無枳殼後人用枳之小嫩者為枳實大者為枳殼厚朴味苦溫主中風傷寒頭痛寒熱驚悸氣血痹死肌去三蟲吳普曰厚朴神農岐伯雷公苦無毒李氏小溫御覽引云一名厚皮生交址名醫曰一名厚皮一名赤樸其樹名榛其子名逐生交址冤句九月十月採皮陰乾案說文云樸木皮也榛木也廣雅云重皮厚朴也範子計然云厚朴出宏農按今俗以榛為親不知是厚朴說文榛慄字作親秦皮味苦微寒主風寒濕痹洗洗寒氣除熱目中青翳白膜久服頭不白輕身生川穀吳普曰芩皮一名秦皮神農雷公黃帝岐伯酸無毒李氏小或生冤句水邊二月八月採御覽吳普曰一名岑皮一名石檀生廬江及冤句二月八月採皮陰乾案說文云梣青皮木或作𣘕淮南子倜真訓云梣木色青翳高誘云梣木苦歷木也生於山剝取其皮以水浸之正青用洗眼愈人目中膚翳據吳普云岑皮名秦皮本經作秦皮者後人以俗稱改之當為岑皮秦菽味辛溫主風邪氣溫中除寒痹堅齒髮明目久服輕身好顏色耐老增年通神生川穀名醫曰生太山及秦嶺上或琅邪八月九月採實案說文云菽菽萯莍菽菽莍實裹如裘者椒似茱萸出淮南廣雅云榝椒茱萸也北山經云景山多秦椒郭璞云子似椒而細葉草也爾雅云檓大椒郭璞云今椒樹叢生實大者名為檓又椒榝醜莍郭璞云莍萸子聚成房貌今江示亦呼莍𦶍似茱萸而小赤色毛詩云椒聊之實傳云椒聊椒也陸璣云椒樹似茱萸有針刺葉堅而滑澤蜀人作茶吳人作茗皆合煮其葉以為香範子計然云秦椒出天水隴西細者善淮南子人間訓云申椒杜茞美人之所懷服舊作椒非據山海經有秦椒生聞喜景山則秦非秦地之秦也山茱萸味酸平主心下邪氣寒熱溫中逐寒濕痹去三蟲久服輕身一名蜀棗生山谷吳普曰山茱萸一名魃實一名鼠矢一名雞足神農黃帝雷公扁鵲酸無毒岐伯辛一經酸或生冤句琅邪或東海承縣葉如梅有刺毛二月花如杏四月實如酸棗赤五月採實御覽名醫曰一名雞足一名魃實生漢中及琅邪冤句東海承縣九月十月採實陰乾紫葳味酸御覽作咸微寒主婦人產乳余疾崩中癥瘕血閉寒熱羸瘦養胎生川穀吳普曰紫葳一名武威一名瞿麥一名陵居腹一名鬼目一名蘢華神農雷公酸岐伯辛扁鵲苦咸黃帝甘無毒如麥根黑正月八月採或生真定御覽名醫曰一名陵苕一名蘢華生西海及山陽案廣雅云茈葳陵苕蘧麥也爾雅云苕陵苕郭璞云一名陵時本草云又黃華白華蔈郭璞云苕花色異名亦不同毛詩云苕之華傳云苕陵苕也範子計然云紫葳出三輔李當之云是瞿麥根據李說與廣雅合而唐本注引爾雅注有一名凌霄四字謂即凌霄花陸璣以為鼠尾疑皆非故不採之豬苓味甘平主痎瘧解毒蠱注御覽作蛀不祥利水道久服輕身耐老御覽作能老一名猳豬尿生山谷吳普曰豬苓神農甘雷公苦無毒御覽引云如茯苓或生冤句八月採名醫曰生衡山及濟陰冤句二月八月採陰乾案莊子云豕零司馬彪注作豕囊云一名豬苓根似豬卵可以治渴白棘味辛寒主心腹痛癰腫漬膿止痛一名棘針生川穀名醫曰一名棘刺生雍州案說文云棘小棗叢生者爾雅云髦顛棘孫炎云一名白棘李當之云此是酸棗樹針今人用天門冬苗代之非是真也案經云天門冬一名顛勒勒棘聲相近則今人用此亦非無因也龍眼味甘平主五臟邪氣安志厭食久服強魂聰明輕身不老通神明一名益智生山谷吳普曰龍眼一名益智要術一名比目御覽名醫曰其大者似檳榔生南海松樹上五月採陰乾案廣雅云益智龍眼也劉達注吳都賦云龍眼如荔枝而小圓如彈丸味甘勝荔枝蒼梧交址南海合浦皆獻之山中之家亦種之松羅味苦平主嗔怒邪氣止虛汗頭風女子陰寒腫病一名女蘿生山谷名醫曰生熊耳山案廣雅云女蘿松蘿也毛詩云蔦與女蘿傳云女蘿菟絲松蘿也陸璣云松蘿自蔓松上枝正青與菟絲異衛矛味苦寒主女子崩中下血腹滿汗出除邪殺鬼毒蟲注一名鬼箭生山谷吳普曰鬼箭一名衛矛神農黃帝桐君苦無毒葉如桃如羽正月二月七月採陰乾或生田野御覽名醫曰生霍山八月採陰乾案廣雅云鬼箭神箭也陶弘景雲其莖有三羽狀如箭羽合歡味甘平主安五臟利心志藝文類聚作和心志御覽作和心氣令人獻樂無憂久服輕身明目所欲生山谷名醫曰生益州案唐本注云或曰合昏歡昏音相近日華子云夜合上木中品一十七種舊同白馬莖味鹹平主傷中脈絕陰不起強志益氣長肌肉肥健生子眼主驚癇腹滿瘧疾當殺用之懸蹄主驚邪瘛瘲乳難辟惡氣鬼毒蠱注不祥生平澤名醫曰生雲中鹿茸味甘溫主漏下惡血寒熱驚癇益氣強志生齒不老角主惡創癰腫逐邪惡氣留血在陰中名醫曰茸四月五月解角時取陰乾使時躁角七月採牛角䚡下閉血瘀血疼痛女人帶下血髓補中填骨髓久服增年膽可丸藥案說文云䚡角中骨也羚羊角味鹹溫主青盲明目殺疥蟲止寒泄辟惡鬼虎狼止驚悸久服安心益氣輕身生川穀名醫曰生河西取無時案說文云羚夏羊牝曰羚爾雅云羊牝羚郭璞云今人便以牂羚為黑白羊名牡狗陰莖味鹹平主傷中陰痿不起令強熱大生子除女子帶下十二疾一名狗精膽主明目名醫曰六月上伏取陰乾百日羚羊角味鹹寒主明目益氣起陰去惡血注下闢蠱毒惡鬼不祥安心氣常不大厭寐生川穀名醫曰生石城及華陰山採無時案說文云羚大羊而細角廣雅云美皮冷角爾雅云弘大羊郭璞云羚羊似羊而大角園銳好在山崖間陶弘景雲爾雅名羱羊據說文云莧山羊細角也爾雅云羱如羊郭璞云羱似吳羊而大角角橢出西方莧即羱正字然本經羚字實羚字俗寫當以羚為是爾雅釋文引本草作羚犀角味苦寒主百毒蟲注邪鬼障氣殺鉤吻鴆羽蛇毒除不迷或厭寐久服輕血生山谷名醫曰生永昌及益州案說文云犀南徼外牛一角在鼻一角在頂似豕爾雅云犀似豕郭璞云形似水牛豬頭大腹痹腳腳有三蹄黑色三角一在頂上一在鼻上一在額上鼻上者即食角也小而不橢好食棘亦有一角者山海經云琴鼓之山多白犀郭璞云此與闢寒蠲忿闢塵闢暑諸犀皆異種也範子計然云犀角出南郡上價八千中三千下一千上獸中品七種舊同燕屎味辛平主蠱毒鬼注逐不祥邪氣破五癃利小便生平谷名醫曰生高山案說文云燕元鳥也爾口布翅枝尾象形作巢避戊己乙元鳥也齊魯謂之乙取其名自呼象形或作亂爾雅云燕亂夏小正云二月來降燕乃睇傳云燕乙也九月陟元鳥蟄傳云元鳥者燕也天鼠屎味辛寒主面癰腫皮膚洗洗時痛腸中血氣破寒熱積聚除驚悸一名鼠沄一名石肝生山谷名醫曰生合浦十月十二月取案李當之云即伏翼屎也李云天鼠方言一名仙鼠案今本方言云或謂之老鼠當為天字之誤也上禽中品二種舊同猥皮味苦平主五痔陰蝕下血赤白五色血汁不止陰腫痛引要背酒煮殺之生川穀名醫曰生楚山田野取無時案說文云艹認似豪豬者或作猥廣雅云虎王猥也爾雅云匯毛刺郭璞云今謂狀似鼠淮南子說山訓云鵲矢中猥露蜂房味苦平主驚癇瘈瘲寒熱邪氣瘨疾鬼精蠱毒腸痔火熬之良一名蜂腸生山谷名醫曰一名百穿一名蜂𭄰生牂柯七月七日採陰乾案淮南子汜論訓云蜂房不容卵高誘云房巢也鱉甲味鹹平主心腹癥瘕堅積寒熱去痞息肉陰蝕痔惡肉生池澤名醫曰生丹陽取無時案說文云鱉甲蟲也蟹味鹹寒主胸中邪氣熱結痛喎僻而腫敗漆燒之致鼠生池澤名醫曰生伊洛諸水中取無時案說文云蟹有二敖八足旁行非蛇鱔之穴無所庇或作䲒蛫蟹也荀子勤學扁云蟹六跪而二螯非蛇蟺之穴無所寄託廣雅云晡蟹蛫也爾雅云螖蠌小者蟧郭璞云或曰即蟚螖也似蟹而小柞蟬味鹹寒主小兒驚癇夜啼瘨病寒熱生楊柳上名醫曰五月採蒸乾之案說文云蟬以旁鳴者蜩蟬也廣雅云予心蛣蟬也覆育蛻也舊作蚱蟬別錄云蚱者鳴蟬也殼一名楉蟬又名伏蜟案蚱即柞字周禮考工記云侈則柞鄭元云柞讀為咋咋然之咋聲大外也說文云諸大聲也音同柞今據作柞柞蟬即五月鳴蜩之蜩夏小正云五月良蜩鳴傳良蜩也五采具爾雅云蜩螂蜩毛詩云如蜩傳云蜩蟬也方言云楚謂之蜩宋衛之間謂之螗蜩陳鄭之間謂之螂蜩秦晉之間謂之蟬海岱之間謂之予心論衡云蟬生於覆育開背而出而玉篇云蚱蟬七月生陶弘景音蚱作笮云瘂蟬是為月令人寒蟬爾雅所云蜺矣唐本注非之也蠐螬味鹹微溫主惡血血瘀御覽作血瘴痹氣破折血在脅下堅滿痛月閉目中淫膚青翳白膜一名蟦蠐生平澤名醫曰一名蜰齊一名勃齊生河內人家積糞草中取無時反行者良案說文云𧓉𧓉螬也蝤蝤𧓉也蠍蝤𧓉也廣雅云蛭蛒䖭蠾地蠶蠹蠐螬爾雅云蟦蠐螬郭璞云在糞土中又蝤蠐蠍郭璞云在木中今雖通名蠍所在異又蠍蛣𧌑郭璞云木中囊蟲蠍桑蠹郭璞云即拮掘毛詩云領如蝤蠐傳云蝤蠐蠍蟲也方言云蠐螬謂之蟦自關而東謂之蝤蠐或謂之蠶蠾梁益之間謂之蛒或謂之蠍或謂之蛭蛒秦晉之間謂之蠹或謂之天螻列子天瑞篇云烏足根為蠐螬博物志云蠐螬以背行快於足用說文無蟦字當借蜰為之聲相近字之誤也烏賊魚骨味鹹微溫主女子漏下赤白經汁血閉陰蝕腫痛寒熱症瘕無子生池澤名醫曰生東海取無時案說文云鰂烏鰂魚名或作鯽左思賦有烏賊劉逵注云烏賊魚腹中有墨陶弘景雲此是𪇰烏所化作今其口腳具存猶相似爾白殭蠶味鹹主小兒驚癇夜啼去三蟲減黑皯令人面色好男子陰瘍病生平澤名醫曰生潁川四月取自死者案說文云蠶任絲也淮南子說林訓云蠶食而不飲二十二日而化博物志云蠶三化先孕而後交不交者亦生子子後為蜸皆無眉目易傷收採亦薄玉篇作殭蠶正當為僵舊作殭非鮀魚甲味辛微溫主心腹癥瘕伏堅積聚寒熱女子崩中下血五色小腹陰中相引痛創疥死肌生池澤名醫曰生南海取無時案說文云鱔魚石皮可為鼓鼉蜥水蟲似蜥易長大陶弘景雲蛇即鼉甲也樗雞味苦平主心腹邪氣陰痿益精強志生子好色補中輕身生川穀名醫曰生河內樗樹上七月採曝乾案廣雅云樗鳩樗雞也爾雅云螒天雞李巡云一名酸雞郭璞云小蟲黑身赤頭一名莎雞又曰樗雞毛詩云六月莎雞振羽陸璣云莎雞如蝗而斑色毛翅數重某翅正赤或謂之天雞六月中飛而振羽索索作聲幽州人謂之蒲錯是也蛞蝓味鹹寒主賊風喎僻軼筋及脫肛驚癇攣縮一名陵蠡生池澤名醫曰一名土喎一名附喎生大山及陰地沙石垣下八月取案說文云蝓虎蝓也蠃一名虎蝓廣雅云蠡蠃蝸牛螔蝓也中山經云青要之山是多僕累郭璞云僕累蝸牛也周禮鱉人祭祀供蠃鄭云蠃螔蝓爾雅云蚹蠃螔蝓郭璞云即蝸牛也名醫曰別出蝸牛條非舊作蛞說文云所無據玉篇云蛞蛞東知即活東異文然則當為活石龍子味鹹寒主五癃邪結氣破石淋下血利小便水道一名蜥易生川穀吳普曰石龍子一名守宮一名石蜴一名石龍子御覽名醫曰一名山龍子一名守宮一名石蜴生平陽及荊山石間五月取著石上令乾案說文云蜥蟲之蜥蜴也易蜥易蝘蜓守宮也象形蝘在壁曰蝘蜓在草曰蜥易或作蝘蚖榮蚖蛇醫以注鳴者廣雅云蛤解𧓻𮔠蚵蛖蜥蜴也爾雅云蠑螈蜥蜴蜥蜴蝘蜓蜓蝘守宮也毛詩云胡為虺蜴傳云蜴螈也陸璣云虺蜴一名蠑螈蜴也或謂之蛇醫如蜥蜴青綠色大如指形狀可惡方言云守宮秦晉西夏謂之守宮或謂之𧓻𮔠或謂之蜥易其在澤中者謂之易蜴南楚謂之蛇醫或謂之蠑螈東齊海岱謂之螔䗔北燕謂之祝蜓桂林之中守宮大者而能鳴謂之蛤蚧木虻味苦平主目赤痛眥傷淚出瘀血血閉寒熱酸𢠹無子一名魂常生川澤名醫曰生漢中五月取案說文云虻齧人飛蟲廣雅云䘌螚虻也此省文淮南子齊俗訓云水蠆為𧐟芒高誘云青蛉也又說文訓云虻散積血蜚虻味苦微寒主逐瘀血破下血積堅痞癥瘕寒熱通利血脈及九竅生川穀名醫曰生江夏五月取腹有血者良蜚廉味鹹寒主血瘀御覽引云逐下血症堅寒熱破積聚喉咽痹內寒無子生川澤吳普曰蜚廉蟲神農黃帝云治婦人寒熱御覽名醫曰生晉陽及人家屋間立秋採案說文云蜰盧蜰也蜚臭蟲負蠜也蠜巾盡蠜也廣雅云飛蟅飛蠊也爾雅云蜚𧓻蜰郭璞云即負盤臭蟲唐本注云漢中人食之下氣名曰石姜一名盧蜰一名負盤占作蠊據邢日内疏引此作廉䗪蟲味鹹寒主心腹寒熱洗洗血積癥瘕破堅下血閉生子大良一名土鱉生川澤吳普曰䗪蟲一名土鱉御覽名醫曰一名土鱉生河東及沙中人家牆壁下土中濕處十月曝乾案說文云蟅蟲屬蠜目蠜也廣雅云負蠜蟅也爾雅云草蟲負蠜郭璞云常羊也毛詩云喓喓草蟲傳云草蟲常羊也陸璣云小大長短如蝗也奇音青色好在茅草中伏翼味鹹平主目瞑明目夜視有精光久服令人喜樂媚好無憂一名蝙蝠生川穀舊部禽部今移吳普曰伏翼或生人家屋間立夏後陰乾治目冥令人夜視有光藝文類聚名醫曰生太山及人家屋間立夏後採陰乾案說文云蝙蝙蝠也蝠蝙蝠服翼也廣雅云伏翼飛鼠仙鼠𧊖嚜也爾雅云蝙蝠服翼方言云蝙蝠自關而東謂之伏翼或謂之飛鼠或謂之老鼠或謂之仙鼠自關而西秦隴之間謂之蝙蝠北燕謂之𧊄𮔠李當之云即天鼠上蟲魚中品一十七種舊十六種考禽部伏翼宜入此梅實味酸平主下氣除熱煩滿安心肢體痛偏枯不仁死肌去青黑志惡疾生川穀吳普曰梅實大觀本草作核明目益氣御覽不飢大觀本草引吳氏本草名醫曰生漢中五月採火干案說文云蘵乾梅之屬或作𧋈某酸果也以梅為楠爾雅云梅楠郭璞云似杏實酢是以某注梅也周禮籩人饋食籩其實幹蘵鄭云干蘵乾梅也有桃諸梅諸是其乾者毛詩疏云梅暴為臘羹臛虀中人含之以香口大觀本草上果中品一種舊同大黃豆卷味甘平主濕痹筋攣膝痛生大豆塗癰腫煮汁飲殺鬼毒止痛赤小豆主下水排癰腫膿血生平澤吳普曰大豆黃卷神農黃帝雷公無毒採無時去面䵟得前胡烏啄杏子牡蠣天雄鼠屎共蜜和佳不欲海藻龍膽此法大豆初出黃土芽是也生大豆神農岐伯生熟寒九月採殺烏豆毒並不用元參赤小豆神農黃帝咸雷公甘九月採御覽名醫曰生大山九月採案說文云椒豆也象豆生之形也荅小椒也藿椒之少也廣雅云大豆椒也小豆荅也豆角謂之莢其葉謂之藿爾雅云戎叔謂之荏叔孫炎支大豆也粟米味鹹微寒主養腎氣去胃脾中熱益氣陳者味苦主胃熱消渴利小便大觀本草作黑字據吳普增吳普曰陳粟神農黃帝苦無毒治脾熱渴粟養腎氣御覽案說文云粟嘉穀實也孫炎注爾雅粢稷云粟也今關中人呼小米為粟米是黍米味甘溫主益氣補中多熱令人煩大觀本作黑字據吳普增吳普曰黍神農甘無毒七月取陰乾益中補氣御覽案說文云黍禾屬而黏者以大暑而種故謂之黍孔子曰黍可為酒禾入水也廣雅云粢黍稻其採謂之禾齊氏要術引記勝之書曰黍忌醜又曰黍生於巳壯於酉長於戌老於亥死於醜惡於丙午忌於醜寅卯按黍即糜之種也上米谷中品三種舊二種大小豆為二無粟米黍米今增蓼實味辛溫主明目溫中耐風寒下水氣面目浮腫癰瘍馬蓼去腸中蛭蟲輕身生川澤吳普曰蓼實一名天蓼一名野蓼一名澤蓼藝文類聚名醫曰生雷澤案說文云蓼辛菜薔虞也薔薔虞蓼廣雅云葒蘢𧀺馬蓼孔爾雅云牆虞蓼郭璞云虞蓼澤蘿又葒蘢古其大者歸郭璞云俗呼葒草為蘢鼓語轉耳毛詩云隰有游龍傳云龍紅草也陸璣云一名馬蓼葉大而赤色生水中高丈餘又以薅殺蓼傳云蓼水草也蔥實味辛溫主明目補中不足其莖可作湯主傷寒寒熱出汗中風面目腫䪥味辛溫主金創創敗輕身不飢耐老生平澤名醫曰生魯山案說文云䪥菜也葉似韭廣雅云韭䪥蕎其華謂之菁爾雅云䪥鴻薈郭璞云即䪥菜也又勁山賁陶弘景雲蔥䪥異物而今共條本經既無韭以其同類故也水蘇味辛微溫主下氣闢口臭去毒辟惡久服通神明輕身耐老生池澤吳普曰芥蒩一名水蘇一名勞祖御覽名醫曰一名雞蘇一名勞祖一名芥蒩一名芥苴生九真七月採案說文云蘇桂荏也廣雅云芥蒩水蘇也爾雅云蘇桂荏郭璞云蘇荏類故名桂荏方言云蘇亦荏也關之東西或謂之蘇或謂之荏周鄭之間謂之公賁沅湘之南謂之𦵯其小者謂之䖆柔按䖆柔即香薷也亦名香葇名醫別出香薷條非今紫蘇薄荷等皆蘇類也名醫俱別出之上菜中品三種舊四種考蔥實宜與䪥同條今並假蘇宜入草部
